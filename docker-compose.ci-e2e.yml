# CI-only override (issue #839): stand up the full stack INSIDE the GitHub
# runner for an ephemeral E2E gate. Nothing is pushed to a registry and nothing
# is deployed to Dokploy — the stack is built locally and torn down in the same
# job (`docker compose down -v --remove-orphans`). An nginx `edge` gives the
# single origin the preview E2E expects (/api -> backend, / -> frontend),
# replacing the Dokploy/Traefik route.
#
# Use with: COMPOSE_FILE=docker-compose.yml:docker-compose.ci-e2e.yml
services:
  backend:
    pull_policy: build      # build locally; never pull a ghcr :latest
    restart: "no"           # ephemeral: no restart loops to mask failures/teardown
    environment:
      # Placeholder provider wiring (#1589): with an empty key the app reports
      # "LLM unconfigured" and the dismissible FirstRunModal covers every page
      # on every full navigation, blocking browser-driven E2E clicks. The
      # in-runner stack's job is to validate app WIRING without real provider
      # calls — so wire a non-real key and point the base URL at an
      # unroutable address: no llm-marked spec runs here, and an accidental
      # provider call fails instantly instead of spending quota.
      ZAI_API_KEY: e2e-in-runner-placeholder-key
      AI_BASE_URL: http://127.0.0.1:9/unroutable

  frontend:
    pull_policy: build
    restart: "no"
    build:
      args:
        # NEXT_PUBLIC_* are inlined at build time; point the browser at the edge.
        # NO /api suffix: lib/api.ts callers pass /api-prefixed paths, so a
        # suffixed base double-prefixed every browser-side fetch
        # (/api/api/... -> nginx strips one -> backend 404) — the #1547
        # in-runner-only failure. Deployed envs use the bare origin too.
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_APP_URL: http://localhost:8080

  edge:
    image: nginx:1.27-alpine
    restart: "no"
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:8080"
    volumes:
      - ./tools/ci/e2e-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
