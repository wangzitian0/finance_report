version: "1.0"
owner: ci_workflow
purpose: >
  Inventory of external GitHub JavaScript actions used by repository workflows
  and composite actions. This prevents Node 20 action-runtime migration debt
  from re-entering workflows after the repository moved to Node 24-native
  actions.

forced_node20_metadata_count_must_be: 0

actions:
  - uses: actions/cache@v5
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/checkout@v7
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/configure-pages@v6
    runtime_status: node24_native
    owner: docs_workflow
  - uses: actions/deploy-pages@v5
    runtime_status: node24_native
    owner: docs_workflow
  - uses: actions/download-artifact@v8
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/github-script@v9
    runtime_status: node24_native
    owner: pr_preview_workflow
  - uses: actions/setup-node@v6
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/setup-python@v6
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/upload-artifact@v7
    runtime_status: node24_native
    owner: ci_workflow
  - uses: actions/upload-pages-artifact@v5
    runtime_status: node24_native
    owner: docs_workflow
  - uses: astral-sh/setup-uv@v8.2.0
    runtime_status: node24_native
    owner: ci_workflow
  - uses: coverallsapp/github-action@v2
    runtime_status: node24_native
    owner: ci_workflow
  - uses: docker/build-push-action@v7
    runtime_status: node24_native
    owner: ci_workflow
  - uses: docker/login-action@v4
    runtime_status: node24_native
    owner: ci_workflow
  - uses: docker/setup-buildx-action@v4
    runtime_status: node24_native
    owner: ci_workflow
  - uses: moonrepo/setup-toolchain@v0
    runtime_status: node24_native
    owner: ci_workflow

exceptions: []
