    production_preflight: Confirm atomic_valuation_facts and valuation_classifications are empty (row count 0) before applying; no producer exists so they are guaranteed empty.
    rollback_strategy: downgrade() recreates both tables and their enums exactly as revision 0046 defined them (no data is restored because none ever existed). Restore from pre-migration snapshot only if the drop is interrupted.
    destructive_confirmation: Confirmed destructive drop of two empty, never-populated orphan tables; no production data exists and no consumer references them.
