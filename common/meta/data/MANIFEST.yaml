# SSOT Concept Manifest — the RESIDUAL half (#1799)
#
# Machine-readable single-owner-per-concept registry. Every concept whose
# owner file lives inside a `common/<pkg>/` package is now DECLARED in that
# package's own `contract.py` (`concepts=[ConceptRecord(...), ...]`) instead
# of being hand-copied here — `common.meta.data.projection.concept_index`
# computes the package half from the contracts (mirroring `contract_index`'s
# `ac_index` for roadmap ACs). This file holds only what's left: concepts
# with NO owning package — governance docs (docs/agents/, docs/contributing/)
# and the one frontend-app-local doc (apps/frontend/) — a package-model
# concept can never absorb these since no package owns them. Every entry
# below is residual by construction; there is nothing left to move out.
#
# check_manifest.py validates the UNION of this residual file and every
# package's declared `concepts` (see common/meta/extension/check_manifest.py,
# AC-meta.manifest.1) — same rules as before, computed from more places.
#
# Format (identical to a package's ConceptRecord):
#   concepts:
#     <concept_key>:
#       owner: <relative-path>[#anchor]   # MUST exist on disk (file part)
#       description: <one-liner>
#       cross_refs:                       # Optional; every path MUST exist
#         - <relative-path>
#
# Rules enforced by check_manifest.py (over the computed union):
#   1. No two concepts may share the same owner.
#   2. Every owner file path (ignoring #anchor) must exist on disk.
#   3. Every cross_ref file path (ignoring #anchor) must exist on disk.
#   4. Every #anchor must resolve to a heading/id in the referenced file.

concepts:

  api_client_pattern:
    owner: apps/frontend/frontend-patterns.md
    description: "Frontend MUST use lib/api.ts wrapper; never raw fetch()."
    family: frontend
    cross_refs:
      - AGENTS.md
      - docs/agents/red-lines.md
      - apps/frontend/src/lib/api.ts

  security_red_lines:
    owner: docs/agents/red-lines.md
    description: Hard security and integrity rules agents must never violate.
    cross_refs:
      - AGENTS.md

  agent_orchestration:
    owner: docs/agents/orchestration.md
    description: Delegation rules, STAR framework, deliverable scope.
    cross_refs:
      - AGENTS.md

  branch_policy:
    owner: docs/contributing/branch-policy.md
    description: No commits to main; one branch at a time; PR lifecycle.
    cross_refs:
      - AGENTS.md
      - docs/agents/orchestration.md
