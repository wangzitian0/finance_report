# Futu Brokerage PDF Format Template
# Synthetic format for E2E testing only; contains no sensitive data.

source: futu

page:
  size: A4
  width: 595.27
  height: 841.89
  margins:
    top: 72
    bottom: 72
    left: 72
    right: 72

fonts:
  header:
    family: Helvetica-Bold
    size: 14
  body:
    family: Helvetica
    size: 10
  table_header:
    family: Helvetica-Bold
    size: 9
  table_body:
    family: Helvetica
    size: 9

tables:
  account_summary:
    columns:
      - name: Account
        width: 100
        align: left
      - name: Opening Balance
        width: 100
        align: right
      - name: Closing Balance
        width: 100
        align: right
    header_style:
      background: "#CCCCCC"
      text_color: "#000000"

  transaction_details:
    columns:
      - name: Date
        width: 80
        align: left
      - name: Type
        width: 100
        align: left
      - name: Description
        width: 200
        align: left
      - name: Amount
        width: 100
        align: right
      - name: Currency
        width: 60
        align: left
    header_style:
      background: "#CCCCCC"
      text_color: "#000000"
    row_style:
      background: "#FFFFFF"
      border: "1px solid #000000"

text_elements:
  account_number:
    format: "Account: ****{last4}"
  statement_period:
    format: "Statement Period: MMM YYYY"
  currency: "SGD"

real_format_contract:
  source: futu
  sensitive_data_policy: sanitized_format_metadata_only
  tolerances:
    page_size_points: 10
    column_width_points: 8
  source_formats:
    date_regex: "^\\d{4}-\\d{2}-\\d{2}$"
    currency: "SGD"
  key_text:
    - "Futu Securities - Monthly Statement"
    - "Activity and Valuation"
  tables:
    transaction_details:
      min_rows: 6
      columns:
        - Date
        - Type
        - Description
        - Amount
        - Currency
      column_widths:
        - 80
        - 100
        - 200
        - 100
        - 60
