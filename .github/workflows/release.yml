# Production Release Workflow
#
# Split out of deploy.yml (EPIC-008 AC8.13.154) so the production release line
# is its own manual-dispatch workflow with a dedicated production-release
# concurrency group. deploy.yml keeps staging deploys, the on-demand staging
# AI/OCR diagnostic, and tag-push release-image promotion.
#
# Manual dispatch only — production is never auto-deployed. `dry_run=true`
# validates release prerequisites without mutating production; `dry_run=false`
# promotes the staging-validated release tag through deploy_v2.
name: Release

run-name: ${{ inputs.dry_run && format('Production Release Dry Run {0}', inputs.version_ref) || format('Production Release {0}', inputs.version_ref) }}

on:
  workflow_dispatch:
    inputs:
      version_ref:
        description: "Version ref to deploy (vX.Y.Z release tag)"
        required: true
        type: string
      dry_run:
        description: "Validate release prerequisites without deploying production"
        required: false
        default: false
        type: boolean

# Production release is serialized per version_ref so two release runs never
# mutate production concurrently. cancel-in-progress stays false: a queued
# release must not cancel an in-flight one.
concurrency:
  group: production-release-${{ inputs.version_ref || github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"

jobs:
  dry-run:
    name: Production Release Dry Run
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve release coordinate
        id: release
        env:
          VERSION_REF: ${{ inputs.version_ref }}
        run: |
          python3 tools/resolve_release_coordinate.py --version-ref "$VERSION_REF"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          save-cache: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Verify source CI passed
        id: source_ci
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.full_sha }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check source-ci \
            --repository "$GITHUB_REPOSITORY" \
            --release-sha "$RELEASE_SHA"

      - name: Verify release images workflow passed
        id: release_images_run
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.full_sha }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check release-images-run \
            --repository "$GITHUB_REPOSITORY" \
            --release-sha "$RELEASE_SHA"

      - name: Verify staging passed
        id: staging
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_REF: ${{ steps.release.outputs.version_ref }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check staging \
            --repository "$GITHUB_REPOSITORY" \
            --version-ref "$VERSION_REF"

      - name: Verify Release Codebase
        env:
          GITHUB_SHA: ${{ steps.release.outputs.full_sha }}
        run: |
          set -euo pipefail
          moon run :lint

      - name: Validate Migration Risk Contract
        run: |
          mkdir -p ci-context
          uv run --with pyyaml python tools/check_migration_risk.py \
            --summary ci-context/production-migration-risk-context.md

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Release Images Dry Run
        id: release_images
        env:
          VERSION_REF: ${{ steps.release.outputs.version_ref }}
        run: |
          set -euo pipefail
          python tools/verify_release_images.py \
            --registry "${{ env.REGISTRY }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --version-ref "$VERSION_REF"

      - name: Summary
        run: |
          {
            echo "## Production Release Dry Run"
            echo ""
            echo "- Release version_ref: ${{ steps.release.outputs.version_ref }}"
            echo "- Released commit: ${{ steps.release.outputs.full_sha }}"
            echo "- Source CI run: ${{ steps.source_ci.outputs.run_id }}"
            echo "- Release images run: ${{ steps.release_images_run.outputs.run_id }}"
            echo "- Staging run: ${{ steps.staging.outputs.run_id }}"
            echo "- Backend release image digest: ${{ steps.release_images.outputs.backend_digest }}"
            echo "- Frontend release image digest: ${{ steps.release_images.outputs.frontend_digest }}"
            echo "- No rebuild occurred: true"
            echo "- Production mutation skipped: true"
            echo ""
            cat ci-context/production-migration-risk-context.md
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Production mutation skipped"

      - name: Write production dry-run context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Release Dry-run Context"
            echo "=================================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "version_ref=${{ steps.release.outputs.version_ref }}"
            echo "release_full_sha=${{ steps.release.outputs.full_sha }}"
            echo "release_short_sha=${{ steps.release.outputs.short_sha }}"
            echo "iac_ref=${{ steps.release.outputs.iac_ref }}"
            echo "source_ci_run_id=${{ steps.source_ci.outputs.run_id }}"
            echo "release_images_run_id=${{ steps.release_images_run.outputs.run_id }}"
            echo "staging_run_id=${{ steps.staging.outputs.run_id }}"
            echo "production_mutation_skipped=true"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.release.outputs.version_ref }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.release.outputs.version_ref }}"
            echo "backend_digest=${{ steps.release_images.outputs.backend_digest }}"
            echo "frontend_digest=${{ steps.release_images.outputs.frontend_digest }}"
            echo "no_rebuild=true"
          } > ci-context/production-dry-run-context.txt

      - name: Upload production dry-run context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: production-dry-run-context
          path: |
            ci-context/production-dry-run-context.txt
            ci-context/production-migration-risk-context.md
          retention-days: 14

  deploy:
    name: Production Deploy
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
    environment:
      name: production
      url: https://report.zitian.party
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve release coordinate
        id: release
        env:
          VERSION_REF: ${{ inputs.version_ref }}
        run: |
          python3 tools/resolve_release_coordinate.py --version-ref "$VERSION_REF"

      - name: Verify source CI passed
        id: source_ci
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.full_sha }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check source-ci \
            --repository "$GITHUB_REPOSITORY" \
            --release-sha "$RELEASE_SHA"

      - name: Verify release images workflow passed
        id: release_images_run
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.full_sha }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check release-images-run \
            --repository "$GITHUB_REPOSITORY" \
            --release-sha "$RELEASE_SHA"

      - name: Verify staging passed
        id: staging
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_REF: ${{ steps.release.outputs.version_ref }}
        run: |
          set -euo pipefail
          python tools/verify_release_evidence.py \
            --check staging \
            --repository "$GITHUB_REPOSITORY" \
            --version-ref "$VERSION_REF"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify release images
        id: verify_images
        env:
          VERSION_REF: ${{ steps.release.outputs.version_ref }}
        run: |
          set -euo pipefail
          python tools/verify_release_images.py \
            --registry "${{ env.REGISTRY }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --version-ref "$VERSION_REF"

      - name: Install deploy_v2 dependencies
        id: install_deploy_v2
        run: python -m pip install httpx python-dotenv rich

      - name: Probe current production version
        id: production_before
        continue-on-error: true
        run: |
          status_file="$(mktemp)"
          body_file="$(mktemp)"
          http_status="$(
            curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 5 \
              --max-time 15 \
              --header "Cache-Control: no-cache" \
              --header "Pragma: no-cache" \
              --output "$body_file" \
              --write-out "%{http_code}" \
              "https://report.zitian.party/api/health" \
              2>"$status_file" || true
          )"
          metadata_file="$(mktemp)"
          python3 - "$body_file" > "$metadata_file" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          try:
              payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8") or "{}")
          except json.JSONDecodeError:
              payload = {}

          def clean(value):
              return str(value or "").strip().replace("\n", " ").replace("\r", " ")[:200]

          health_version = clean(payload.get("version"))
          git_sha = clean(payload.get("git_sha"))
          rollback_ref = ""
          for candidate in (health_version, git_sha):
              if re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", candidate):
                  rollback_ref = candidate
                  break

          print(f"version={git_sha or health_version}")
          print(f"health_version={health_version}")
          print(f"git_sha={git_sha}")
          print(f"rollback_ref={rollback_ref}")
          PY
          cat "$metadata_file" >> "$GITHUB_OUTPUT"
          echo "http_status=${http_status:-000}" >> "$GITHUB_OUTPUT"
          if [ -s "$status_file" ]; then
            probe_error="$(head -c 200 "$status_file" | tr '\n\r' '  ')"
            echo "probe_error=${probe_error}" >> "$GITHUB_OUTPUT"
          else
            echo "probe_error=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with deploy_v2
        id: deploy_v2
        working-directory: repo
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          set -euo pipefail
          version_ref="${{ steps.release.outputs.version_ref }}"
          iac_ref="${{ steps.release.outputs.iac_ref }}"
          echo "Deploying production via deploy_v2: type=prod version-ref=$version_ref iac-ref=$iac_ref"
          python -m tools.deploy_v2 \
            --service finance_report/app \
            --type prod \
            --version-ref "$version_ref" \
            --iac-ref "$iac_ref" \
            --domain zitian.party \
            --staging-validated \
            --code-reviewed \
            --timeout 600

      - name: Confirm production backend health
        id: deploy_health
        run: |
          set -euo pipefail
          bash tools/health_check.sh \
            "https://report.zitian.party/api/health" \
            "production" \
            24 \
            "${{ steps.release.outputs.version_ref }}"

      - name: Production Infrastructure Smoke
        id: production_infra_smoke
        run: |
          python tools/production_infra_smoke.py \
            --base-url "https://report.zitian.party" \
            --expected-sha "${{ steps.release.outputs.version_ref }}" \
            --signoz-url "https://signoz.zitian.party" \
            --signoz-api-key "${{ secrets.SIGNOZ_API_KEY }}" \
            --expected-version "${{ steps.release.outputs.version_ref }}" \
            --deployment-environment "production"

      - name: Smoke Tests
        id: production_smoke
        run: bash tools/smoke_test.sh https://report.zitian.party production

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Production Read-only E2E Smoke
        id: production_readonly_e2e
        env:
          APP_URL: https://report.zitian.party
          FRONTEND_URL: https://report.zitian.party
          TEST_ENV: production
          PROD_SMOKE_EMAIL: ${{ secrets.PROD_SMOKE_EMAIL }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
        run: |
          mkdir -p test-results
          pytest tests/e2e/test_production_readonly_smoke.py -v -m "prod_safe" --junit-xml=test-results/production-readonly-e2e.xml

      - name: Roll back production after post-deploy failure
        id: production_rollback
        if: ${{ failure() && steps.deploy_v2.outcome == 'success' && steps.production_before.outputs.rollback_ref != '' && (steps.deploy_health.outcome == 'failure' || steps.production_infra_smoke.outcome == 'failure' || steps.production_smoke.outcome == 'failure' || steps.production_readonly_e2e.outcome == 'failure') }}
        working-directory: repo
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          set -euo pipefail
          rollback_ref="${{ steps.production_before.outputs.rollback_ref }}"
          iac_ref="${{ steps.release.outputs.iac_ref }}"
          echo "Rolling back production via deploy_v2 to $rollback_ref with iac_ref=$iac_ref"
          python -m tools.deploy_v2 \
            --service finance_report/app \
            --type prod \
            --version-ref "$rollback_ref" \
            --iac-ref "$iac_ref" \
            --domain zitian.party \
            --staging-validated \
            --code-reviewed \
            --timeout 600

          bash ../tools/health_check.sh \
            "https://report.zitian.party/api/health" \
            "production-rollback" \
            24 \
            "$rollback_ref"

      - name: Warn when production rollback cannot run
        id: production_rollback_unavailable
        if: ${{ failure() && steps.deploy_v2.outcome == 'success' && steps.production_before.outputs.rollback_ref == '' && (steps.deploy_health.outcome == 'failure' || steps.production_infra_smoke.outcome == 'failure' || steps.production_smoke.outcome == 'failure' || steps.production_readonly_e2e.outcome == 'failure') }}
        run: |
          echo "::warning::Production rollback skipped: pre-deploy health did not expose a deploy_v2/prod-compatible release tag. health_version='${{ steps.production_before.outputs.health_version }}' git_sha='${{ steps.production_before.outputs.git_sha }}'"

      - name: Write production deploy context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          failure_domain="none"
          failed_step="none"
          failure_summary="Production release deploy completed."
          if [ "${{ steps.source_ci.outcome }}" = "failure" ]; then
            failure_domain="source-ci"
            failed_step="source_ci"
            failure_summary="No successful main CI run was found for the release commit."
          elif [ "${{ steps.release_images_run.outcome }}" = "failure" ]; then
            failure_domain="release-images-run"
            failed_step="release_images_run"
            failure_summary="No successful deploy.yml run was found for the release commit."
          elif [ "${{ steps.staging.outcome }}" = "failure" ]; then
            failure_domain="staging-validation"
            failed_step="staging"
            failure_summary="No successful staging deploy run was found for the release tag."
          elif [ "${{ steps.verify_images.outcome }}" = "failure" ]; then
            failure_domain="registry-release-image"
            failed_step="verify_images"
            failure_summary="Version-tagged release image was missing before production mutation."
          elif [ "${{ steps.install_deploy_v2.outcome }}" = "failure" ]; then
            failure_domain="toolchain/deploy-v2-deps"
            failed_step="install_deploy_v2"
            failure_summary="deploy_v2 dependency install failed before production mutation."
          elif [ "${{ steps.deploy_v2.outcome }}" = "failure" ]; then
            failure_domain="deploy-v2-rollout"
            failed_step="deploy_v2"
            failure_summary="deploy_v2 production deploy failed (data-lane red lines, staging validation, Dokploy rollout, or effective-config verify)."
          elif [ "${{ steps.deploy_health.outcome }}" = "failure" ]; then
            failure_domain="production-route-health"
            failed_step="deploy_health"
            failure_summary="Production public health gate failed: Traefik did not serve the deployed tag in time."
          elif [ "${{ steps.production_infra_smoke.outcome }}" = "failure" ]; then
            failure_domain="production-infra-smoke"
            failed_step="production_infra_smoke"
            failure_summary="Production infrastructure smoke failed after deploy health."
          elif [ "${{ steps.production_smoke.outcome }}" = "failure" ]; then
            failure_domain="production-app-smoke"
            failed_step="production_smoke"
            failure_summary="Production application smoke failed after deploy health."
          elif [ "${{ steps.production_readonly_e2e.outcome }}" = "failure" ]; then
            failure_domain="production-readonly-e2e"
            failed_step="production_readonly_e2e"
            failure_summary="Production read-only E2E failed after release health."
          fi
          {
            echo "Production Deploy Context"
            echo "========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "version_ref=${{ steps.release.outputs.version_ref }}"
            echo "release_full_sha=${{ steps.release.outputs.full_sha }}"
            echo "release_short_sha=${{ steps.release.outputs.short_sha }}"
            echo "iac_ref=${{ steps.release.outputs.iac_ref }}"
            echo "source_ci_run_id=${{ steps.source_ci.outputs.run_id }}"
            echo "release_images_run_id=${{ steps.release_images_run.outputs.run_id }}"
            echo "staging_run_id=${{ steps.staging.outputs.run_id }}"
            echo "app_url=https://report.zitian.party"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.release.outputs.version_ref }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.release.outputs.version_ref }}"
            echo "backend_digest=${{ steps.verify_images.outputs.backend_digest }}"
            echo "frontend_digest=${{ steps.verify_images.outputs.frontend_digest }}"
            echo "production_before_http_status=${{ steps.production_before.outputs.http_status }}"
            echo "production_before_version=${{ steps.production_before.outputs.version }}"
            echo "production_before_health_version=${{ steps.production_before.outputs.health_version }}"
            echo "production_before_git_sha=${{ steps.production_before.outputs.git_sha }}"
            echo "production_before_rollback_ref=${{ steps.production_before.outputs.rollback_ref }}"
            echo "production_before_probe_error=${{ steps.production_before.outputs.probe_error }}"
            echo "verify_images_outcome=${{ steps.verify_images.outcome }}"
            echo "deploy_v2_outcome=${{ steps.deploy_v2.outcome }}"
            echo "deploy_health_outcome=${{ steps.deploy_health.outcome }}"
            echo "production_infra_smoke_outcome=${{ steps.production_infra_smoke.outcome }}"
            echo "production_smoke_outcome=${{ steps.production_smoke.outcome }}"
            echo "production_readonly_e2e_outcome=${{ steps.production_readonly_e2e.outcome }}"
            echo "production_rollback_outcome=${{ steps.production_rollback.outcome }}"
            echo "production_rollback_unavailable_outcome=${{ steps.production_rollback_unavailable.outcome }}"
            echo "failure_domain=${failure_domain}"
            echo "failed_step=${failed_step}"
            echo "failure_summary=${failure_summary}"
            echo "signoz_logs_query_url=https://signoz.zitian.party/logs?service.name=finance-report-backend&deployment.environment=production&service.version=${{ steps.release.outputs.version_ref }}&github.run_id=${{ github.run_id }}"
            echo "signoz_traces_query_url=https://signoz.zitian.party/traces?service.name=finance-report-backend&deployment.environment=production&service.version=${{ steps.release.outputs.version_ref }}&github.run_id=${{ github.run_id }}"
            echo "marker=prod_safe"
          } > ci-context/production-deploy-context.txt

      - name: Upload production deploy test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: production-deploy-test-context
          path: |
            test-results/
            ci-context/production-deploy-context.txt
          retention-days: 14
