# Staging AI/OCR Gate (reusable)
#
# Single owner of the provider-backed staging AI/OCR corpus replay. Both the
# inline staging deploy chain (`deploy.yml#ai-ocr-gate`, record-only) and the
# on-demand manual dispatch (`deploy.yml#manual-ai-ocr-gate`, fail-fast) call
# this reusable workflow so the gate body cannot drift between two copies
# (EPIC-008 AC8.13.153). The `blocking` input is the ONLY behavioral difference:
#   - blocking=false -> record the regression as a right-shifted, non-blocking
#     status output and always exit 0 (post-merge delivery reads the status).
#   - blocking=true  -> fail the job when the gate fails (manual diagnostic).
name: Staging AI/OCR Gate (reusable)

on:
  workflow_call:
    inputs:
      commit_ref:
        description: "Git ref to check out for the gate run"
        required: true
        type: string
      expected_sha:
        description: "Expected deployed version_ref or commit SHA (40-hex SHAs are shortened to 7)"
        required: true
        type: string
      blocking:
        description: "true = fail the job on gate failure; false = record-only and exit 0"
        required: false
        default: false
        type: boolean
      corpus:
        description: "Which AI/OCR corpus to run: canary (minimal blocking liveness), audit_replay (comprehensive nightly journeys), or all"
        required: false
        default: canary
        type: string
    outputs:
      ai_ocr_status:
        description: "passed | regression-failed | provider-transient | precondition-failed | version-check-failed | gate-timeout | not-run"
        value: ${{ jobs.run.outputs.ai_ocr_status }}
      ai_ocr_exit_code:
        description: "Exit code observed by the gate (0 when passed)"
        value: ${{ jobs.run.outputs.ai_ocr_exit_code }}

env:
  # #1596: the staging -m llm gates exist to prove the LIVE provider works —
  # force the cassette layer into live passthrough (layer-owned knob).
  LLM_LIVE: "1"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v
  APP_URL: https://report-staging.zitian.party
  TEST_ENV: staging
  SKIP_UI_TESTS: false
  STRICT_E2E_GATES: true
  PARSING_TIMEOUT_MS: 480000

jobs:
  run:
    name: Staging AI/OCR Gate
    runs-on: ubuntu-latest
    # #1767/AC8.13.167: sized for corpus=all worst case (13 sequential parse waits
    # -- tools/staging_ai_ocr_gate_contract.py totals()['uploads'] -- x the 8-min
    # PARSING_TIMEOUT_MS ceiling each) plus checkout/setup/summary overhead.
    timeout-minutes: 125
    permissions:
      contents: read
      issues: write  # #1623: open the GitHub-issue fallback alert on regression
    outputs:
      ai_ocr_status: ${{ steps.staging_ai_ocr_tests.outputs.ai_ocr_status || steps.gate_timeout_fallback.outputs.ai_ocr_status || 'not-run' }}
      ai_ocr_exit_code: ${{ steps.staging_ai_ocr_tests.outputs.ai_ocr_exit_code || steps.gate_timeout_fallback.outputs.ai_ocr_exit_code || '0' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_ref }}

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Run Staging AI/OCR Gate
        id: staging_ai_ocr_tests
        # #1767/AC8.13.167: budget sized per corpus so the WHOLE corpus can finish
        # even if every sequential parse wait hits the 8-min PARSING_TIMEOUT_MS
        # ceiling, not just the happy path. The multiplier is the corpus's total
        # sequential parse-wait count (contract.py totals()['uploads']: canary=2,
        # audit_replay=11, all=13 -- pytest runs single-worker, no -n xdist, so
        # every wait across every file is fully serial) plus checkout/setup
        # overhead, not a per-file or per-journey guess.
        timeout-minutes: ${{ inputs.corpus == 'canary' && 25 || (inputs.corpus == 'all' && 115 || 100) }}
        env:
          EXPECTED_SHA_RAW: ${{ inputs.expected_sha }}
          BLOCKING: ${{ inputs.blocking }}
          CORPUS: ${{ inputs.corpus }}
          # #1623: open the GitHub-issue fallback alert with the built-in token
          # when the record-only gate regresses (no new secret needed).
          GH_TOKEN: ${{ github.token }}
        run: |
          # Normalize a full 40-hex commit SHA down to the 7-char tag used by the
          # published images; leave a vX.Y.Z release version_ref untouched.
          if [[ "$EXPECTED_SHA_RAW" =~ ^[0-9a-f]{40}$ ]]; then
            EXPECTED_SHA="${EXPECTED_SHA_RAW:0:7}"
          else
            EXPECTED_SHA="$EXPECTED_SHA_RAW"
          fi

          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          write_staging_audit_inventory() {
            {
              echo "## Staging Audit Replay Inputs"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected version: ${EXPECTED_SHA}"
              echo "- Backend image tag: ${REGISTRY}/${IMAGE_PREFIX}-backend:${EXPECTED_SHA}"
              echo "- Frontend image tag: ${REGISTRY}/${IMAGE_PREFIX}-frontend:${EXPECTED_SHA}"
              echo "- App URL: ${APP_URL}"
              echo "- Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
              echo "- Fixture tests:"
              for fixture_test in "${STAGING_AI_OCR_TESTS[@]}"; do
                echo "  - ${fixture_test}"
              done
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          }

          write_staging_audit_result() {
            local status="$1"
            local verified_uploads="unknown"
            local verified_parse_completions="unknown"
            local verified_brokerage_imports="unknown"
            local verified_report_verifications="unknown"
            local verified_failures="1+"
            if [ "$status" = "0" ]; then
              verified_uploads="${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              verified_parse_completions="${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              verified_brokerage_imports="${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              verified_report_verifications="${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              verified_failures="0"
            fi
            {
              echo "## Staging Audit Replay Summary"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected version: ${EXPECTED_SHA}"
              echo "- Gate status: ${status}"
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
              echo "- Uploads verified: ${verified_uploads}"
              echo "- Parse completions verified: ${verified_parse_completions}"
              echo "- Brokerage imports verified: ${verified_brokerage_imports}"
              echo "- Report verifications verified: ${verified_report_verifications}"
              echo "- Failures observed: ${verified_failures}"
              echo "- Audit filter: attributes.audit_event EXISTS"
            } | tee -a "$GITHUB_STEP_SUMMARY"
            # #1089: surface which corpus docs actually failed (and real counts)
            # from the JUnit output instead of a binary "unknown / 1+".
            if [ -f test-results/staging-ai-ocr-gate.xml ]; then
              echo "" | tee -a "$GITHUB_STEP_SUMMARY"
              .venv/bin/python tools/staging_ai_ocr_gate_contract.py \
                --summarize-junit test-results/staging-ai-ocr-gate.xml \
                | tee -a "$GITHUB_STEP_SUMMARY" || true
            fi
          }

          record_and_finish() {
            # Record the gate outcome as job outputs, then honor the blocking mode.
            #   blocking=true  -> fail the job with the gate status (manual diagnostic).
            #   blocking=false -> right-shift: record the status output and exit 0 so
            #                     the job stays green (replaces the old inline
            #                     continue-on-error: true). post-merge delivery reads
            #                     ai_ocr_status, not the job result.
            local status="$1"
            local ai_ocr_status="$2"
            echo "ai_ocr_status=${ai_ocr_status}" >> "$GITHUB_OUTPUT"
            echo "ai_ocr_exit_code=${status}" >> "$GITHUB_OUTPUT"
            if [ "$status" -ne 0 ] && [ "$BLOCKING" = "true" ]; then
              exit "$status"
            fi
            if [ "$status" -ne 0 ]; then
              echo "::warning::Staging AI/OCR gate '${ai_ocr_status}' recorded as right-shifted regression; not blocking release-critical delivery."
              # #1623: give the record-only gate teeth. This gate runs in GitHub
              # Actions, which the SigNoz->Feishu alert bridge does not watch, so
              # use the documented GitHub-issue fallback (Infra-012 P2): a
              # real-provider regression (a class cassette replay cannot catch)
              # becomes a visible issue with no new secret. Dedup so re-runs of a
              # standing regression do not spam.
              alert_title="[staging-ai-ocr] real-provider regression: ${ai_ocr_status}"
              existing="$(gh issue list --state open --search "in:title ${alert_title}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
              if [ -z "$existing" ]; then
                # #1806/AC-testing.deploy-gates.39: the body carries the machine
                # attribution of every failed case (regression | precondition |
                # transient) instead of a hardcoded parse-quality claim.
                if [ -f test-results/staging-ai-ocr-alert-body.md ]; then
                  gh issue create --title "$alert_title" --label "surface: ai-ocr" \
                    --body-file test-results/staging-ai-ocr-alert-body.md \
                    || echo "::warning::GitHub-issue alert creation failed (non-fatal)."
                else
                  gh issue create --title "$alert_title" --label "surface: ai-ocr" \
                    --body "Post-merge staging AI/OCR gate failed (\`${ai_ocr_status}\`) on ${APP_URL} at run ${GITHUB_RUN_ID:-?} (${EXPECTED_SHA:-?}). No JUnit attribution is available for this failure mode. See the run's step summary." \
                    || echo "::warning::GitHub-issue alert creation failed (non-fatal)."
                fi
              else
                echo "::notice::open staging-ai-ocr regression issue #${existing} already exists; not duplicating."
              fi
            fi
            exit 0
          }

          echo "Starting Staging AI/OCR Gate for $APP_URL"
          echo "Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
          echo "Blocking mode: ${BLOCKING}"
          echo "Corpus: ${CORPUS:-canary}"
          eval "$(.venv/bin/python tools/staging_ai_ocr_gate_contract.py --shell --corpus "${CORPUS:-canary}")"
          mkdir -p test-results
          write_staging_audit_inventory

          version_status=0
          run_timed_phase "Staging AI/OCR Version Check" \
            pytest tests/e2e/test_version_check.py -v -m "smoke" --junit-xml=test-results/staging-ai-ocr-version.xml || version_status=$?
          if [ "$version_status" -ne 0 ]; then
            write_staging_audit_result "$version_status"
            record_and_finish "$version_status" "version-check-failed"
          fi

          # #1806/AC-testing.deploy-gates.37: read the deployed health surface
          # before spending the corpus budget — an unhealthy environment fails as
          # its own precondition class, never as an extraction regression.
          preflight_status=0
          run_timed_phase "Staging AI/OCR Preflight (deployed health surface)" \
            .venv/bin/python tools/staging_ai_ocr_gate_contract.py --preflight --base-url "$APP_URL" || preflight_status=$?
          if [ "$preflight_status" -ne 0 ]; then
            write_staging_audit_result "$preflight_status"
            record_and_finish "$preflight_status" "precondition-failed"
          fi

          gate_status=0
          run_timed_phase "Staging AI/OCR Gate (primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL})" \
            pytest "${STAGING_AI_OCR_TESTS[@]}" \
              -v -m "llm" --junit-xml=test-results/staging-ai-ocr-gate.xml || gate_status=$?

          if [ "$gate_status" -ne 0 ]; then
            # #1806/AC-testing.deploy-gates.38: attribute every failed case from
            # the JUnit output; transient-only reds earn exactly one retry of the
            # affected files, and a transient red on two consecutive runs
            # escalates so transience can never mask a standing regression.
            AI_OCR_FAILURE_CLASS="regression-failed"
            AI_OCR_RETRY_TESTS=()
            eval "$(.venv/bin/python tools/staging_ai_ocr_gate_contract.py \
              --classify-junit test-results/staging-ai-ocr-gate.xml \
              --alert-body-out test-results/staging-ai-ocr-alert-body.md \
              --run-id "${GITHUB_RUN_ID:-?}" --expected-sha "${EXPECTED_SHA:-?}" \
              --app-url "$APP_URL")" || true

            if [ "$AI_OCR_FAILURE_CLASS" = "provider-transient" ] && [ "${#AI_OCR_RETRY_TESTS[@]}" -gt 0 ]; then
              retry_status=0
              run_timed_phase "Staging AI/OCR transient retry (single, bounded)" \
                pytest "${AI_OCR_RETRY_TESTS[@]}" \
                  -v -m "llm" --junit-xml=test-results/staging-ai-ocr-retry.xml || retry_status=$?
              if [ "$retry_status" -eq 0 ]; then
                echo "::notice::transient failures recovered on the single bounded retry."
                gate_status=0
              else
                transient_title="[staging-ai-ocr] real-provider regression: provider-transient"
                prior_transient="$(gh issue list --state open --search "in:title ${transient_title}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
                if [ -n "$prior_transient" ]; then
                  echo "::warning::transient class reproduced with open transient alert #${prior_transient} standing; escalating to regression-failed."
                  AI_OCR_FAILURE_CLASS="regression-failed"
                fi
              fi
            fi
          fi

          write_staging_audit_result "$gate_status"
          if [ "$gate_status" -ne 0 ]; then
            record_and_finish "$gate_status" "$AI_OCR_FAILURE_CLASS"
          fi

          # #1806/AC-testing.deploy-gates.40: a green run closes the loop — every
          # standing gate alert is resolved by this run's evidence, so an issue
          # titled "regression" can never keep lying after the gate recovers.
          for resolved_title in \
            "[staging-ai-ocr] real-provider regression: regression-failed" \
            "[staging-ai-ocr] real-provider regression: provider-transient" \
            "[staging-ai-ocr] real-provider regression: precondition-failed" \
            "[staging-ai-ocr] real-provider regression: version-check-failed" \
            "[staging-ai-ocr] gate produced no result (likely step timeout)"; do
            resolved_number="$(gh issue list --state open --search "in:title ${resolved_title}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
            if [ -n "$resolved_number" ]; then
              gh issue close "$resolved_number" \
                --comment "Auto-closing: staging AI/OCR gate run ${GITHUB_RUN_ID:-?} (corpus=${CORPUS:-canary}, version=${EXPECTED_SHA:-?}) completed green." \
                || echo "::warning::auto-close of alert issue #${resolved_number} failed (non-fatal)."
            fi
          done

          echo "ai_ocr_status=passed" >> "$GITHUB_OUTPUT"
          echo "ai_ocr_exit_code=0" >> "$GITHUB_OUTPUT"
          echo "Staging AI/OCR Gate passed."

      - name: Alert on gate timeout (diagnostics-blind failure)
        id: gate_timeout_fallback
        # #1767/AC8.13.166: the corpus step's own record_and_finish() alerting
        # only runs on a clean pytest completion (regression or version-check
        # exit). If that step is instead killed by ITS OWN timeout-minutes (or
        # crashes) before reaching record_and_finish, ai_ocr_status is never
        # set: no JUnit, no step summary, no alert issue, and the job output
        # silently falls back to the generic 'not-run'. Gate on exactly that
        # condition (non-success outcome + empty output) so a diagnostics-blind
        # failure can never go unreported, independent of the step's own budget.
        if: ${{ always() && steps.staging_ai_ocr_tests.outcome != 'success' && steps.staging_ai_ocr_tests.outputs.ai_ocr_status == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "ai_ocr_status=gate-timeout" >> "$GITHUB_OUTPUT"
          echo "ai_ocr_exit_code=124" >> "$GITHUB_OUTPUT"
          {
            echo "## Staging AI/OCR Gate — diagnostics-blind failure"
            echo ""
            echo "The gate step ended with outcome \`${{ steps.staging_ai_ocr_tests.outcome }}\`"
            echo "without producing a result (most likely killed by its own"
            echo "timeout-minutes before any test finished). No JUnit or"
            echo "regression detail is available from this run."
          } | tee -a "$GITHUB_STEP_SUMMARY"
          alert_title="[staging-ai-ocr] gate produced no result (likely step timeout)"
          existing="$(gh issue list --state open --search "in:title ${alert_title}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [ -z "$existing" ]; then
            gh issue create --title "$alert_title" --label "surface: ai-ocr" \
              --body "Staging AI/OCR gate run ${{ github.run_id }} (corpus=${{ inputs.corpus }}, blocking=${{ inputs.blocking }}) on ${{ inputs.commit_ref }} ended with outcome \`${{ steps.staging_ai_ocr_tests.outcome }}\` and produced no ai_ocr_status output — the corpus step likely hit its own timeout-minutes before reaching any record_and_finish call, so no JUnit/regression detail is available from this run. Widen the step budget or investigate a hang. See docs/ssot/ci-cd.md and #1767." \
              || echo "::warning::GitHub-issue alert creation failed (non-fatal)."
          else
            echo "::notice::open staging-ai-ocr gate-timeout issue #${existing} already exists; not duplicating."
          fi
          if [ "${{ inputs.blocking }}" = "true" ]; then
            exit 1
          fi
          exit 0

      - name: Write staging AI/OCR context
        if: ${{ always() }}
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          mkdir -p ci-context
          {
            echo "Staging AI/OCR Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "expected_version=${EXPECTED_SHA}"
            echo "app_url=${APP_URL}"
            echo "primary_model=${STAGING_E2E_PRIMARY_MODEL}"
            echo "ocr_model=${STAGING_E2E_OCR_MODEL}"
            echo "vision_model=${STAGING_E2E_VISION_MODEL}"
            echo "ai_ocr_outcome=${{ steps.staging_ai_ocr_tests.outcome }}"
            echo "blocking=${{ inputs.blocking }}"
            echo "corpus=${{ inputs.corpus }}"
            echo "provider_resource_boundary=isolated-users-provider-gate-only"
            echo "provider_replay_cleanup_contract=gate tests must not use shared mutable user fixtures; retries remain scoped to staging AI/OCR relevance"
            echo "strict_e2e_gates=true"
            echo "marker=llm"
          } > ci-context/staging-ai-ocr-context.txt

      - name: Upload staging AI/OCR test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: staging-ai-ocr-test-context
          path: |
            test-results/
            ci-context/staging-ai-ocr-context.txt
          retention-days: 14
