# Staging AI/OCR Gate Workflow
#
# Triggers after a successful Deploy Staging workflow.
# Separates provider-backed parsing correctness from deploy health.

name: Staging AI/OCR Gate

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-ai-ocr
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  APP_URL: https://report-staging.zitian.party
  TEST_ENV: staging
  SKIP_UI_TESTS: false
  STRICT_E2E_GATES: true
  PARSING_TIMEOUT_MS: 480000
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v

jobs:
  ai-ocr-gate:
    name: Staging AI/OCR Gate
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve expected SHA
        id: expected_sha
        run: |
          full_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "full_sha=${full_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${full_sha:0:7}" >> "$GITHUB_OUTPUT"
          echo "Validating staging AI/OCR for commit ${full_sha}"

      - name: Wait for matching CI success
        if: ${{ github.event_name == 'workflow_run' }}
        timeout-minutes: 45
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_FULL_SHA: ${{ steps.expected_sha.outputs.full_sha }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 2700))
          while [ "$SECONDS" -lt "$deadline" ]; do
            runs_json="$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "CI" \
              --branch main \
              --commit "$EXPECTED_FULL_SHA" \
              --event push \
              --json databaseId,status,conclusion,url \
              --limit 10)"
            ci_state="$(python - "$runs_json" <<'PY'
          import json
          import sys

          runs = json.loads(sys.argv[1])
          if not runs:
              print("missing")
              raise SystemExit
          run = runs[0]
          print("|".join(str(run.get(key) or "") for key in ("status", "conclusion", "url")))
          PY
          )"

            if [ "$ci_state" = "missing" ]; then
              echo "No CI run found yet for $EXPECTED_FULL_SHA; waiting..."
              sleep 30
              continue
            fi

            IFS='|' read -r status conclusion url <<< "$ci_state"
            echo "CI for $EXPECTED_FULL_SHA: status=$status conclusion=${conclusion:-pending} url=$url"
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                exit 0
              fi
              echo "::error::Skipping provider-backed AI/OCR gate because matching CI concluded '$conclusion': $url"
              exit 1
            fi
            sleep 30
          done

          echo "::error::Timed out waiting for matching CI success for $EXPECTED_FULL_SHA"
          exit 1

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Run Staging AI/OCR Gate
        timeout-minutes: 22
        env:
          EXPECTED_SHA: ${{ steps.expected_sha.outputs.short_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "Starting Staging AI/OCR Gate for $APP_URL"
          echo "Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"

          run_timed_phase "Staging AI/OCR Version Check" \
            pytest tests/e2e/test_version_check.py -v -m "smoke"

          run_timed_phase "Staging AI/OCR Gate (primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL})" \
            pytest \
              tests/e2e/test_statement_full_journey.py \
              tests/e2e/test_brokerage_upload_to_portfolio_value.py \
              tests/e2e/test_statement_upload_e2e.py \
              -v -m "llm"

          echo "Staging AI/OCR Gate passed."
