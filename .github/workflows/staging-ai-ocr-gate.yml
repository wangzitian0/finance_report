# Staging AI/OCR Gate Workflow
#
# Manual recovery entry point for provider-backed staging parsing correctness.
# Automatic post-merge AI/OCR validation runs inside Deploy Staging so the
# staging environment is not overwritten mid-gate.

name: Staging AI/OCR Gate

on:
  workflow_dispatch:

concurrency:
  group: staging-manual-ai-ocr-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  APP_URL: https://report-staging.zitian.party
  TEST_ENV: staging
  SKIP_UI_TESTS: false
  STRICT_E2E_GATES: true
  PARSING_TIMEOUT_MS: 480000
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v

jobs:
  ai-ocr-gate:
    name: Staging AI/OCR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve expected SHA
        id: expected_sha
        run: |
          full_sha="${{ github.sha }}"
          echo "full_sha=${full_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${full_sha:0:7}" >> "$GITHUB_OUTPUT"
          echo "Manually validating staging AI/OCR for commit ${full_sha}"

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Run Staging AI/OCR Gate
        id: staging_ai_ocr_tests
        timeout-minutes: 22
        env:
          EXPECTED_SHA: ${{ steps.expected_sha.outputs.short_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          write_staging_audit_inventory() {
            {
              echo "## Staging Audit Replay Inputs"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected SHA: ${EXPECTED_SHA}"
              echo "- Backend image tag: ${REGISTRY}/${IMAGE_PREFIX}-backend:${EXPECTED_SHA}"
              echo "- Frontend image tag: ${REGISTRY}/${IMAGE_PREFIX}-frontend:${EXPECTED_SHA}"
              echo "- App URL: ${APP_URL}"
              echo "- Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
              echo "- Fixture tests:"
              for fixture_test in "${STAGING_AI_OCR_TESTS[@]}"; do
                echo "  - ${fixture_test}"
              done
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          }

          write_staging_audit_result() {
            local status="$1"
            local verified_uploads="unknown"
            local verified_parse_completions="unknown"
            local verified_brokerage_imports="unknown"
            local verified_report_verifications="unknown"
            local verified_failures="1+"
            if [ "$status" = "0" ]; then
              verified_uploads="${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              verified_parse_completions="${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              verified_brokerage_imports="${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              verified_report_verifications="${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              verified_failures="0"
            fi
            {
              echo "## Staging Audit Replay Summary"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected SHA: ${EXPECTED_SHA}"
              echo "- Gate status: ${status}"
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
              echo "- Uploads verified: ${verified_uploads}"
              echo "- Parse completions verified: ${verified_parse_completions}"
              echo "- Brokerage imports verified: ${verified_brokerage_imports}"
              echo "- Report verifications verified: ${verified_report_verifications}"
              echo "- Failures observed: ${verified_failures}"
              echo "- Audit filter: attributes.audit_event EXISTS"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          }

          echo "Starting Staging AI/OCR Gate for $APP_URL"
          echo "Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
          eval "$(.venv/bin/python tools/staging_ai_ocr_gate_contract.py --shell)"
          mkdir -p test-results
          write_staging_audit_inventory

          version_status=0
          run_timed_phase "Staging AI/OCR Version Check" \
            pytest tests/e2e/test_version_check.py -v -m "smoke" --junit-xml=test-results/staging-ai-ocr-version.xml || version_status=$?
          if [ "$version_status" -ne 0 ]; then
            write_staging_audit_result "$version_status"
            exit "$version_status"
          fi

          gate_status=0
          run_timed_phase "Staging AI/OCR Gate (primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL})" \
            pytest "${STAGING_AI_OCR_TESTS[@]}" \
              -v -m "llm" --junit-xml=test-results/staging-ai-ocr-gate.xml || gate_status=$?
          write_staging_audit_result "$gate_status"
          if [ "$gate_status" -ne 0 ]; then
            exit "$gate_status"
          fi

          echo "Staging AI/OCR Gate passed."

      - name: Write staging AI/OCR context
        if: ${{ always() }}
        env:
          EXPECTED_SHA: ${{ steps.expected_sha.outputs.short_sha }}
        run: |
          mkdir -p ci-context
          {
            echo "Staging AI/OCR Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "expected_sha=${EXPECTED_SHA}"
            echo "app_url=${APP_URL}"
            echo "primary_model=${STAGING_E2E_PRIMARY_MODEL}"
            echo "ocr_model=${STAGING_E2E_OCR_MODEL}"
            echo "vision_model=${STAGING_E2E_VISION_MODEL}"
            echo "ai_ocr_outcome=${{ steps.staging_ai_ocr_tests.outcome }}"
            echo "strict_e2e_gates=true"
            echo "marker=llm"
          } > ci-context/staging-ai-ocr-context.txt

      - name: Upload staging AI/OCR test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: staging-ai-ocr-test-context
          path: |
            test-results/
            ci-context/staging-ai-ocr-context.txt
          retention-days: 14
