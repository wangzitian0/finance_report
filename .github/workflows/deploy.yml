# Deployment Workflow
#
# Trigger: tag push for release-image promotion, manual dispatch for staging
# and on-demand staging AI/OCR diagnostics.
# Production release lives in release.yml (EPIC-008 AC8.13.154); it is not a
# target here.
# Staging no longer auto-follows main.
# Per docs/ssot/environments.md, staging and prod are deployed manually;
# CI is the quality gate for development, not an auto-deploy trigger.
# Actions: promote release images or resolve release coordinate → deploy_v2 →
# Smoke/E2E → AI/OCR regression record.
# Data is persisted between deployments.

name: Deploy
run-name: ${{ github.event_name == 'push' && format('Release Images {0}', github.ref_name) || inputs.target == 'staging-ai-ocr-gate' && 'Staging AI/OCR Gate' || format('Deploy Staging {0}', inputs.version_ref) }}

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target/action"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - staging-ai-ocr-gate
      version_ref:
        description: "Version ref to deploy (vX.Y.Z release tag)"
        required: false
        type: string

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'staging' && 'staging-deploy' || github.event_name == 'workflow_dispatch' && inputs.target == 'staging-ai-ocr-gate' && format('staging-manual-ai-ocr-{0}', github.ref) || format('release-images-{0}', github.ref) }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"
  APP_URL: https://report-staging.zitian.party
  TEST_ENV: staging
  SKIP_UI_TESTS: false
  STRICT_E2E_GATES: true
  PARSING_TIMEOUT_MS: 480000

jobs:
  build-and-deploy:
    name: Deploy Staging
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: read
      contents: read
      packages: read
    outputs:
      commit_full_sha: ${{ steps.release.outputs.full_sha }}
      commit_sha: ${{ steps.release.outputs.short_sha }}
      deployed_version_ref: ${{ steps.release.outputs.version_ref }}
      staging_required: ${{ steps.gates.outputs.staging_required }}
      staging_reason: ${{ steps.gates.outputs.staging_reason }}
      provider_gate_required: ${{ steps.gates.outputs.provider_gate_required }}
      provider_gate_reason: ${{ steps.gates.outputs.provider_gate_reason }}
      ai_ocr_required: ${{ steps.gates.outputs.ai_ocr_required }}
      ai_ocr_reason: ${{ steps.gates.outputs.ai_ocr_reason }}
      failure_domain: ${{ steps.deploy_failure_context.outputs.failure_domain }}
      failed_step: ${{ steps.deploy_failure_context.outputs.failed_step }}
      failure_summary: ${{ steps.deploy_failure_context.outputs.failure_summary }}

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release coordinate
        id: release
        env:
          VERSION_REF: ${{ inputs.version_ref }}
        run: |
          python3 tools/resolve_release_coordinate.py --version-ref "$VERSION_REF"

      - name: Classify staging and AI/OCR relevance
        id: classify
        run: |
          set -euo pipefail

          # Manual dispatch always deploys staging and runs the provider/AI-OCR
          # gates; the workflow-level `concurrency: staging-deploy` group serializes
          # concurrent manual runs, so no in-job FIFO wait is needed.
          {
            echo 'env_stage_required={"staging":true}'
            echo 'env_stage_reasons={"staging":"manual-dispatch"}'
            echo 'provider_gate_required={"staging":true}'
            echo 'provider_gate_reasons={"staging":"manual-dispatch"}'
            echo 'staging_ai_ocr_required=true'
            echo 'staging_ai_ocr_reason=manual-dispatch'
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Staging Change Classification"
            echo ""
            echo "- Staging deploy required: \`true\`"
            echo "- Staging reason: \`manual-dispatch\`"
            echo "- Staging AI/OCR required: \`true\`"
            echo "- Staging AI/OCR reason: \`manual-dispatch\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Normalize staging gates
        id: gates
        env:
          ENV_STAGE_REQUIRED: ${{ steps.classify.outputs.env_stage_required }}
          ENV_STAGE_REASONS: ${{ steps.classify.outputs.env_stage_reasons }}
          PROVIDER_GATE_REQUIRED: ${{ steps.classify.outputs.provider_gate_required }}
          PROVIDER_GATE_REASONS: ${{ steps.classify.outputs.provider_gate_reasons }}
          STAGING_AI_OCR_REQUIRED: ${{ steps.classify.outputs.staging_ai_ocr_required }}
          STAGING_AI_OCR_REASON: ${{ steps.classify.outputs.staging_ai_ocr_reason }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          env_required = json.loads(os.environ["ENV_STAGE_REQUIRED"])
          env_reasons = json.loads(os.environ["ENV_STAGE_REASONS"])
          provider_required = json.loads(os.environ["PROVIDER_GATE_REQUIRED"])
          provider_reasons = json.loads(os.environ["PROVIDER_GATE_REASONS"])
          staging_ai_ocr_required_raw = os.environ.get("STAGING_AI_OCR_REQUIRED", "").strip().lower()
          staging_ai_ocr_reason = os.environ.get("STAGING_AI_OCR_REASON", "").strip()
          if staging_ai_ocr_required_raw in {"true", "false"}:
              ai_ocr_required = staging_ai_ocr_required_raw == "true"
          else:
              ai_ocr_required = provider_required["staging"]
          ai_ocr_reason = staging_ai_ocr_reason or provider_reasons["staging"]
          print(f"staging_required={str(env_required['staging']).lower()}")
          print(f"staging_reason={env_reasons['staging']}")
          print(f"provider_gate_required={str(provider_required['staging']).lower()}")
          print(f"provider_gate_reason={provider_reasons['staging']}")
          print(f"ai_ocr_required={str(ai_ocr_required).lower()}")
          print(f"ai_ocr_reason={ai_ocr_reason}")
          PY

      - name: Report staging deploy skip
        if: steps.gates.outputs.staging_required != 'true'
        run: |
          {
            echo "## Staging Deploy Skipped"
            echo ""
            echo "- Staging deploy required: \`${{ steps.gates.outputs.staging_required }}\`"
            echo "- Staging reason: \`${{ steps.gates.outputs.staging_reason }}\`"
            echo "- Target version_ref: \`${{ steps.release.outputs.version_ref }}\`"
            echo ""
            echo "No deploy_v2 mutation, smoke/E2E, or AI/OCR validation ran."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Probe current staging version
        if: steps.gates.outputs.staging_required == 'true'
        id: staging_before
        continue-on-error: true
        env:
          STAGING_HEALTH_URL: https://report-staging.zitian.party/api/health
        run: |
          response="$(curl -fsS --max-time 15 "$STAGING_HEALTH_URL" || true)"
          healthy=false
          if [ -n "$response" ]; then
            healthy=true
          fi
          staging_sha="$(
            RESPONSE="$response" python - <<'PY'
          import json
          import os

          payload = os.environ.get("RESPONSE", "")
          try:
              data = json.loads(payload) if payload else {}
          except json.JSONDecodeError:
              data = {}
          print(data.get("git_sha") or data.get("version") or "unknown")
          PY
          )"
          echo "healthy=$healthy" >> "$GITHUB_OUTPUT"
          echo "staging_sha=$staging_sha" >> "$GITHUB_OUTPUT"
          {
            echo "## Current Staging Before Deploy"
            echo ""
            echo "- Health URL: $STAGING_HEALTH_URL"
            echo "- Health probe succeeded: $healthy"
            echo "- Current staging version: $staging_sha"
            echo "- Target version_ref: ${{ steps.release.outputs.version_ref }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        id: install_uv
        if: steps.gates.outputs.staging_required == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          save-cache: false

      - name: Set up Python
        id: setup_python
        if: steps.gates.outputs.staging_required == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deploy_v2 dependencies
        id: install_deploy_v2
        if: steps.gates.outputs.staging_required == 'true'
        env:
          # Bounded retry for the transient deploy_v2 dependency download
          # (timeout/504). Mirrors the "AI Provider Connectivity Smoke" idiom.
          # The deploy itself (Deploy to Staging) stays fail-fast.
          TOOLCHAIN_DOWNLOAD_RETRIES: "3"
          TOOLCHAIN_DOWNLOAD_BACKOFF_SECONDS: "10"
        run: |
          set -uo pipefail
          attempts="${TOOLCHAIN_DOWNLOAD_RETRIES:-3}"
          delay="${TOOLCHAIN_DOWNLOAD_BACKOFF_SECONDS:-10}"
          log="$(mktemp)"
          rc=1
          for n in $(seq 1 "$attempts"); do
            echo "::group::Install deploy_v2 dependencies (attempt ${n}/${attempts})"
            set +e
            python -m pip install httpx python-dotenv rich 2>&1 | tee "$log"
            rc="${PIPESTATUS[0]}"
            set -e
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              break
            fi
            if [ "$n" -lt "$attempts" ]; then
              echo "deploy_v2 dependency install attempt ${n} failed (rc=${rc}); retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          if [ "$rc" -ne 0 ]; then
            echo "::error::deploy_v2 dependency install failed after ${attempts} attempts (rc=${rc}). Original error:"
            cat "$log"
            exit "$rc"
          fi

      - name: Deploy to Staging
        id: deploy_staging
        if: steps.gates.outputs.staging_required == 'true'
        working-directory: repo
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DEPLOY_PRIMARY_MODEL_OVERRIDE: ${{ env.STAGING_E2E_PRIMARY_MODEL }}
          DEPLOY_OCR_MODEL_OVERRIDE: ${{ env.STAGING_E2E_OCR_MODEL }}
          DEPLOY_VISION_MODEL_OVERRIDE: ${{ env.STAGING_E2E_VISION_MODEL }}
          # Empty PYTHONPATH so `python -m tools.deploy_v2` resolves repo/tools (infra2)
          # rather than the app's tools/ package, which a later E2E step's
          # PYTHONPATH=<repo root> export would otherwise shadow (see release.yml).
          PYTHONPATH: ""
        run: |
          set -euo pipefail
          # Staging deploys the release tag through the infra2 deploy_v2 front door
          # (deploy_primitive -> Dokploy compose). The :<tag> images were published by
          # deploy.yml on the tag push; deploy_v2 pulls them (promote-not-rebuild).
          # --iac-ref is the pinned infra2 submodule's RELEASE TAG (resolved by
          # release_coordinate.py via `git -C repo describe --exact-match`): deploy_v2
          # requires a vX.Y.Z iac_ref for staging/prod, and pinning the submodule at a
          # tagged infra2 commit makes staging use the same released IaC prod promotes.
          version_ref="${{ steps.release.outputs.version_ref }}"
          iac_ref="${{ steps.release.outputs.iac_ref }}"
          echo "Deploying staging via deploy_v2: type=staging version-ref=$version_ref iac-ref=$iac_ref"
          python -m tools.deploy_v2 \
            --service finance_report/app \
            --type staging \
            --version-ref "$version_ref" \
            --iac-ref "$iac_ref" \
            --domain zitian.party \
            --timeout 600

      - name: Confirm staging backend health
        id: staging_health
        if: steps.gates.outputs.staging_required == 'true'
        run: |
          # deploy_v2 waits on the Dokploy rollout; this confirms Traefik serves the new
          # image publicly. The backend reports GIT_COMMIT_SHA=<tag> (deploy_primitive sets
          # it to the image tag), so the health gate matches on the release tag.
          echo "Confirming staging serves the deployed tag..."
          bash tools/health_check.sh \
            "https://report-staging.zitian.party/api/health" \
            "staging" \
            60 \
            "${{ steps.release.outputs.version_ref }}"

      - name: Wait for frontend readiness
        id: frontend_ready
        if: steps.gates.outputs.staging_required == 'true'
        timeout-minutes: 10
        env:
          APP_URL: https://report-staging.zitian.party
          EXPECTED_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          # The browser E2E loads the frontend bundle, so the backend SHA gate in
          # health_check.sh is not enough: the frontend service deploys separately
          # and can lag, leaving the old bundle served. Hard-gate on the deployed
          # frontend git_sha so E2E never runs against stale frontend code.
          python3 -u - <<'PY'
          import json, os, subprocess, sys, time

          app_url = os.environ["APP_URL"].rstrip("/")
          expected = os.environ["EXPECTED_SHA"]
          url = f"{app_url}/frontend-version.json?expected={expected}"
          print(f"Waiting for frontend git_sha={expected} at {url}")

          deadline = time.monotonic() + 540  # < the 10min step timeout
          attempt = 0
          last = ""
          while time.monotonic() < deadline:
              attempt += 1
              try:
                  out = subprocess.run(
                      ["curl", "-s", "--max-time", "15", "-H", "Cache-Control: no-cache", url],
                      capture_output=True, text=True, timeout=20,
                  ).stdout
                  sha = (json.loads(out).get("git_sha") or json.loads(out).get("version") or "")
                  last = sha
                  if sha and (sha.startswith(expected) or expected.startswith(sha)):
                      print(f"[OK] Frontend serving expected git_sha {sha} (attempt {attempt})")
                      sys.exit(0)
                  print(f"[WAITING] attempt {attempt}: frontend git_sha={sha or 'unknown'} expected={expected}")
              except Exception as exc:  # noqa: BLE001 - readiness probe is best-effort per attempt
                  print(f"[WAITING] attempt {attempt}: {type(exc).__name__}: {exc}")
              time.sleep(10)

          print("::error::Frontend still serving stale git_sha after deadline; "
                f"expected={expected} last={last or 'unknown'}. "
                "Refusing to run E2E against old frontend code.")
          sys.exit(1)
          PY

      - name: Setup E2E Tests
        id: setup_e2e
        if: steps.gates.outputs.staging_required == 'true'
        uses: ./.github/actions/setup-e2e-tests

      - name: End-to-End Tests
        if: steps.gates.outputs.staging_required == 'true'
        id: staging_e2e_tests
        timeout-minutes: 22
        env:
          APP_URL: https://report-staging.zitian.party
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          STRICT_E2E_GATES: true
          # Backend /api/health reports GIT_COMMIT_SHA=<version_ref> for release tags,
          # so the E2E version check gates on the release version_ref.
          EXPECTED_SHA: ${{ steps.release.outputs.version_ref }}
          RUN_MARKET_DATA_PROVIDER_E2E: true
          MARKET_DATA_E2E_DATE: "2024-06-03"
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "🚀 Starting E2E Pipeline for $APP_URL"
          mkdir -p test-results
          
          run_timed_phase "Phase 1: Smoke Check (Shell)" \
            bash tools/smoke_test.sh "$APP_URL" staging

          run_timed_phase "Phase 1b: Tier 2 HTTP E2E (Python)" \
            python3 tools/tier2_http_e2e.py \
              --base-url "$APP_URL" \
              --expected-sha "$EXPECTED_SHA" \
              --mode staging \
              --json-report test-results/staging-tier2-http.json \
              --junit-xml test-results/staging-tier2-http.xml
          
          # Parallelize non-LLM tests only. Real AI/OCR calls are run once below
          # to avoid four workers hitting the provider at the same time.
          run_timed_phase "Phase 2: Core Flow Validation (Python)" \
            pytest tests/e2e -v -m "(smoke or e2e) and not llm" -n 4 --junit-xml=test-results/staging-core-e2e.xml

          echo "✅ Staging deploy health gate passed!"

      - name: Classify staging deploy failure context
        id: deploy_failure_context
        if: ${{ always() }}
        env:
          STEPS_CONTEXT: ${{ toJSON(steps) }}
        run: |
          set -euo pipefail

          staging_required="${{ steps.gates.outputs.staging_required }}"
          failure_domain="none"
          failed_step="none"
          failure_summary="no staging deploy failure"

          classify_failure() {
            failed_step="$1"
            failure_domain="$2"
            failure_summary="$3"
          }

          if [ "${{ steps.checkout.outcome }}" = "failure" ]; then
            classify_failure \
              "checkout" \
              "repository-checkout" \
              "Repository checkout failed before staging deploy classification."
          elif [ "${{ steps.release.outcome }}" = "failure" ]; then
            classify_failure \
              "release" \
              "release-coordinate-resolution" \
              "Release coordinate resolution failed before staging deploy classification."
          elif [ "${{ steps.classify.outcome }}" = "failure" ]; then
            classify_failure \
              "classification" \
              "change-classification" \
              "Change classification failed before staging relevance could be trusted."
          elif [ "$staging_required" != "true" ]; then
            failure_domain="not-required"
            failed_step="classification"
            failure_summary="staging deploy was skipped by change classification"
          elif [ "${{ steps.install_uv.outcome }}" = "failure" ]; then
            classify_failure \
              "install_uv" \
              "toolchain/uv-install" \
              "uv setup failed before E2E dependency setup."
          elif [ "${{ steps.setup_python.outcome }}" = "failure" ]; then
            classify_failure \
              "setup_python" \
              "toolchain/python-setup" \
              "Python setup failed before deploy tooling could run."
          elif [ "${{ steps.install_deploy_v2.outcome }}" = "failure" ]; then
            classify_failure \
              "install_deploy_v2" \
              "toolchain/deploy-v2-deps" \
              "deploy_v2 dependency install failed before the staging deploy."
          elif [ "${{ steps.deploy_staging.outcome }}" = "failure" ]; then
            classify_failure \
              "deploy_staging" \
              "deploy-v2-rollout" \
              "deploy_v2 staging deploy failed (ref-form/vault contract preflight, Dokploy rollout, or effective-config verify)."
          elif [ "${{ steps.staging_health.outcome }}" = "failure" ]; then
            classify_failure \
              "staging_health" \
              "staging-route-health" \
              "Staging public health gate failed: Traefik did not serve the deployed tag in time."
          elif [ "${{ steps.frontend_ready.outcome }}" = "failure" ]; then
            classify_failure \
              "frontend_ready" \
              "frontend-rollout-stale-sha" \
              "Frontend kept serving a stale git_sha after backend health passed; E2E was not run against old frontend code."
          elif [ "${{ steps.setup_e2e.outcome }}" = "failure" ]; then
            classify_failure \
              "setup_e2e" \
              "e2e-setup" \
              "E2E dependency setup failed after staging health."
          elif [ "${{ steps.staging_e2e_tests.outcome }}" = "failure" ]; then
            classify_failure \
              "staging_e2e_tests" \
              "application-smoke-e2e" \
              "Staging smoke or core non-LLM E2E failed after deployment."
          elif printf "%s" "$STEPS_CONTEXT" | grep -q '"outcome":"failure"'; then
            classify_failure \
              "unknown" \
              "unclassified-build-deploy-failure" \
              "A build/deploy job step failed outside the known failure map."
          fi

          {
            echo "failure_domain=${failure_domain}"
            echo "failed_step=${failed_step}"
            echo "failure_summary=${failure_summary}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Staging Deploy Failure Context"
            echo ""
            echo "- Failure domain: ${failure_domain}"
            echo "- Failed step: ${failed_step}"
            echo "- Failure summary: ${failure_summary}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write staging deploy context
        if: ${{ always() }}
        env:
          APP_URL: https://report-staging.zitian.party
        run: |
          mkdir -p ci-context
          {
            echo "Staging Deploy Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "deploy_input_version_ref=${{ inputs.version_ref }}"
            echo "deployed_version_ref=${{ steps.release.outputs.version_ref }}"
            echo "deployed_full_sha=${{ steps.release.outputs.full_sha }}"
            echo "target_short_sha=${{ steps.release.outputs.short_sha }}"
            echo "iac_ref=${{ steps.release.outputs.iac_ref }}"
            echo "app_url=${APP_URL}"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.release.outputs.version_ref }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.release.outputs.version_ref }}"
            echo "staging_before_healthy=${{ steps.staging_before.outputs.healthy }}"
            echo "staging_before_sha=${{ steps.staging_before.outputs.staging_sha }}"
            echo "staging_e2e_outcome=${{ steps.staging_e2e_tests.outcome }}"
            echo "failure_domain=${{ steps.deploy_failure_context.outputs.failure_domain }}"
            echo "failed_step=${{ steps.deploy_failure_context.outputs.failed_step }}"
            echo "failure_summary=${{ steps.deploy_failure_context.outputs.failure_summary }}"
            echo "strict_e2e_gates=true"
            echo "marker=(smoke or e2e) and not llm"
          } > ci-context/staging-deploy-context.txt

      - name: Upload staging deploy test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: staging-deploy-test-context
          path: |
            test-results/
            ci-context/staging-deploy-context.txt
          retention-days: 14

  provider-gate:
    name: Staging Provider Gate
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'staging' && needs.build-and-deploy.outputs.staging_required == 'true' && needs.build-and-deploy.outputs.provider_gate_required == 'true' }}
    timeout-minutes: 12
    permissions:
      contents: read
    outputs:
      provider_status: ${{ steps.ai_provider_connectivity.outputs.provider_status }}
    env:
      APP_URL: https://report-staging.zitian.party
      TEST_ENV: staging
      SKIP_UI_TESTS: false
      STRICT_E2E_GATES: true
      PROVIDER_CONNECTIVITY_TIMEOUT_MS: 90000
      PROVIDER_CONNECTIVITY_RETRIES: "3"
      PROVIDER_CONNECTIVITY_BACKOFF_SECONDS: "10"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-and-deploy.outputs.commit_full_sha }}

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      # Provider-risk staging changes prove one real chat round trip (AC8.13.120).
      # It is retried with backoff and only blocks delivery on client/config 4xx.
      # Transient 5xx/timeouts are reported as degraded-provider and remain
      # non-blocking so upstream provider instability does not red main.
      - name: AI Provider Connectivity Smoke
        id: ai_provider_connectivity
        timeout-minutes: 10
        env:
          EXPECTED_SHA: ${{ needs.build-and-deploy.outputs.deployed_version_ref }}
        run: |
          set -uo pipefail
          mkdir -p test-results
          attempts="${PROVIDER_CONNECTIVITY_RETRIES:-3}"
          delay="${PROVIDER_CONNECTIVITY_BACKOFF_SECONDS:-10}"
          log="$(mktemp)"
          rc=1
          for n in $(seq 1 "$attempts"); do
            echo "::group::AI Provider Connectivity Smoke (attempt ${n}/${attempts})"
            printf '[phase:start] provider-connectivity attempt %s at %s\n' "$n" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            pytest tests/e2e/test_ai_provider_connectivity.py \
              -v -m "llm" --junit-xml=test-results/staging-provider-connectivity.xml 2>&1 | tee "$log"
            rc="${PIPESTATUS[0]}"
            set -e
            printf '[phase:end] provider-connectivity attempt %s status=%s\n' "$n" "$rc"
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              break
            fi
            if [ "$n" -lt "$attempts" ]; then
              echo "Provider smoke attempt ${n} failed (rc=${rc}); retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done

          if [ "$rc" -eq 0 ]; then
            echo "provider_status=pass" >> "$GITHUB_OUTPUT"
            echo "✅ Provider connectivity smoke passed."
            exit 0
          fi

          # Classify the last observed failure. The test surfaces the HTTP status
          # as "connectivity failed: <code>"; a 4xx is a client/config error
          # (block delivery), anything else (5xx, timeout, network) is transient.
          status_code="$(grep -oE 'connectivity failed: [0-9]{3}' "$log" | tail -n1 | grep -oE '[0-9]{3}' || true)"
          echo "Last observed /api/chat status: ${status_code:-unknown}"
          if [ -n "$status_code" ] && [ "$status_code" -ge 400 ] && [ "$status_code" -lt 500 ]; then
            echo "provider_status=config-failure" >> "$GITHUB_OUTPUT"
            echo "::error::Provider gate hard failure: /api/chat returned ${status_code} (client/config error) after ${attempts} attempts. Blocking delivery."
            exit 1
          fi

          echo "provider_status=degraded" >> "$GITHUB_OUTPUT"
          echo "::warning::Provider connectivity degraded (status=${status_code:-timeout/5xx}) after ${attempts} attempts; delivery will be marked degraded-provider."
          exit 0

      - name: Write provider gate context
        if: ${{ always() }}
        env:
          EXPECTED_SHA: ${{ needs.build-and-deploy.outputs.deployed_version_ref }}
        run: |
          mkdir -p ci-context
          {
            echo "Staging Provider Gate Context"
            echo "============================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "expected_sha=${EXPECTED_SHA}"
            echo "app_url=${APP_URL}"
            echo "provider_gate_required=${{ needs.build-and-deploy.outputs.provider_gate_required }}"
            echo "provider_gate_reason=${{ needs.build-and-deploy.outputs.provider_gate_reason }}"
            echo "provider_connectivity_outcome=${{ steps.ai_provider_connectivity.outcome }}"
            echo "provider_connectivity_status=${{ steps.ai_provider_connectivity.outputs.provider_status }}"
            echo "strict_e2e_gates=true"
            echo "marker=llm connectivity smoke"
          } > ci-context/staging-provider-gate-context.txt

      - name: Upload provider gate test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: staging-provider-gate-test-context
          path: |
            test-results/
            ci-context/staging-provider-gate-context.txt
          retention-days: 14

  ai-ocr-gate:
    name: Staging AI/OCR Gate
    needs: [build-and-deploy, provider-gate]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.target == 'staging' && needs.build-and-deploy.outputs.staging_required == 'true' && needs.build-and-deploy.outputs.ai_ocr_required == 'true' && needs.provider-gate.outputs.provider_status == 'pass' }}
    # Record-only entrance to the shared reusable gate (EPIC-008 AC8.13.153): a
    # regression is captured as an output status and does NOT block delivery.
    uses: ./.github/workflows/staging-ai-ocr-gate.yml
    with:
      commit_ref: ${{ needs.build-and-deploy.outputs.commit_full_sha }}
      expected_sha: ${{ needs.build-and-deploy.outputs.deployed_version_ref }}
      blocking: false
      # Production-promotion blocking path runs only the minimal AI/OCR canary
      # (issue #1232, AC8.13.156); the heavy audit journeys run nightly via
      # audit-replay.yml (AC8.13.157), never on the deploy path (AC8.13.159).
      corpus: canary
    secrets: inherit

  post-merge-delivery:
    name: Post-merge Delivery
    runs-on: ubuntu-latest
    needs: [build-and-deploy, provider-gate, ai-ocr-gate]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.target == 'staging' }}
    steps:
      - name: Aggregate post-merge delivery result
        run: |
          set -euo pipefail

          staging_required="${{ needs.build-and-deploy.outputs.staging_required }}"
          staging_reason="${{ needs.build-and-deploy.outputs.staging_reason }}"
          provider_gate_required="${{ needs.build-and-deploy.outputs.provider_gate_required }}"
          provider_gate_reason="${{ needs.build-and-deploy.outputs.provider_gate_reason }}"
          ai_ocr_required="${{ needs.build-and-deploy.outputs.ai_ocr_required }}"
          ai_ocr_reason="${{ needs.build-and-deploy.outputs.ai_ocr_reason }}"
          failure_domain="${{ needs.build-and-deploy.outputs.failure_domain }}"
          failed_step="${{ needs.build-and-deploy.outputs.failed_step }}"
          failure_summary="${{ needs.build-and-deploy.outputs.failure_summary }}"
          build_result="${{ needs.build-and-deploy.result }}"
          provider_result="${{ needs.provider-gate.result }}"
          provider_status="${{ needs.provider-gate.outputs.provider_status }}"
          ai_ocr_result="${{ needs.ai-ocr-gate.result }}"
          ai_ocr_status="${{ needs.ai-ocr-gate.outputs.ai_ocr_status }}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          target_sha="${{ needs.build-and-deploy.outputs.commit_full_sha || github.sha }}"
          target_short="${target_sha:0:7}"
          target_version_ref="${{ needs.build-and-deploy.outputs.deployed_version_ref || inputs.version_ref }}"
          failed=false
          delivery_status="passed"
          failure_reason="none"

          if [ "$build_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="build/deploy gate failed"
          elif [ "$staging_required" != "true" ]; then
            delivery_status="skipped-no-staging-required"
          elif [ "$provider_gate_required" = "true" ] && [ "$provider_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="provider connectivity gate failed"
          elif [ "$provider_gate_required" = "true" ] && [ "$provider_status" = "degraded" ]; then
            delivery_status="degraded-provider"
          elif [ "$ai_ocr_required" = "true" ] && [ "${ai_ocr_status:-not-run}" != "passed" ]; then
            delivery_status="passed-ai-ocr-regression-recorded"
          fi

          {
            echo "## Post-merge Delivery"
            echo ""
            echo "- Delivery status: ${delivery_status}"
            echo "- Failure reason: ${failure_reason}"
            echo "- Target version_ref: ${target_version_ref}"
            echo "- Target SHA: ${target_sha}"
            echo "- Target short SHA: ${target_short}"
            echo "- Run URL: ${run_url}"
            echo "- Staging required: ${staging_required:-unknown}"
            echo "- Staging reason: ${staging_reason:-unknown}"
            echo "- Provider gate required: ${provider_gate_required:-unknown}"
            echo "- Provider gate reason: ${provider_gate_reason:-unknown}"
            echo "- AI/OCR required: ${ai_ocr_required:-unknown}"
            echo "- AI/OCR reason: ${ai_ocr_reason:-unknown}"
            echo "- Provider connectivity result: ${provider_result}"
            echo "- Provider connectivity status: ${provider_status:-not-run}"
            echo "- Build/deploy result: ${build_result}"
            echo "- Build/deploy failure domain: ${failure_domain:-unknown}"
            echo "- Build/deploy failed step: ${failed_step:-unknown}"
            echo "- Build/deploy failure summary: ${failure_summary:-unknown}"
            echo "- AI/OCR result: ${ai_ocr_result}"
            echo "- AI/OCR status: ${ai_ocr_status:-not-run}"
            echo "- AI/OCR release semantics: right-shifted full regression; not a release-critical blocker"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" = "true" ]; then
            echo "::error::Post-merge delivery failed: ${failure_reason}"
            exit 1
          fi

  post-merge-summary:
    name: Post-merge Timing Summary
    runs-on: ubuntu-latest
    needs: [build-and-deploy, provider-gate, ai-ocr-gate, post-merge-delivery]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.target == 'staging' }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Write post-merge timing summary
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/github_workflow_timing_summary.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --title "Post-merge Timing Summary" \
            --summary-path "$GITHUB_STEP_SUMMARY"

  # Release image promotion jobs
  promote:
    name: Promote SHA images to release tag
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,event,headBranch \
              --jq '[.[] | select(.event == "push" and .headBranch == "main" and .status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$run_id" ]; then
            echo "::error::No successful main CI run found for $GITHUB_SHA — the :<sha> images may not be published. Tag a commit that passed main CI."
            exit 1
          fi
          echo "Using successful main CI run: $run_id"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Promote SHA images to release tag
        id: promote
        run: |
          full_sha="$(git rev-parse "$GITHUB_SHA")"
          short_sha="${full_sha:0:7}"
          tag="${{ steps.version.outputs.tag }}"

          backend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${short_sha}"
          frontend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${short_sha}"

          backend_version_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${tag}"
          frontend_version_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${tag}"

          # Inspect and check SHA images exist (published by main CI).
          backend_sha_digest="$(docker buildx imagetools inspect "$backend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"
          frontend_sha_digest="$(docker buildx imagetools inspect "$frontend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"

          if [ -z "$backend_sha_digest" ] || [ -z "$frontend_sha_digest" ]; then
            echo "::error::main-CI SHA images not found for $short_sha"
            exit 1
          fi

          echo "Found backend SHA image digest: $backend_sha_digest"
          echo "Found frontend SHA image digest: $frontend_sha_digest"

          # Promote (manifest copy, zero rebuild). Keep single-platform manifests
          # as manifests instead of wrapping them into new OCI indexes, otherwise
          # the release tag gets a different top-level digest from the source tag.
          docker buildx imagetools create --prefer-index=false --tag "$backend_version_image" "$backend_sha_image"
          docker buildx imagetools create --prefer-index=false --tag "$frontend_version_image" "$frontend_sha_image"

          # Verify the promoted digests match the source digests exactly.
          backend_promoted_digest="$(docker buildx imagetools inspect "$backend_version_image" | grep -i '^Digest:' | awk '{print $2}')"
          frontend_promoted_digest="$(docker buildx imagetools inspect "$frontend_version_image" | grep -i '^Digest:' | awk '{print $2}')"

          if [ "$backend_sha_digest" != "$backend_promoted_digest" ]; then
            echo "::error::Backend digests differ! Expected $backend_sha_digest, got $backend_promoted_digest"
            exit 1
          fi

          if [ "$frontend_sha_digest" != "$frontend_promoted_digest" ]; then
            echo "::error::Frontend digests differ! Expected $frontend_sha_digest, got $frontend_promoted_digest"
            exit 1
          fi

          echo "backend_digest=$backend_sha_digest" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$frontend_sha_digest" >> "$GITHUB_OUTPUT"
          echo "✅ Release $tag promoted (promote-not-rebuild): $short_sha -> $tag"

      - name: Summary
        run: |
          {
            echo "## Release Images — ${{ steps.version.outputs.tag }}"
            echo ""
            echo "Promoted main-CI SHA images to the release tag (zero rebuild)."
            echo ""
            echo "- backend digest: \`${{ steps.promote.outputs.backend_digest }}\`"
            echo "- frontend digest: \`${{ steps.promote.outputs.frontend_digest }}\`"
            echo ""
            echo "Next: deploy staging on this tag (\`deploy_v2 --type staging --version-ref ${{ steps.version.outputs.tag }}\`)."
          } >> "$GITHUB_STEP_SUMMARY"

  # On-demand staging AI/OCR diagnostic jobs
  manual-ai-ocr-gate:
    name: Staging AI/OCR Gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'staging-ai-ocr-gate' }}
    # Fail-fast entrance to the shared reusable gate (EPIC-008 AC8.13.153) for
    # on-demand diagnostics.
    uses: ./.github/workflows/staging-ai-ocr-gate.yml
    with:
      commit_ref: ${{ github.sha }}
      expected_sha: ${{ github.sha }}
      blocking: true
      # On-demand recovery diagnostic runs the FULL corpus (canary + audit
      # journeys) fail-fast, so a human can reproduce the whole regression.
      corpus: all
    secrets: inherit
