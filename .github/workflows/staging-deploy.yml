# Staging Deployment Workflow
#
# Triggers: successful push CI workflow_run on main, or manual dispatch
# Actions: Build images → Deploy to staging → Smoke/E2E → AI/OCR gate
#
# Staging validates post-merge commits as FIFO train units. Each successful
# main push CI workflow_run is preserved; later runs wait before mutating
# staging until older Deploy Staging workflow runs have fully completed.
# Data is persisted between deployments.

name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  STAGING_COMPOSE_ID: A6V-hbJlgHMwgPDoTDnhH
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v
  PYTHON_VERSION: "3.12.12"
  UV_VERSION: "0.9.18"

jobs:
  post-merge-train-turn:
    name: Post-merge Train Turn
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Wait for FIFO post-merge train turn
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/wait_post_merge_train_turn.py \
            --timeout-seconds 21600 \
            --poll-seconds 30

      - name: Report no train wait required
        if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.event != 'push' || github.event.workflow_run.conclusion != 'success' || github.event.workflow_run.head_branch != 'main' }}
        run: |
          {
            echo "## Post-merge Train Turn"
            echo ""
            echo "No FIFO wait required for event \`${{ github.event_name }}\`."
          } >> "$GITHUB_STEP_SUMMARY"

  ci-not-success-summary:
    name: CI Workflow Run Ignored
    if: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.event != 'push' || github.event.workflow_run.conclusion != 'success' || github.event.workflow_run.head_branch != 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped staging deploy
        env:
          STAGING_HEALTH_URL: https://report-staging.zitian.party/api/health
        run: |
          target_sha="${{ github.event.workflow_run.head_sha }}"
          target_short="${target_sha:0:7}"
          response="$(curl -fsS --max-time 15 "$STAGING_HEALTH_URL" || true)"
          healthy=false
          if [ -n "$response" ]; then
            healthy=true
          fi
          staging_sha="$(
            RESPONSE="$response" python - <<'PY'
          import json
          import os

          payload = os.environ.get("RESPONSE", "")
          try:
              data = json.loads(payload) if payload else {}
          except json.JSONDecodeError:
              data = {}
          print(data.get("git_sha") or data.get("version") or "unknown")
          PY
          )"
          {
            echo "## Staging Deploy Skipped Before VPS Changes"
            echo ""
            echo "- Failure class: main CI workflow_run did not satisfy staging promotion guard"
            echo "- Trigger event: ${{ github.event.workflow_run.event }}"
            echo "- Head branch: ${{ github.event.workflow_run.head_branch }}"
            echo "- CI conclusion: ${{ github.event.workflow_run.conclusion }}"
            echo "- CI run ID: ${{ github.event.workflow_run.id }}"
            echo "- CI run attempt: ${{ github.event.workflow_run.run_attempt }}"
            echo "- Target main SHA: $target_short"
            echo "- Current staging health: $healthy"
            echo "- Current staging SHA: $staging_sha"
            echo "- CI run: ${{ github.event.workflow_run.html_url }}"
            echo ""
            echo "No FIFO wait, image promotion, Dokploy change, smoke test, or AI/OCR validation ran."
          } >> "$GITHUB_STEP_SUMMARY"

  classify-staging:
    name: Classify Staging Relevance
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      staging_required: ${{ steps.classify.outputs.staging_required }}
      staging_reason: ${{ steps.classify.outputs.staging_reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Classify staging relevance
        id: classify
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "staging_required=true"
              echo "staging_reason=manual-dispatch"
            } >> "$GITHUB_OUTPUT"
            {
              echo "## Staging Change Classification"
              echo ""
              echo "- Staging deploy required: \`true\`"
              echo "- Staging reason: \`manual-dispatch\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          head_sha="${HEAD_SHA:-$(git rev-parse HEAD)}"
          base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
          if [ -z "$base_sha" ]; then
            echo "::warning::Could not resolve parent for $head_sha; failing closed into staging deploy."
            : > changed-files.txt
          else
            git diff --name-only "$base_sha" "$head_sha" > changed-files.txt
          fi

          python tools/ci_change_classifier.py \
            --changed-files changed-files.txt \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    name: Build and Deploy
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && needs.classify-staging.outputs.staging_required == 'true') }}
    needs: [post-merge-train-turn, classify-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: read
      contents: read
      packages: write
    outputs:
      commit_full_sha: ${{ steps.get_sha.outputs.full_sha }}
      commit_sha: ${{ steps.get_sha.outputs.short_sha }}
    

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Get Commit SHA
        id: get_sha
        run: |
          full_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short HEAD)
          echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: $short_sha"

      - name: Probe current staging version
        id: staging_before
        continue-on-error: true
        env:
          STAGING_HEALTH_URL: https://report-staging.zitian.party/api/health
        run: |
          response="$(curl -fsS --max-time 15 "$STAGING_HEALTH_URL" || true)"
          healthy=false
          if [ -n "$response" ]; then
            healthy=true
          fi
          staging_sha="$(
            RESPONSE="$response" python - <<'PY'
          import json
          import os

          payload = os.environ.get("RESPONSE", "")
          try:
              data = json.loads(payload) if payload else {}
          except json.JSONDecodeError:
              data = {}
          print(data.get("git_sha") or data.get("version") or "unknown")
          PY
          )"
          echo "healthy=$healthy" >> "$GITHUB_OUTPUT"
          echo "staging_sha=$staging_sha" >> "$GITHUB_OUTPUT"
          {
            echo "## Current Staging Before Deploy"
            echo ""
            echo "- Health URL: $STAGING_HEALTH_URL"
            echo "- Health probe succeeded: $healthy"
            echo "- Current staging SHA: $staging_sha"
            echo "- Target main SHA: ${{ steps.get_sha.outputs.short_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Backend Image
        id: backend_image
        run: |
          bash tools/check_ghcr_image_tag.sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Build and push Backend
        if: steps.backend_image.outputs.build_required == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Resolve Frontend Image
        id: frontend_image
        run: |
          bash tools/check_ghcr_image_tag.sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Build and push Frontend
        if: steps.frontend_image.outputs.build_required == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}
            NEXT_PUBLIC_API_URL=https://report-staging.zitian.party
            NEXT_PUBLIC_APP_URL=https://report-staging.zitian.party

      - name: Promote Backend Image to Staging Tag
        run: |
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:staging" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Promote Frontend Image to Staging Tag
        run: |
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Deploy to Staging
        env:
          IMAGE_TAG: ${{ steps.get_sha.outputs.short_sha }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
          DEPLOY_PRIMARY_MODEL_OVERRIDE: ${{ env.STAGING_E2E_PRIMARY_MODEL }}
          DEPLOY_OCR_MODEL_OVERRIDE: ${{ env.STAGING_E2E_OCR_MODEL }}
          DEPLOY_VISION_MODEL_OVERRIDE: ${{ env.STAGING_E2E_VISION_MODEL }}
        run: |
          bash tools/dokploy_deploy.sh \
            "${{ env.STAGING_COMPOSE_ID }}" \
            "$IMAGE_TAG" \
            "https://report-staging.zitian.party"
          
          echo "Deployment triggered. Waiting for backend to become healthy..."
          bash tools/health_check.sh \
            "https://report-staging.zitian.party/api/health" \
            "staging" \
            60 \
            "$IMAGE_TAG"

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: End-to-End Tests
        id: staging_e2e_tests
        timeout-minutes: 22
        env:
          APP_URL: https://report-staging.zitian.party
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          STRICT_E2E_GATES: true
          EXPECTED_SHA: ${{ steps.get_sha.outputs.short_sha }}
          RUN_MARKET_DATA_PROVIDER_E2E: true
          MARKET_DATA_E2E_DATE: "2024-06-03"
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "🚀 Starting E2E Pipeline for $APP_URL"
          mkdir -p test-results
          
          run_timed_phase "Phase 1: Smoke Check (Shell)" \
            bash tools/smoke_test.sh "$APP_URL" staging
          
          # Parallelize non-LLM tests only. Real AI/OCR calls are run once below
          # to avoid four workers hitting the provider at the same time.
          run_timed_phase "Phase 2: Core Flow Validation (Python)" \
            pytest tests/e2e -v -m "(smoke or e2e) and not llm" -n 4 --junit-xml=test-results/staging-core-e2e.xml

          echo "✅ Staging deploy health gate passed!"

      - name: Write staging deploy context
        if: ${{ always() }}
        env:
          APP_URL: https://report-staging.zitian.party
        run: |
          mkdir -p ci-context
          {
            echo "Staging Deploy Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "triggering_ci_run_id=${{ github.event.workflow_run.id }}"
            echo "triggering_ci_run_attempt=${{ github.event.workflow_run.run_attempt }}"
            echo "triggering_ci_event=${{ github.event.workflow_run.event }}"
            echo "triggering_ci_head_sha=${{ github.event.workflow_run.head_sha }}"
            echo "triggering_ci_created_at=${{ github.event.workflow_run.created_at }}"
            echo "triggering_ci_conclusion=${{ github.event.workflow_run.conclusion }}"
            echo "triggering_ci_url=${{ github.event.workflow_run.html_url }}"
            echo "target_short_sha=${{ steps.get_sha.outputs.short_sha }}"
            echo "app_url=${APP_URL}"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}"
            echo "staging_before_healthy=${{ steps.staging_before.outputs.healthy }}"
            echo "staging_before_sha=${{ steps.staging_before.outputs.staging_sha }}"
            echo "backend_image_build_required=${{ steps.backend_image.outputs.build_required }}"
            echo "frontend_image_build_required=${{ steps.frontend_image.outputs.build_required }}"
            echo "staging_e2e_outcome=${{ steps.staging_e2e_tests.outcome }}"
            echo "strict_e2e_gates=true"
            echo "marker=(smoke or e2e) and not llm"
          } > ci-context/staging-deploy-context.txt

      - name: Upload staging deploy test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-test-context
          path: |
            test-results/
            ci-context/staging-deploy-context.txt
          retention-days: 14

  ai-ocr-gate:
    name: Staging AI/OCR Gate
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APP_URL: https://report-staging.zitian.party
      TEST_ENV: staging
      SKIP_UI_TESTS: false
      STRICT_E2E_GATES: true
      PARSING_TIMEOUT_MS: 480000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-and-deploy.outputs.commit_full_sha }}

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Run Staging AI/OCR Gate
        id: staging_ai_ocr_tests
        timeout-minutes: 22
        env:
          EXPECTED_SHA: ${{ needs.build-and-deploy.outputs.commit_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          write_staging_audit_inventory() {
            {
              echo "## Staging Audit Replay Inputs"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected SHA: ${EXPECTED_SHA}"
              echo "- Backend image tag: ${REGISTRY}/${IMAGE_PREFIX}-backend:${EXPECTED_SHA}"
              echo "- Frontend image tag: ${REGISTRY}/${IMAGE_PREFIX}-frontend:${EXPECTED_SHA}"
              echo "- App URL: ${APP_URL}"
              echo "- Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
              echo "- Fixture tests:"
              for fixture_test in "${STAGING_AI_OCR_TESTS[@]}"; do
                echo "  - ${fixture_test}"
              done
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          }

          write_staging_audit_result() {
            local status="$1"
            local verified_uploads="unknown"
            local verified_parse_completions="unknown"
            local verified_brokerage_imports="unknown"
            local verified_report_verifications="unknown"
            local verified_failures="1+"
            if [ "$status" = "0" ]; then
              verified_uploads="${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              verified_parse_completions="${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              verified_brokerage_imports="${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              verified_report_verifications="${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              verified_failures="0"
            fi
            {
              echo "## Staging Audit Replay Summary"
              echo ""
              echo "- Environment: staging"
              echo "- GitHub run ID: ${{ github.run_id }}"
              echo "- Expected SHA: ${EXPECTED_SHA}"
              echo "- Gate status: ${status}"
              echo "- Expected uploads: ${STAGING_AI_OCR_EXPECTED_UPLOADS}"
              echo "- Expected parse completions: ${STAGING_AI_OCR_EXPECTED_PARSE_COMPLETIONS}"
              echo "- Expected brokerage imports: ${STAGING_AI_OCR_EXPECTED_BROKERAGE_IMPORTS}"
              echo "- Expected report verifications: ${STAGING_AI_OCR_EXPECTED_REPORT_VERIFICATIONS}"
              echo "- Expected failures: 0"
              echo "- Uploads verified: ${verified_uploads}"
              echo "- Parse completions verified: ${verified_parse_completions}"
              echo "- Brokerage imports verified: ${verified_brokerage_imports}"
              echo "- Report verifications verified: ${verified_report_verifications}"
              echo "- Failures observed: ${verified_failures}"
              echo "- Audit filter: attributes.audit_event EXISTS"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          }

          echo "Starting Staging AI/OCR Gate for $APP_URL"
          echo "Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"
          eval "$(.venv/bin/python tools/staging_ai_ocr_gate_contract.py --shell)"
          mkdir -p test-results
          write_staging_audit_inventory

          version_status=0
          run_timed_phase "Staging AI/OCR Version Check" \
            pytest tests/e2e/test_version_check.py -v -m "smoke" --junit-xml=test-results/staging-ai-ocr-version.xml || version_status=$?
          if [ "$version_status" -ne 0 ]; then
            write_staging_audit_result "$version_status"
            exit "$version_status"
          fi

          gate_status=0
          run_timed_phase "Staging AI/OCR Gate (primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL})" \
            pytest "${STAGING_AI_OCR_TESTS[@]}" \
              -v -m "llm" --junit-xml=test-results/staging-ai-ocr-gate.xml || gate_status=$?
          write_staging_audit_result "$gate_status"
          if [ "$gate_status" -ne 0 ]; then
            exit "$gate_status"
          fi

          echo "Staging AI/OCR Gate passed."

      - name: Write staging AI/OCR context
        if: ${{ always() }}
        env:
          EXPECTED_SHA: ${{ needs.build-and-deploy.outputs.commit_sha }}
        run: |
          mkdir -p ci-context
          {
            echo "Staging AI/OCR Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "expected_sha=${EXPECTED_SHA}"
            echo "app_url=${APP_URL}"
            echo "primary_model=${STAGING_E2E_PRIMARY_MODEL}"
            echo "ocr_model=${STAGING_E2E_OCR_MODEL}"
            echo "vision_model=${STAGING_E2E_VISION_MODEL}"
            echo "ai_ocr_outcome=${{ steps.staging_ai_ocr_tests.outcome }}"
            echo "strict_e2e_gates=true"
            echo "marker=llm"
          } > ci-context/staging-ai-ocr-context.txt

      - name: Upload staging AI/OCR test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: staging-ai-ocr-test-context
          path: |
            test-results/
            ci-context/staging-ai-ocr-context.txt
          retention-days: 14

  staging-deploy-alert:
    name: Staging Deploy Alert
    runs-on: ubuntu-latest
    needs: [classify-staging, build-and-deploy, ai-ocr-gate]
    if: ${{ always() && github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      STAGING_ALERT_TITLE: "[staging-alert] Post-merge staging deploy failing"
      STAGING_HEALTH_URL: https://report-staging.zitian.party/api/health
      STAGING_APP_URL: https://report-staging.zitian.party
    steps:
      - name: Open or resolve staging failure alert
        run: |
          set -euo pipefail

          classify_result="${{ needs.classify-staging.result }}"
          staging_required="${{ needs.classify-staging.outputs.staging_required }}"
          build_result="${{ needs.build-and-deploy.result }}"
          ai_ocr_result="${{ needs.ai-ocr-gate.result }}"
          TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
          target_short="${TARGET_SHA:0:7}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$classify_result" = "success" ] && [ "$staging_required" != "true" ]; then
            echo "No staging alert needed: staging_required=${staging_required}."
            exit 0
          fi

          current_response="$(curl -fsS --max-time 15 "$STAGING_HEALTH_URL" || true)"
          current_staging_sha="$(
            RESPONSE="$current_response" python - <<'PY'
          import json
          import os

          payload = os.environ.get("RESPONSE", "")
          try:
              data = json.loads(payload) if payload else {}
          except json.JSONDecodeError:
              data = {}
          print(data.get("git_sha") or data.get("version") or "unknown")
          PY
          )"

          issue_number="$(
            gh issue list \
              --state open \
              --search "$STAGING_ALERT_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$STAGING_ALERT_TITLE\") | .number" \
              | head -n 1
          )"

          failed=false
          if [ "$classify_result" != "success" ]; then
            failed=true
          elif [ "$staging_required" = "true" ] && [ "$build_result" != "success" ]; then
            failed=true
          elif [ "$staging_required" = "true" ] && [ "$ai_ocr_result" != "success" ]; then
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            {
              echo "Staging deploy failed."
              echo ""
              echo "- Target SHA: ${TARGET_SHA}"
              echo "- Target short SHA: ${target_short}"
              echo "- Run URL: ${run_url}"
              echo "- App URL: ${STAGING_APP_URL}"
              echo "- Staging required: ${staging_required:-unknown}"
              echo "- Classify result: ${classify_result}"
              echo "- Build/deploy result: ${build_result}"
              echo "- AI/OCR result: ${ai_ocr_result}"
              echo "- Current staging SHA: ${current_staging_sha}"
              echo ""
              echo "This issue stays open while post-merge staging is failing. Later failures append comments; the next successful post-merge staging run closes it."
            } > staging-alert.md

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --body-file staging-alert.md
              echo "Updated staging alert issue #${issue_number}."
            else
              gh issue create \
                --title "$STAGING_ALERT_TITLE" \
                --body-file staging-alert.md
              echo "Created staging alert issue."
            fi
            exit 0
          fi

          if [ -n "$issue_number" ]; then
            {
              echo "Staging deploy recovered."
              echo ""
              echo "- Target SHA: ${TARGET_SHA}"
              echo "- Target short SHA: ${target_short}"
              echo "- Run URL: ${run_url}"
              echo "- App URL: ${STAGING_APP_URL}"
              echo "- Build/deploy result: ${build_result}"
              echo "- AI/OCR result: ${ai_ocr_result}"
              echo "- Current staging SHA: ${current_staging_sha}"
            } > staging-recovery.md
            gh issue comment "$issue_number" --body-file staging-recovery.md
            gh issue close "$issue_number" --reason completed
            echo "Closed recovered staging alert issue #${issue_number}."
          else
            echo "No open staging alert issue to close."
          fi

  post-merge-delivery:
    name: Post-merge Delivery
    runs-on: ubuntu-latest
    needs: [classify-staging, build-and-deploy, ai-ocr-gate, staging-deploy-alert]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')) }}
    steps:
      - name: Aggregate post-merge delivery result
        run: |
          set -euo pipefail

          classify_result="${{ needs.classify-staging.result }}"
          staging_required="${{ needs.classify-staging.outputs.staging_required }}"
          build_result="${{ needs.build-and-deploy.result }}"
          ai_ocr_result="${{ needs.ai-ocr-gate.result }}"
          alert_result="${{ needs.staging-deploy-alert.result }}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          target_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          target_short="${target_sha:0:7}"
          failed=false
          delivery_status="passed"
          failure_reason="none"

          if [ "$classify_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="staging classification failed"
          elif [ "$staging_required" != "true" ]; then
            delivery_status="skipped-no-staging-required"
          elif [ "$build_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="build/deploy gate failed"
          elif [ "$ai_ocr_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="staging AI/OCR gate failed"
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "$alert_result" != "success" ]; then
            failed=true
            delivery_status="failed"
            failure_reason="staging alert job failed"
          fi

          {
            echo "## Post-merge Delivery"
            echo ""
            echo "- Delivery status: ${delivery_status}"
            echo "- Failure reason: ${failure_reason}"
            echo "- Target SHA: ${target_sha}"
            echo "- Target short SHA: ${target_short}"
            echo "- Run URL: ${run_url}"
            echo "- Staging required: ${staging_required:-unknown}"
            echo "- Classify result: ${classify_result}"
            echo "- Build/deploy result: ${build_result}"
            echo "- AI/OCR result: ${ai_ocr_result}"
            echo "- Alert result: ${alert_result}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" = "true" ]; then
            echo "::error::Post-merge delivery failed: ${failure_reason}"
            exit 1
          fi

  post-merge-summary:
    name: Post-merge Timing Summary
    runs-on: ubuntu-latest
    needs: [classify-staging, build-and-deploy, ai-ocr-gate, staging-deploy-alert, post-merge-delivery]
    if: ${{ always() }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write post-merge timing summary
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/github_workflow_timing_summary.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --title "Post-merge Timing Summary" \
            --summary-path "$GITHUB_STEP_SUMMARY"
