# Staging Deployment Workflow
#
# Triggers: Push to main branch
# Actions: Wait for CI → Build images → Deploy to staging → Smoke/E2E → AI/OCR gate
#
# Staging validates post-merge commits as a single serial workflow unit and
# keeps only the latest pending run when pushes arrive faster than the
# singleton environment can run.
# Data is persisted between deployments.

name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-post-merge-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  STAGING_COMPOSE_ID: A6V-hbJlgHMwgPDoTDnhH
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v
  PYTHON_VERSION: "3.12.12"
  UV_VERSION: "0.9.18"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: read
      contents: read
      packages: write
    outputs:
      commit_sha: ${{ steps.get_sha.outputs.short_sha }}
    

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get_sha
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: $short_sha"

      - name: Wait for matching CI success
        if: ${{ github.event_name == 'push' }}
        timeout-minutes: 45
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/wait_for_github_ci.py \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --workflow CI \
            --branch main \
            --event push \
            --timeout-seconds 2700 \
            --poll-seconds 10

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Backend Image
        id: backend_image
        run: |
          bash scripts/check_ghcr_image_tag.sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Build and push Backend
        if: steps.backend_image.outputs.build_required == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Resolve Frontend Image
        id: frontend_image
        run: |
          bash scripts/check_ghcr_image_tag.sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Build and push Frontend
        if: steps.frontend_image.outputs.build_required == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}
            NEXT_PUBLIC_API_URL=https://report-staging.zitian.party
            NEXT_PUBLIC_APP_URL=https://report-staging.zitian.party

      - name: Promote Backend Image to Staging Tag
        run: |
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:staging" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Promote Frontend Image to Staging Tag
        run: |
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}"

      - name: Check Deployment Dependencies
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
        run: echo "Deployment deps check skipped (integrated into deploy script)"

      - name: Deploy to Staging
        env:
          IMAGE_TAG: ${{ steps.get_sha.outputs.short_sha }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
          DEPLOY_PRIMARY_MODEL_OVERRIDE: ${{ env.STAGING_E2E_PRIMARY_MODEL }}
          DEPLOY_OCR_MODEL_OVERRIDE: ${{ env.STAGING_E2E_OCR_MODEL }}
          DEPLOY_VISION_MODEL_OVERRIDE: ${{ env.STAGING_E2E_VISION_MODEL }}
        run: |
          bash scripts/dokploy_deploy.sh \
            "${{ env.STAGING_COMPOSE_ID }}" \
            "$IMAGE_TAG" \
            "https://report-staging.zitian.party"
          
          echo "Deployment triggered. Waiting for backend to become healthy..."
          bash scripts/health_check.sh \
            "https://report-staging.zitian.party/api/health" \
            "staging" \
            36 \
            "$IMAGE_TAG"

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: End-to-End Tests
        timeout-minutes: 22
        env:
          APP_URL: https://report-staging.zitian.party
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          STRICT_E2E_GATES: true
          EXPECTED_SHA: ${{ steps.get_sha.outputs.short_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "🚀 Starting E2E Pipeline for $APP_URL"
          
          run_timed_phase "Phase 1: Smoke Check (Shell)" \
            bash scripts/smoke_test.sh "$APP_URL" staging
          
          # Parallelize non-LLM tests only. Real AI/OCR calls are run once below
          # to avoid four workers hitting the provider at the same time.
          run_timed_phase "Phase 2: Core Flow Validation (Python)" \
            pytest tests/e2e -v -m "(smoke or e2e) and not llm" -n 4

          echo "✅ Staging deploy health gate passed!"

      - name: Performance Benchmark
        continue-on-error: true  # Don't block deploy, but report issues
        run: |
          echo "Running API performance benchmark..."
          BASE_URL="https://report-staging.zitian.party"
          
          # Test key endpoints
          for endpoint in /api/health /api/ping; do
            response_time=$(curl -sf -w "%{time_total}" -o /dev/null "$BASE_URL$endpoint" 2>/dev/null || echo "failed")
            
            if [ "$response_time" = "failed" ]; then
              echo "::warning::$endpoint - Failed to connect"
            elif (( $(echo "$response_time > 2.0" | bc -l 2>/dev/null || echo 0) )); then
              echo "::warning::$endpoint - Slow: ${response_time}s (> 2s threshold)"
            else
              echo "✅ $endpoint - ${response_time}s"
            fi
          done
          
          echo "Performance benchmark complete."

  ai-ocr-gate:
    name: Staging AI/OCR Gate
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APP_URL: https://report-staging.zitian.party
      TEST_ENV: staging
      SKIP_UI_TESTS: false
      STRICT_E2E_GATES: true
      PARSING_TIMEOUT_MS: 480000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Run Staging AI/OCR Gate
        timeout-minutes: 22
        env:
          EXPECTED_SHA: ${{ needs.build-and-deploy.outputs.commit_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "Starting Staging AI/OCR Gate for $APP_URL"
          echo "Models: primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL}"

          run_timed_phase "Staging AI/OCR Version Check" \
            pytest tests/e2e/test_version_check.py -v -m "smoke"

          run_timed_phase "Staging AI/OCR Gate (primary=${STAGING_E2E_PRIMARY_MODEL}, ocr=${STAGING_E2E_OCR_MODEL}, vision=${STAGING_E2E_VISION_MODEL})" \
            pytest \
              tests/e2e/test_statement_full_journey.py \
              tests/e2e/test_brokerage_upload_to_portfolio_value.py \
              tests/e2e/test_four_asset_net_worth_golden_path.py \
              tests/e2e/test_statement_upload_e2e.py \
              -v -m "llm"

          echo "Staging AI/OCR Gate passed."

  post-merge-summary:
    name: Post-merge Timing Summary
    runs-on: ubuntu-latest
    needs: [build-and-deploy, ai-ocr-gate]
    if: ${{ always() }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write post-merge timing summary
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/github_workflow_timing_summary.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --title "Post-merge Timing Summary" \
            --summary-path "$GITHUB_STEP_SUMMARY"
