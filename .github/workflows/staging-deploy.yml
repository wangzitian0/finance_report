# Staging Deployment Workflow
#
# Triggers: Push to main branch
# Actions: Build images → Deploy to staging → Smoke test
#
# Staging tracks the latest main branch commit.
# Data is persisted between deployments.

name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  STAGING_COMPOSE_ID: A6V-hbJlgHMwgPDoTDnhH
  STAGING_E2E_PRIMARY_MODEL: glm-5.1
  STAGING_E2E_OCR_MODEL: glm-4.6v
  STAGING_E2E_VISION_MODEL: glm-4.6v

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
    outputs:
      commit_sha: ${{ steps.get_sha.outputs.short_sha }}
    

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get_sha
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Deploying commit: $short_sha"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:staging
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}
            NEXT_PUBLIC_API_URL=https://report-staging.zitian.party
            NEXT_PUBLIC_APP_URL=https://report-staging.zitian.party

      - name: Check Deployment Dependencies
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
        run: echo "Deployment deps check skipped (integrated into deploy script)"

      - name: Deploy to Staging
        env:
          IMAGE_TAG: ${{ steps.get_sha.outputs.short_sha }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
          DEPLOY_PRIMARY_MODEL_OVERRIDE: ${{ env.STAGING_E2E_PRIMARY_MODEL }}
          DEPLOY_OCR_MODEL_OVERRIDE: ${{ env.STAGING_E2E_OCR_MODEL }}
          DEPLOY_VISION_MODEL_OVERRIDE: ${{ env.STAGING_E2E_VISION_MODEL }}
        run: |
          bash scripts/dokploy_deploy.sh \
            "${{ env.STAGING_COMPOSE_ID }}" \
            "$IMAGE_TAG" \
            "https://report-staging.zitian.party"
          
          echo "Deployment triggered. Waiting for backend to become healthy..."
          bash scripts/health_check.sh \
            "https://report-staging.zitian.party/api/health" \
            "staging" \
            36 \
            "$IMAGE_TAG"

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: End-to-End Tests
        timeout-minutes: 22
        env:
          APP_URL: https://report-staging.zitian.party
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          STRICT_E2E_GATES: true
          EXPECTED_SHA: ${{ steps.get_sha.outputs.short_sha }}
        run: |
          run_timed_phase() {
            local phase_name="$1"
            shift
            local start
            local end
            local duration
            local status

            start=$(date +%s)
            echo "::group::${phase_name}"
            printf '[phase:start] %s at %s\n' "$phase_name" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            "$@"
            status=$?
            set -e
            end=$(date +%s)
            duration=$((end - start))
            printf '[phase:end] %s status=%s duration=%ss\n' "$phase_name" "$status" "$duration"
            echo "::endgroup::"
            return "$status"
          }

          echo "🚀 Starting E2E Pipeline for $APP_URL"
          
          run_timed_phase "Phase 1: Smoke Check (Shell)" \
            bash scripts/smoke_test.sh "$APP_URL" staging
          
          # Parallelize non-LLM tests only. Real AI/OCR calls are run once below
          # to avoid four workers hitting the provider at the same time.
          run_timed_phase "Phase 2: Core Flow Validation (Python)" \
            pytest tests/e2e -v -m "(smoke or e2e) and not llm" -n 4

          echo "✅ Staging deploy health gate passed!"

      - name: Performance Benchmark
        continue-on-error: true  # Don't block deploy, but report issues
        run: |
          echo "Running API performance benchmark..."
          BASE_URL="https://report-staging.zitian.party"
          
          # Test key endpoints
          for endpoint in /api/health /api/ping; do
            response_time=$(curl -sf -w "%{time_total}" -o /dev/null "$BASE_URL$endpoint" 2>/dev/null || echo "failed")
            
            if [ "$response_time" = "failed" ]; then
              echo "::warning::$endpoint - Failed to connect"
            elif (( $(echo "$response_time > 2.0" | bc -l 2>/dev/null || echo 0) )); then
              echo "::warning::$endpoint - Slow: ${response_time}s (> 2s threshold)"
            else
              echo "✅ $endpoint - ${response_time}s"
            fi
          done
          
          echo "Performance benchmark complete."
