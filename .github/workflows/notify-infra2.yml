name: Notify infra2 — deploy report-branch-main

# The APP-repo SENDER half of the one auto deploy target (infra2 SSOT §4.6): when
# app `main` passes CI, tell infra2 to re-deploy the report-branch-main preview
# slot for that exact successful SHA. Everything else (staging / prod) is manual
# + a pinned release tag and is NOT triggered here.
#
# Receiver: infra2 `.github/workflows/deploy-report-main.yml` (repository_dispatch type
# `deploy-report-main`), which validates the successful-main SHA and runs
# `deploy_v2 --service finance_report/app --type preview/branch --version-ref main
# --expected-sha <successful-main-sha> --iac-ref main`. This closes the cross-repo
# half (#370 / finance_report#1072): the receiver previously only fired on manual
# dispatch.
#
# Auth: INFRA2_PAT — a PAT with `repo` scope on wangzitian0/infra2 (GITHUB_TOKEN cannot
# dispatch cross-repo). Stored as an app-repo secret.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch: {} # manual re-trigger of a report-branch-main deploy

permissions:
  contents: read
  issues: write # #1686 phase 0: GitHub-issue fallback alert when the dispatch fails

concurrency:
  # Collapse bursts of main pushes into one in-flight dispatch; the infra2 receiver also
  # serializes the actual preview deploy (cancel-in-progress on its own slot).
  group: notify-infra2-report-main
  cancel-in-progress: true

jobs:
  dispatch:
    name: dispatch report-branch-main deploy to infra2
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch repository_dispatch to infra2
        env:
          INFRA2_PAT: ${{ secrets.INFRA2_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          # #1686 phase 0: a failed dispatch previously only showed up as a red
          # run in the Actions tab, which nobody watches — main stayed green and
          # infra2 silently never redeployed report-branch-main. Use the same
          # documented GitHub-issue fallback (Infra-012 P2) #1632 wired for the
          # staging AI/OCR gate: dedup by title, no new alerting channel, still
          # fail the job (this is a real break, not a right-shifted regression).
          alert_and_fail() {
            local reason="$1"
            local detail="$2"
            echo "::error::${detail}"
            local alert_title="[notify-infra2] report-branch-main dispatch failed: ${reason}"
            local existing
            existing="$(gh issue list --state open --search "in:title ${alert_title}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
            if [ -z "$existing" ]; then
              gh issue create --title "$alert_title" --label "surface: ci" \
                --body "${detail} (run ${GITHUB_RUN_ID:-?}). infra2's report-branch-main preview slot did not redeploy for this main push." \
                || echo "::warning::GitHub-issue alert creation failed (non-fatal)."
            else
              echo "::notice::open notify-infra2 failure issue #${existing} already exists; not duplicating."
            fi
            exit 1
          }

          if [[ -z "${INFRA2_PAT:-}" ]]; then
            alert_and_fail "missing-pat" "INFRA2_PAT is required to dispatch the report-branch-main deploy to infra2."
          fi

          latest_main_sha="$(
            curl -fsS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
              | jq -r '.object.sha // ""'
          )"
          if [[ -z "${latest_main_sha:-}" ]]; then
            alert_and_fail "unresolved-sha" "Could not resolve current main SHA before infra2 dispatch."
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            dispatch_sha="${WORKFLOW_RUN_SHA:-}"
            if [[ -z "${dispatch_sha:-}" ]]; then
              alert_and_fail "unresolved-workflow-run-sha" "No workflow_run head SHA resolved for report-branch-main deploy."
            fi
            if [[ "$dispatch_sha" != "$latest_main_sha" ]]; then
              echo "Skipping stale CI completion: workflow_run_sha=$dispatch_sha latest_main_sha=$latest_main_sha"
              exit 0
            fi
          else
            dispatch_sha="$latest_main_sha"
          fi

          payload="$(jq -nc --arg sha "$dispatch_sha" \
            '{event_type: "deploy-report-main", client_payload: {sha: $sha, ref: "main"}}')"

          http_status="$(curl -sS -o /tmp/infra2_dispatch_resp -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${INFRA2_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --connect-timeout 10 \
            --max-time 30 \
            https://api.github.com/repos/wangzitian0/infra2/dispatches \
            -d "$payload")"

          echo "infra2 repository_dispatch -> HTTP $http_status (sha=$dispatch_sha)"
          # GitHub returns 204 No Content on a successful dispatch.
          if [[ "$http_status" != "204" ]]; then
            sed 's/^/  /' /tmp/infra2_dispatch_resp 2>/dev/null || true
            alert_and_fail "http-${http_status}" "infra2 repository_dispatch failed (expected HTTP 204, got ${http_status}). Check INFRA2_PAT scope/expiry."
          fi
