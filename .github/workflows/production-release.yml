# Production Release & Deployment
# 
# Triggers: 
#   - Tag push (v*.*.*) → Build images
#   - Manual dispatch → Deploy existing version
#   - Manual dispatch with dry_run=true → Validate release without deploying
#
# Workflow: Tag push builds images, then manually trigger to deploy

name: Production Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty for latest tag)'
        required: false
        type: string
      dry_run:
        description: 'Validate release prerequisites without deploying production'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  PRODUCTION_COMPOSE_ID: lNn9gVS1Zyw79Jzw5dlbu
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    

    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,event,headBranch \
              --jq '[.[] | select(.event == "push" and .headBranch == "main" and .status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$run_id" ]; then
            echo "::error::No successful main CI run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful main CI run: $run_id"

      - name: Verify staging passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          staging_run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow staging-deploy.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion \
              --jq '[.[] | select(.status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$staging_run_id" ]; then
            echo "::error::No successful Deploy Staging run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful Deploy Staging run: $staging_run_id"
          echo "staging_run_id=$staging_run_id" >> "$GITHUB_ENV"

      - name: Verify Release Codebase
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          moon run :lint
          
          # Clean up artifacts before build
          rm -rf .venv

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote Images
        id: promote
        run: |
          short_sha=$(git rev-parse --short "$GITHUB_SHA")
          tag="${{ steps.version.outputs.tag }}"
          
          backend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${short_sha}"
          frontend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${short_sha}"
          
          backend_version_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${tag}"
          frontend_version_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${tag}"
          
          # Inspect and check SHA images exist
          backend_sha_digest="$(docker buildx imagetools inspect "$backend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"
          frontend_sha_digest="$(docker buildx imagetools inspect "$frontend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"
          
          if [ -z "$backend_sha_digest" ] || [ -z "$frontend_sha_digest" ]; then
            echo "::error::Staging-validated SHA images not found for SHA $short_sha"
            exit 1
          fi
          
          echo "Found backend SHA image digest: $backend_sha_digest"
          echo "Found frontend SHA image digest: $frontend_sha_digest"
          
          # Promote images
          docker buildx imagetools create --tag "$backend_version_image" "$backend_sha_image"
          docker buildx imagetools create --tag "$frontend_version_image" "$frontend_sha_image"
          
          # Verify digests
          backend_promoted_digest="$(docker buildx imagetools inspect "$backend_version_image" | grep -i '^Digest:' | awk '{print $2}')"
          frontend_promoted_digest="$(docker buildx imagetools inspect "$frontend_version_image" | grep -i '^Digest:' | awk '{print $2}')"
          
          if [ "$backend_sha_digest" != "$backend_promoted_digest" ]; then
            echo "::error::Backend digests differ! Expected $backend_sha_digest, got $backend_promoted_digest"
            exit 1
          fi
          
          if [ "$frontend_sha_digest" != "$frontend_promoted_digest" ]; then
            echo "::error::Frontend digests differ! Expected $frontend_sha_digest, got $frontend_promoted_digest"
            exit 1
          fi
          
          echo "backend_digest=$backend_sha_digest" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$frontend_sha_digest" >> "$GITHUB_OUTPUT"
          echo "✅ Release $tag promoted successfully"

      - name: Summary
        run: |
          {
            echo "## Production Release Promoted"
            echo ""
            echo "- Released commit: ${{ github.sha }}"
            echo "- Source CI run: ${{ env.staging_run_id }}"
            echo "- Promoted backend image digest: ${{ steps.promote.outputs.backend_digest }}"
            echo "- Promoted frontend image digest: ${{ steps.promote.outputs.frontend_digest }}"
            echo "- No rebuild occurred: true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write production release build context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Release Build Context"
            echo "================================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
            echo "backend_digest=${{ steps.promote.outputs.backend_digest }}"
            echo "frontend_digest=${{ steps.promote.outputs.frontend_digest }}"
            echo "no_rebuild=true"
          } > ci-context/production-release-build-context.txt

      - name: Upload production release build context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-release-build-context
          path: ci-context/production-release-build-context.txt
          retention-days: 14

  dry-run:
    name: Production Release Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve dry-run tag
        id: version
        run: |
          tag="${{ github.event.inputs.version }}"
          if [ -z "$tag" ]; then
            tag="dry-run-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Dry-run tag: $tag"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,event,headBranch \
              --jq '[.[] | select(.event == "push" and .headBranch == "main" and .status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$run_id" ]; then
            echo "::error::No successful main CI run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful main CI run: $run_id"

      - name: Verify staging passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          staging_run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow staging-deploy.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion \
              --jq '[.[] | select(.status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$staging_run_id" ]; then
            echo "::error::No successful Deploy Staging run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful Deploy Staging run: $staging_run_id"
          echo "staging_run_id=$staging_run_id" >> "$GITHUB_ENV"

      - name: Verify Release Codebase
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          moon run :lint

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify SHA Images Dry Run
        id: promote_dry
        run: |
          short_sha=$(git rev-parse --short "$GITHUB_SHA")
          backend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${short_sha}"
          frontend_sha_image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${short_sha}"
          
          # Inspect and check SHA images exist
          backend_sha_digest="$(docker buildx imagetools inspect "$backend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"
          frontend_sha_digest="$(docker buildx imagetools inspect "$frontend_sha_image" | grep -i '^Digest:' | awk '{print $2}')"
          
          if [ -z "$backend_sha_digest" ] || [ -z "$frontend_sha_digest" ]; then
            echo "::error::Staging-validated SHA images not found for SHA $short_sha"
            exit 1
          fi
          
          echo "Found backend SHA image digest: $backend_sha_digest"
          echo "Found frontend SHA image digest: $frontend_sha_digest"
          
          echo "backend_digest=$backend_sha_digest" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$frontend_sha_digest" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Production Release Dry Run"
            echo ""
            echo "- Released commit: ${{ github.sha }}"
            echo "- Source CI run: ${{ env.staging_run_id }}"
            echo "- Promoted backend image digest: ${{ steps.promote_dry.outputs.backend_digest }}"
            echo "- Promoted frontend image digest: ${{ steps.promote_dry.outputs.frontend_digest }}"
            echo "- No rebuild occurred: true"
            echo "- Production mutation skipped: true"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Production mutation skipped"

      - name: Write production dry-run context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Release Dry-run Context"
            echo "=================================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "production_mutation_skipped=true"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
            echo "backend_digest=${{ steps.promote_dry.outputs.backend_digest }}"
            echo "frontend_digest=${{ steps.promote_dry.outputs.frontend_digest }}"
            echo "no_rebuild=true"
          } > ci-context/production-dry-run-context.txt

      - name: Upload production dry-run context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-dry-run-context
          path: ci-context/production-dry-run-context.txt
          retention-days: 14

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://report.zitian.party
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*")
            [ -z "$VERSION" ] && { echo "::error::No tags found"; exit 1; }
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images
        id: verify_images
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          for service in backend frontend; do
            image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:$VERSION"
            docker manifest inspect "$image" &>/dev/null || {
              echo "::error::Image not found: $image"
              echo "Run: git push origin $VERSION"
              exit 1
            }
          done
          echo "✅ Images verified"

      - name: Probe current production version
        id: production_before
        continue-on-error: true
        run: |
          status_file="$(mktemp)"
          body_file="$(mktemp)"
          http_status="$(
            curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 5 \
              --max-time 15 \
              --header "Cache-Control: no-cache" \
              --header "Pragma: no-cache" \
              --output "$body_file" \
              --write-out "%{http_code}" \
              "https://report.zitian.party/api/health" \
              2>"$status_file" || true
          )"
          current_version="$(
            python3 - "$body_file" <<'PY'
          import json
          import sys
          from pathlib import Path

          try:
              payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8") or "{}")
          except json.JSONDecodeError:
              payload = {}
          print(payload.get("git_sha") or payload.get("version") or "")
          PY
          )"
          echo "http_status=${http_status:-000}" >> "$GITHUB_OUTPUT"
          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          if [ -s "$status_file" ]; then
            probe_error="$(head -c 200 "$status_file" | tr '\n\r' '  ')"
            echo "probe_error=${probe_error}" >> "$GITHUB_OUTPUT"
          else
            echo "probe_error=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy & Health Check
        id: deploy_health
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
        run: |
          bash tools/dokploy_deploy.sh \
            "$PRODUCTION_COMPOSE_ID" \
            "$IMAGE_TAG" \
            "https://report.zitian.party"
          
          bash tools/health_check.sh \
            "https://report.zitian.party/api/health" \
            "production" \
            24 \
            "$IMAGE_TAG"

      - name: Production Infrastructure Smoke
        id: production_infra_smoke
        run: |
          python tools/production_infra_smoke.py \
            --base-url "https://report.zitian.party" \
            --expected-sha "${{ steps.version.outputs.tag }}" \
            --signoz-url "https://signoz.zitian.party"

      - name: Smoke Tests
        id: production_smoke
        run: bash tools/smoke_test.sh https://report.zitian.party production

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Production Read-only E2E Smoke
        id: production_readonly_e2e
        env:
          APP_URL: https://report.zitian.party
          FRONTEND_URL: https://report.zitian.party
          TEST_ENV: production
          PROD_SMOKE_EMAIL: ${{ secrets.PROD_SMOKE_EMAIL }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
        run: |
          mkdir -p test-results
          pytest tests/e2e/test_production_readonly_smoke.py -v -m "prod_safe" --junit-xml=test-results/production-readonly-e2e.xml

      - name: Write production deploy context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          failure_domain="none"
          failed_step="none"
          failure_summary="Production release deploy completed."
          if [ "${{ steps.verify_images.outcome }}" = "failure" ]; then
            failure_domain="registry-release-image"
            failed_step="verify_images"
            failure_summary="Version-tagged release image was missing before production mutation."
          elif [ "${{ steps.deploy_health.outcome }}" = "failure" ]; then
            failure_domain="production-deploy-health-or-version"
            failed_step="deploy_health"
            failure_summary="Dokploy deploy or production health/version check failed."
          elif [ "${{ steps.production_infra_smoke.outcome }}" = "failure" ]; then
            failure_domain="production-infra-smoke"
            failed_step="production_infra_smoke"
            failure_summary="Production infrastructure smoke failed after deploy health."
          elif [ "${{ steps.production_smoke.outcome }}" = "failure" ]; then
            failure_domain="production-app-smoke"
            failed_step="production_smoke"
            failure_summary="Production application smoke failed after deploy health."
          elif [ "${{ steps.production_readonly_e2e.outcome }}" = "failure" ]; then
            failure_domain="production-readonly-e2e"
            failed_step="production_readonly_e2e"
            failure_summary="Production read-only E2E failed after release health."
          fi
          {
            echo "Production Deploy Context"
            echo "========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "app_url=https://report.zitian.party"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
            echo "production_before_http_status=${{ steps.production_before.outputs.http_status }}"
            echo "production_before_version=${{ steps.production_before.outputs.version }}"
            echo "production_before_probe_error=${{ steps.production_before.outputs.probe_error }}"
            echo "verify_images_outcome=${{ steps.verify_images.outcome }}"
            echo "deploy_health_outcome=${{ steps.deploy_health.outcome }}"
            echo "production_infra_smoke_outcome=${{ steps.production_infra_smoke.outcome }}"
            echo "production_smoke_outcome=${{ steps.production_smoke.outcome }}"
            echo "production_readonly_e2e_outcome=${{ steps.production_readonly_e2e.outcome }}"
            echo "failure_domain=${failure_domain}"
            echo "failed_step=${failed_step}"
            echo "failure_summary=${failure_summary}"
            echo "marker=prod_safe"
          } > ci-context/production-deploy-context.txt

      - name: Upload production deploy test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-test-context
          path: |
            test-results/
            ci-context/production-deploy-context.txt
          retention-days: 14
