# Production Release & Deployment
# 
# Triggers: 
#   - Tag push (v*.*.*) → Build images
#   - Manual dispatch → Deploy existing version
#   - Manual dispatch with dry_run=true → Validate release without deploying
#
# Workflow: Tag push builds images, then manually trigger to deploy

name: Production Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty for latest tag)'
        required: false
        type: string
      dry_run:
        description: 'Validate release prerequisites without deploying production'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  PRODUCTION_COMPOSE_ID: lNn9gVS1Zyw79Jzw5dlbu
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    

    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,event,headBranch \
              --jq '[.[] | select(.event == "push" and .headBranch == "main" and .status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$run_id" ]; then
            echo "::error::No successful main CI run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful main CI run: $run_id"

      - name: Verify Release Codebase
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          moon run :lint
          
          # Clean up artifacts before build
          rm -rf .venv

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.version.outputs.tag }}

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://report.zitian.party
            NEXT_PUBLIC_APP_URL=https://report.zitian.party

      - name: Summary
        run: |
          echo "✅ Release ${{ steps.version.outputs.tag }} built"
          echo "Deploy: Actions → Production Release → Run workflow"

      - name: Write production release build context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Release Build Context"
            echo "================================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
          } > ci-context/production-release-build-context.txt

      - name: Upload production release build context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-release-build-context
          path: ci-context/production-release-build-context.txt
          retention-days: 14

  dry-run:
    name: Production Release Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve dry-run tag
        id: version
        run: |
          tag="${{ github.event.inputs.version }}"
          if [ -z "$tag" ]; then
            tag="dry-run-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Dry-run tag: $tag"

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --limit 20 \
              --json databaseId,status,conclusion,event,headBranch \
              --jq '[.[] | select(.event == "push" and .headBranch == "main" and .status == "completed" and .conclusion == "success")][0].databaseId // ""'
          )"
          if [ -z "$run_id" ]; then
            echo "::error::No successful main CI run found for $GITHUB_SHA"
            exit 1
          fi
          echo "Using successful main CI run: $run_id"

      - name: Verify Release Codebase
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          moon run :lint

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image Without Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.version.outputs.tag }}

      - name: Build Frontend Image Without Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://report.zitian.party
            NEXT_PUBLIC_APP_URL=https://report.zitian.party

      - name: Summary
        run: |
          {
            echo "## Production Release Dry Run"
            echo ""
            echo "- Ref: ${{ github.ref_name }}"
            echo "- Validation tag: ${{ steps.version.outputs.tag }}"
            echo "- Production mutation skipped: true"
            echo "- Production mutation skipped because dry_run=true"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Production mutation skipped"

      - name: Write production dry-run context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Release Dry-run Context"
            echo "=================================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "production_mutation_skipped=true"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
          } > ci-context/production-dry-run-context.txt

      - name: Upload production dry-run context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-dry-run-context
          path: ci-context/production-dry-run-context.txt
          retention-days: 14

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://report.zitian.party
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*")
            [ -z "$VERSION" ] && { echo "::error::No tags found"; exit 1; }
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          for service in backend frontend; do
            image="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:$VERSION"
            docker manifest inspect "$image" &>/dev/null || {
              echo "::error::Image not found: $image"
              echo "Run: git push origin $VERSION"
              exit 1
            }
          done
          echo "✅ Images verified"

      - name: Deploy & Health Check
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_API_URL: ${{ env.DOKPLOY_API_URL }}
        run: |
          bash tools/dokploy_deploy.sh \
            "$PRODUCTION_COMPOSE_ID" \
            "$IMAGE_TAG" \
            "https://report.zitian.party"
          
          bash tools/health_check.sh \
            "https://report.zitian.party/api/health" \
            "production" \
            24 \
            "$IMAGE_TAG"

      - name: Production Infrastructure Smoke
        run: |
          python tools/production_infra_smoke.py \
            --base-url "https://report.zitian.party" \
            --expected-sha "${{ steps.version.outputs.tag }}" \
            --signoz-url "https://signoz.zitian.party"

      - name: Smoke Tests
        run: bash tools/smoke_test.sh https://report.zitian.party production

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Production Read-only E2E Smoke
        id: production_readonly_e2e
        env:
          APP_URL: https://report.zitian.party
          FRONTEND_URL: https://report.zitian.party
          TEST_ENV: production
          PROD_SMOKE_EMAIL: ${{ secrets.PROD_SMOKE_EMAIL }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
        run: |
          mkdir -p test-results
          pytest tests/e2e/test_production_readonly_smoke.py -v -m "prod_safe" --junit-xml=test-results/production-readonly-e2e.xml

      - name: Write production deploy context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Production Deploy Context"
            echo "========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "tag=${{ steps.version.outputs.tag }}"
            echo "app_url=https://report.zitian.party"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}"
            echo "production_readonly_e2e_outcome=${{ steps.production_readonly_e2e.outcome }}"
            echo "marker=prod_safe"
          } > ci-context/production-deploy-context.txt

      - name: Upload production deploy test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-test-context
          path: |
            test-results/
            ci-context/production-deploy-context.txt
          retention-days: 14
