            apps/frontend/test-results/
            apps/frontend/playwright-report/
          retention-days: 14

  container-images:
    name: Build Staging Images
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Get Commit SHA
        id: get_sha
        run: |
          full_sha=$(git rev-parse HEAD)
          short_sha="${full_sha:0:7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Building staging images for commit: $short_sha"

      - name: Build-context Secret Scan (gitleaks)
        # AC7.18.1 (#1277, secret-scan half): fail-closed gitleaks scan over the
        # per-component Docker build context BEFORE the image build, so a secret
        # that entered ./apps/<component> cannot be baked into the published
        # :<sha> image. Mirrors the lint-job gitleaks gate (pinned + checksummed)
        # but scoped to the build context. --redact keeps the file/line finding
        # visible in the logs while masking the secret value. This is the
        # secret-scan half of #1277 only; image :<sha> retention is out of scope
        # and #1277 stays open for it.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          GITLEAKS_SHA256=ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
          ARCHIVE=/tmp/gitleaks.tar.gz
          curl -sSfL -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" -C /tmp gitleaks
          echo "Scanning Docker build context: apps/${{ matrix.component }}"
          /tmp/gitleaks detect --source "apps/${{ matrix.component }}" --no-git --redact \
            --config .gitleaks.toml --exit-code 1

      - name: Log in to Container registry
        # P1a (#879, AC7.12.4): publish :<sha> for main + release-branch commits, and
        # on demand via workflow_dispatch (the rare "preview an unmerged sha" escape hatch).
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend SHA image
        if: matrix.component == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ./apps/backend
          push: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch' }}
          # Plain single-manifest image: provenance/sbom attestations turn the push
          # into an OCI index that legacy (non-containerd) docker hosts choke on when
          # pulling. Keep images plainly pullable everywhere.
          provenance: false
          sbom: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Build Frontend SHA image
        if: matrix.component == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: ./apps/frontend
          push: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch' }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
          # G1 (#898, AC7.12.8): the published :<sha> image must be environment-independent.
          # Do NOT bake NEXT_PUBLIC_API_URL or NEXT_PUBLIC_APP_URL here — the front end uses
          # the same-origin relative /api path, so one image promotes unchanged across
          # staging and prod.
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

  tooling-coverage:
    name: Tooling/Common Coverage
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run tooling tests with coverage
        run: |
          mkdir -p coverage
          printf '[run]\nomit =\n    tests/tooling/*\n    common/__init__.py\n    common/**/__init__.py\n    tools/__init__.py\n    tools/**/__init__.py\n    tools/wait_for_cheap_ci.py\n    common/ci/wait_for_cheap_ci.py\n' > /tmp/tooling-coveragerc
          uv run --with pytest --with pytest-cov --with pytest-asyncio --with anyio --with pyyaml --with pydantic --with pydantic-settings --with email-validator --with structlog --with sqlalchemy --with asyncpg --with pdfplumber --with reportlab pytest tests/tooling/ \
            --cov=common \
            --cov=tools \
            --cov-config=/tmp/tooling-coveragerc \
            --cov-report= \
            -x -q
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/common.lcov --include='common/*'
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/tools.lcov --include='tools/*'

      - name: Upload tooling coverage context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-tooling
          path: |
            coverage/common.lcov
            coverage/tools.lcov
          retention-days: 14

  unified-coverage:
    name: Calculate Unified Coverage
    needs: [changes, backend, frontend-vitest, tooling-coverage]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-backend-*
          merge-multiple: true
          path: coverage-backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-frontend
          path: coverage-frontend

      - name: Download tooling coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-tooling
          path: coverage-tooling

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          if ls coverage-backend/*.lcov 1> /dev/null 2>&1; then
            python tools/merge_lcov.py coverage/backend.lcov coverage-backend/*.lcov
          else
            echo "No backend coverage found"
          fi
          if [ -f coverage-frontend/lcov.info ]; then
            cp coverage-frontend/lcov.info coverage/frontend.lcov
          else
            echo "No frontend coverage found"
          fi
          if [ -f coverage-tooling/common.lcov ]; then
            cp coverage-tooling/common.lcov coverage/common.lcov
          else
            echo "No common coverage found"
          fi
          if [ -f coverage-tooling/tools.lcov ]; then
            cp coverage-tooling/tools.lcov coverage/tools.lcov
          else
            echo "No tools coverage found"
          fi
      - name: Audit coverage policy
        run: |
          python tools/check_coverage_policy.py

      - name: Calculate unified coverage
        # Lenient by design: the merge step above deliberately tolerates a
        # coverage-producing shard that did not upload an artifact on this PR
        # (it echoes "No <component> coverage found" instead of failing). The
        # artifact preflight (#414) is therefore opt-in here — we do NOT pass
        # --require-artifacts / COVERAGE_REQUIRED_COMPONENTS, so a legitimately
        # absent artifact is reported (as 0% for the missing component) rather
        # than hard-aborting this always-run gate. The no-regression check still
        # applies to whatever LCOV is present.
        run: |
          python tools/calculate_unified_coverage.py

      - name: Write coverage debug context
        if: ${{ always() }}
        run: |
          mkdir -p coverage
          {
            echo "Coverage Debug Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo ""
            echo "Toolchain"
            echo "---------"
            python --version
            echo "fan_in_runtime=stdlib_python"
            echo ""
            echo "Coverage Inputs"
            echo "---------------"
            for file in \
              coverage/backend.lcov \
              coverage/frontend.lcov \
              coverage/common.lcov \
              coverage/tools.lcov \
              unified-coverage.json; do
              if [ -f "$file" ]; then
                bytes=$(wc -c < "$file" | tr -d ' ')
                sha=$(shasum -a 256 "$file" | awk '{print $1}')
                echo "$file bytes=$bytes sha256=$sha"
              else
                echo "$file missing"
              fi
            done
          } > coverage/coverage-context.txt

      - name: Upload unified coverage context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unified-coverage-context
          path: |
            coverage/backend.lcov
            coverage/frontend.lcov
            coverage/common.lcov
            coverage/tools.lcov
            coverage/coverage-context.txt
            unified-coverage.json
          retention-days: 14


      - name: Build line-only Coveralls LCOV
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python tools/build_unified_lcov.py coverage/coveralls-unified.lcov --strip-branches

      - name: Upload main unified coverage to Coveralls
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/coveralls-unified.lcov
          flag-name: unified
          base-path: .

  unified-coverage-baseline-pr:
    name: Open Unified Coverage Baseline PR
    needs: [changes, unified-coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.pr_required == 'true' && needs.unified-coverage.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download unified coverage context
        uses: actions/download-artifact@v8
        with:
          name: unified-coverage-context
          path: coverage-context

      # Note: baseline auto-push removed — branch protection requires PRs.
      # Main pushes open/update a reviewed baseline PR when the measured baseline rises.
      - name: Open unified coverage baseline PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_BRANCH: automation/unified-coverage-baseline
        run: |
          set -euo pipefail
          if [ ! -f coverage-context/unified-coverage.json ]; then
            echo "::error::unified-coverage-context did not contain unified-coverage.json"
            exit 1
          fi

          git switch -C "$BASELINE_BRANCH"
          cp coverage-context/unified-coverage.json unified-coverage.json
          if git diff --quiet -- unified-coverage.json; then
            echo "Unified coverage baseline is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add unified-coverage.json
          git commit -m "chore(ci): update unified coverage baseline"
          git push --force-with-lease origin "HEAD:$BASELINE_BRANCH"

          pr_body="$(mktemp)"
          cat > "$pr_body" <<'EOF'
          ## What

          Updates `unified-coverage.json` from the latest successful main CI coverage calculation.

          ## Why

          The no-regression gate still uses the committed baseline. This PR keeps branch protection intact while removing manual baseline file edits after coverage rises.
          EOF

          if gh pr view "$BASELINE_BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BASELINE_BRANCH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(ci): update unified coverage baseline" \
              --body-file "$pr_body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BASELINE_BRANCH" \
              --title "chore(ci): update unified coverage baseline" \
              --body-file "$pr_body"
          fi

  ac-traceability:
    name: AC Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: AC Traceability Check
        run: |
          set +e
          uv run --with pyyaml python tools/generate_ac_registry.py --check
          registry_status=$?
          # NOTE: the AC-index gate is exactly TWO gates and runs ONCE, in the
          # fast `lint` job (`tools/check_ac_index.py`). Its Gate A INTEGRITY now
          # FOLDS the former standalone `check_ac_traceability` (CI-stage
          # traceability classifications) and `check_critical_proof_matrix`
          # (per-proof trust/mirror/marker + macro-outcome contract) by calling
          # those modules as libraries — so they are no longer separate CI gate
          # STEPS here (no protection lost, no double-run of the index gate).
          uv run --with pyyaml python tools/check_e2e_epic_traceability.py --output "$RUNNER_TEMP/E2E-EPIC-TRACEABILITY.md"
          e2e_status=$?
          uv run --with pyyaml python tools/build_ac_traceability.py --output "$RUNNER_TEMP/AC-TEST-TRACEABILITY-AUDIT.md"
          audit_status=$?
          mkdir -p "$RUNNER_TEMP/reconciliation-audit"
          (
            cd apps/backend
            uv run python ../../tools/reconciliation_audit.py \
              --output-dir "$RUNNER_TEMP/reconciliation-audit"
          )
          reconciliation_audit_status=$?
          set -e

          {
            echo "AC Traceability Context"
            echo "======================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo ""
            echo "Gate Status"
            echo "-----------"
            echo "generate_ac_registry=$registry_status"
            echo "check_e2e_epic_traceability=$e2e_status"
            echo "build_ac_traceability=$audit_status"
            echo "reconciliation_audit_gate=$reconciliation_audit_status"
            echo ""
            echo "NOTE: CI-stage traceability + critical-proof-matrix contracts are"
            echo "now folded into the single check_ac_index gate (lint job)."
          } > "$RUNNER_TEMP/AC-TRACEABILITY-CONTEXT.md"

          if [ "$registry_status" -ne 0 ] || [ "$e2e_status" -ne 0 ] || [ "$audit_status" -ne 0 ] || [ "$reconciliation_audit_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload AC traceability audit
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ac-test-traceability-audit
          path: |
            ${{ runner.temp }}/AC-TEST-TRACEABILITY-AUDIT.md
            ${{ runner.temp }}/E2E-EPIC-TRACEABILITY.md
            ${{ runner.temp }}/AC-TRACEABILITY-CONTEXT.md
            ${{ runner.temp }}/reconciliation-audit/reconciliation-audit.json
            ${{ runner.temp }}/reconciliation-audit/reconciliation-audit.md
          retention-days: 14

  ac-behavioral-ratchet:
    name: AC Behavioral Score Ratchet
    # Wait for every test stage that emits junit (incl. frontend Vitest) so the aggregate is
    # complete and cannot race an in-flight upload.
    needs: [changes, backend, backend-integration, backend-e2e-tier1, frontend-vitest]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download backend shard junit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: backend-shard-*-test-context
          path: junit-artifacts

      - name: Download backend integration junit artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-integration-test-context
          path: junit-artifacts/backend-integration-test-context

      - name: Download backend Tier-1 junit artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-tier1-e2e-test-context
          path: junit-artifacts/backend-tier1-e2e-test-context

      - name: Download frontend Vitest junit artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-vitest-test-context
          path: junit-artifacts/frontend-vitest-test-context

      - name: Aggregate AC behavioral evidence and ratchet against baseline
        run: |
          # Collect every junit-xml emitted by the test stages (shards, integration, tier-1).
          junit_files=$(find junit-artifacts -name '*.xml' -print)
          if [ -z "$junit_files" ]; then
            echo "No junit-xml artifacts found — cannot evaluate AC behavioral evidence." >&2
            exit 1
          fi
          # shellcheck disable=SC2086
          python tools/aggregate_ac_evidence.py $junit_files --output ac-evidence-current.json
          # L2 (pass-required) + L3 (score ratchet) against the checked-in baseline.
          python tools/check_ac_score_baseline.py ac-evidence-current.json

  finish:
    needs: [changes, schema-migrations, backend, backend-integration, backend-e2e-tier1, frontend-build, frontend-vitest, frontend-playwright, frontend-telemetry-e2e, container-images, lint, tooling-coverage, unified-coverage, ac-traceability, ac-behavioral-ratchet]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Write Coverage-Effect Stage Summary
        if: ${{ always() }}
        run: |
          cat << "EOF" >> "$GITHUB_STEP_SUMMARY"
          ## CI Stage Coverage Effects

          | Stage | Coverage Effect | Behavior Proof |
          |---|---|---|
          | schema-migrations | not included in unified coverage | yes (Alembic DDL/schema drift) |
          | backend (5-way shard) | contributes to unified line coverage baseline | yes |
          | backend-integration | not included in unified coverage | yes (marker 'integration') |
          | backend-e2e-tier1 | not included in unified coverage | yes (marker 'e2e') |
          | frontend-build | not included in unified coverage | yes (typecheck + production build) |
          | frontend-vitest | contributes to unified line coverage baseline | yes |
          | frontend-playwright | not included in unified coverage | yes (provider-free browser UI) |
          | frontend-telemetry-e2e | not included in unified coverage | yes (browser telemetry emission) |
          | tooling-coverage | contributes common/tools to unified line coverage baseline | yes (tooling contracts) |
          EOF

      - name: Write CI timing summary
        if: ${{ always() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/github_workflow_timing_summary.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --title "CI Timing Summary" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Write coverage gate summary
        if: ${{ always() }}
        continue-on-error: true
        run: |
          {
            echo "## Coverage Gate"
            echo ""
            echo "- Authoritative coverage gate: \`Calculate Unified Coverage\` plus \`finish\`."
            echo "- Pull requests do not publish Coveralls status contexts; main pushes upload unified line coverage for badge/trend reporting only."
            echo "- Merge readiness follows \`finish\` and the committed \`unified-coverage.json\` baseline."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check job status
        run: |
          echo "Change Classification: ${{ needs.changes.result }}"
          echo "PR Env Required: ${{ needs.changes.outputs.pr_required }}"
          echo "PR Env Reason: ${{ needs.changes.outputs.pr_reason }}"
          echo "Schema Migrations: ${{ needs.schema-migrations.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Frontend Vitest: ${{ needs.frontend-vitest.result }}"
          echo "Frontend Playwright: ${{ needs.frontend-playwright.result }}"
          echo "Frontend Telemetry E2E: ${{ needs.frontend-telemetry-e2e.result }}"
          echo "Staging Images: ${{ needs.container-images.result }}"
          echo "Tooling/Common Coverage: ${{ needs.tooling-coverage.result }}"
          echo "Unified Coverage: ${{ needs.unified-coverage.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "AC Traceability: ${{ needs.ac-traceability.result }}"
          echo "AC Behavioral Ratchet: ${{ needs.ac-behavioral-ratchet.result }}"
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::Change classification failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [[ "${{ needs.ac-traceability.result }}" != "success" ]]; then
            echo "::error::AC traceability check failed"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.pr_required }}" == "true" ]]; then
            if [[ "${{ needs.schema-migrations.result }}" != "success" ]]; then
              echo "::error::Schema migration contract failed"
              exit 1
            fi
            if [[ "${{ needs.backend.result }}" != "success" ]]; then
              echo "::error::Backend tests failed"
              exit 1
            fi
            if [[ "${{ needs.backend-integration.result }}" != "success" ]]; then
              echo "::error::Backend integration tests failed"
              exit 1
            fi
            if [[ "${{ needs.backend-e2e-tier1.result }}" != "success" ]]; then
              echo "::error::Backend Tier-1 API E2E tests failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-build.result }}" != "success" ]]; then
              echo "::error::Frontend build/typecheck failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-vitest.result }}" != "success" ]]; then
              echo "::error::Frontend Vitest coverage failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-playwright.result }}" != "success" ]]; then
              echo "::error::Frontend Playwright failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-telemetry-e2e.result }}" != "success" ]]; then
              echo "::error::Frontend telemetry E2E failed"
              exit 1
            fi
            if [[ "${{ needs.tooling-coverage.result }}" != "success" ]]; then
              echo "::error::Tooling/common coverage failed"
              exit 1
            fi
            if [[ "${{ needs.unified-coverage.result }}" != "success" ]]; then
              echo "::error::Unified coverage check failed"
              exit 1
            fi
            if [[ "${{ needs.ac-behavioral-ratchet.result }}" != "success" ]]; then
              echo "::error::AC behavioral-score ratchet failed"
              exit 1
            fi
            if [[ "${{ needs.container-images.result }}" != "success" ]]; then
              echo "::error::Container image validation failed"
              exit 1
            fi
          else
            echo "Heavy backend/frontend/coverage jobs skipped for lightweight changes."
          fi
          echo "✅ All checks passed!"
