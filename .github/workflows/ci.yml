name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.event_name == 'push' && github.sha || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"

jobs:
  changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pr_required: ${{ steps.gates.outputs.pr_required }}
      pr_reason: ${{ steps.gates.outputs.pr_reason }}
      # True only when the Docker build context changed (Dockerfile/deps/lockfiles/
      # build config/entrypoint). Pure app-source changes are proven by frontend-build
      # and the backend test jobs, so container-images is right-moved off them.
      image_build_required: ${{ steps.classify.outputs.image_build_required }}
      # #1689: per-component change flags, so a PR only pays for what it touched
      # (frontend-telemetry-e2e skip, unified-coverage gate scoping).
      backend_changed: ${{ steps.classify.outputs.backend_changed }}
      frontend_changed: ${{ steps.classify.outputs.frontend_changed }}
      tools_changed: ${{ steps.classify.outputs.tools_changed }}
      common_changed: ${{ steps.classify.outputs.common_changed }}
      coverage_gate_components: ${{ steps.classify.outputs.coverage_gate_components }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          base_sha="${BASE_SHA:-}"
          head_sha="${HEAD_SHA:-}"

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-parse HEAD^)"
          fi

          if ! git diff --name-only "$base_sha" "$head_sha" > changed-files.txt; then
            git diff --name-only HEAD^ HEAD > changed-files.txt
          fi

          python tools/ci_change_classifier.py \
            --changed-files changed-files.txt \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Normalize Env x Stage gates
        id: gates
        env:
          ENV_STAGE_REQUIRED: ${{ steps.classify.outputs.env_stage_required }}
          ENV_STAGE_REASONS: ${{ steps.classify.outputs.env_stage_reasons }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          required = json.loads(os.environ["ENV_STAGE_REQUIRED"])
          reasons = json.loads(os.environ["ENV_STAGE_REASONS"])
          print(f"pr_required={str(required['pr']).lower()}")
          print(f"pr_reason={reasons['pr']}")
          PY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Needed by the PR Review Thread Merge Gate step: `gh api graphql` reads
      # the PR's review threads. The top-level `permissions:` block restricts
      # GITHUB_TOKEN to actions/contents read, so grant pull-requests read here.
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret Scan (gitleaks)
        # AC8.13.136 — content-level secret scan. Mirrors the gitleaks pre-commit
        # hook so the same gate runs locally and in CI (local==CI parity). Scans
        # the working tree (--no-git) to fail on committed credential material
        # without being tripped by unrelated git history.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          GITLEAKS_SHA256=ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
          ARCHIVE=/tmp/gitleaks.tar.gz
          curl -sSfL --retry 3 --retry-delay 5 --retry-connrefused -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact --no-banner \
            --config .gitleaks.toml --exit-code 1
      - name: Toolchain Contract Check
        run: python tools/check_toolchain_contract.py
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          # Keep exactly one setup-uv cache writer per CI run. Other jobs restore
          # the shared cache but do not race to reserve the same save key.
          save-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      # Fast-fail (left-move): these SSOT/contract gates are app-independent
      # (`uv run --with pyyaml[--with pydantic]`, no backend sync / npm) and are
      # the drift classes behind most CI failures. Running them BEFORE the
      # expensive `uv sync` + `npm ci` means a drift fails in ~20s instead of
      # after ~50s of setup. Same checks, no coverage change; ordering only.
      # Contract-loading gates need `pydantic`: the manifest gate projects
      # package concepts (#1799), while the AC-index gate projects package AC
      # vision anchors (#1858). Both remain isolated `--with` overlays rather
      # than a full backend `uv sync`.
      - name: SSOT Manifest Check
        run: |
          uv run --with pyyaml --with pydantic python tools/check_manifest.py
      - name: SSOT Governance Exceptions Check
        run: |
          uv run --with pyyaml python tools/check_governance_exceptions.py
      - name: SSOT Governance Report
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          base_sha="${BASE_SHA:-}"
          head_sha="${HEAD_SHA:-}"

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-parse HEAD^)"
          fi

          if ! git diff --name-only "$base_sha...$head_sha" > "$RUNNER_TEMP/ssot-changed-files.txt"; then
            git diff --name-only "$base_sha" "$head_sha" > "$RUNNER_TEMP/ssot-changed-files.txt"
          fi

          # --with pydantic (#1799): report_ssot_governance.py's finance_report
          # source now routes through check_manifest.py's computed union,
          # which loads package contracts (pydantic-backed PackageContract).
          uv run --with pyyaml --with pydantic python tools/report_ssot_governance.py \
            --changed-files "$RUNNER_TEMP/ssot-changed-files.txt" \
            --base-ref "$base_sha" \
            --fail-on-gate \
            --json-out "$RUNNER_TEMP/ssot-governance-report.json" \
            --markdown-out "$RUNNER_TEMP/SSOT-GOVERNANCE-REPORT.md"
          cat "$RUNNER_TEMP/SSOT-GOVERNANCE-REPORT.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Migration Risk Contract Check
        run: |
          uv run --with pyyaml python tools/check_migration_risk.py
      - name: CI Metrics Contract Check
        run: |
          uv run --with pyyaml python tools/check_ci_metrics_contract.py
      - name: Workflow Contract Check
        run: |
          uv run --with pyyaml python tools/check_workflow_contract.py
      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-
      - name: Install dependencies
        run: cd apps/backend && uv sync
      - name: Run Lint
        run: |
          cd apps/backend
          uv run ruff check src tests
          uv run ruff format src tests --check
      - name: Detached Owner Shortcut Guard
        run: |
          uv run python tools/check_detached_owner_shortcuts.py
      - name: Router Contract Maturity Guard
        run: |
          uv run python tools/audit_router_contracts.py --check
      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend
      - name: Audit frontend production dependencies
        run: npm run audit:prod
        working-directory: apps/frontend
      - name: Run Frontend Lint
        run: npm run lint
        working-directory: apps/frontend
      - name: Doc Consistency Check
        run: |
          uv run --with pyyaml python tools/lint_doc_consistency.py
      - name: Generated API Reference Check
        run: |
          cd apps/backend
          uv run python ../../tools/generate_api_reference.py --check
      - name: EPIC Status Pointer Check
        run: |
          # The EPIC-status numbers are a derived (not committed) view of the AC
          # graph; this only verifies the README pointer block is intact, never a
          # shifted AC total.
          uv run --with pyyaml python tools/generate_epic_status.py --check
      - name: Generated DB Schema Reference Check
        run: |
          cd apps/backend
          uv run python ../../tools/generate_db_schema_reference.py
          uv run python ../../tools/generate_db_schema_reference.py --check
      - name: AC Index Consistency Check
        run: |
          # The SINGLE AC-index gate, exactly TWO gates over the AC-keyed graph:
          # A) INTEGRITY (hard) — every AC managed + no dangling link, PLUS the
          #    two folded former-standalone contracts: CI-stage traceability
          #    (mandatory ACs must resolve to a real ref in a CI-required stage,
          #    with placeholder/stub/unexecuted classifications) and the
          #    critical-proof matrix contract (trust_mode/mirror/markers/scope/
          #    ci_tier/manual-gate evidence + macro-outcome shape). The old
          #    check_ac_traceability / check_critical_proof_matrix gate STEPS are
          #    retired; their logic runs here by importing them as libraries.
          # B) PROTECTION RATCHET — per-type count floor over protection-floor.json
          #    (the per-AC score floor runs in the ac-behavioral-ratchet job).
          uv run --with pyyaml --with pydantic python tools/check_ac_index.py
      - name: AC Authority-Tier Ratchet
        run: |
          # EPIC-026: shrink-only ratchet over common/meta/data/ac-tier-baseline.json.
          # Id-based: fails only when an AC whose id is absent from the baseline
          # (a genuinely new AC) lacks a {tier:XX} marker; the legacy untagged AC
          # ids in the baseline are tolerated and the debt may only shrink.
          uv run --with pyyaml python tools/check_ac_tier_baseline.py
      - name: AC Proof-Kind Matrix Enforcement
        run: |
          # EPIC-026 phase 2: enforce the tier->valid-proof-kind matrix
          # (common/meta/readme.md) for ACs that carry a {tier:XX}.
          # Untagged legacy ACs have no proof_kind and are ignored (non-breaking).
          # The rule with teeth: an LLM-LED AC's proof_kind MUST NOT be `exact`
          # (an LLM-emitted output cannot be proven by an exact golden assertion);
          # HU must be `evidence`; LLM-ONLY must not be exact.
          uv run --with pyyaml python tools/check_ac_proof_kind.py
      - name: Package-Model Migration-Safety Gates
        run: |
          # EPIC-026 phase 5 (issue #1355): the cross-source gates that must hold
          # before migrating legacy EPIC ACs into package roadmaps. All AST/text
          # (no pydantic), so they run in this lightweight lint env.
          # 1b: a shipped package's tier must be an AST-readable literal (else the
          #     registry untags it while the model keeps a tier).
          uv run --with pyyaml python tools/check_tier_ast_literal.py
          # 1c: an AC id must not be defined in both an EPIC table and a package
          #     roadmap (move ⇒ delete the EPIC row, else the stale tier wins).
          uv run --with pyyaml python tools/check_epic_package_dual.py
          # 1e: a draft package must carry no done ACs and must be registered.
          uv run --with pyyaml python tools/check_draft_packages.py
          # reconcile: a package's DECLARED tier must agree with its DETECTED
          # CODE/LLM band at the enforceable ends (CODE-ONLY ⟹ no LLM test;
          # LLM-ONLY ⟹ no deterministic test). Makes the declared tier checkable.
          uv run --with pyyaml python tools/check_authority_reconcile.py
          # #1867 S4: every new gate uses the shared CLI/main contract, while
          # legacy entry-point debt is locked behind a shrink-only baseline.
          uv run python tools/check_gate_main_contract.py
          # Baseline mutation flags state whether updates are monotonic or a
          # deliberate full rewrite; generic --update may never adopt debt.
          uv run python tools/check_baseline_update_contract.py
          # Top-level tools stay thin; historical fat entry points may only shrink.
          uv run python tools/check_tool_shim_contract.py
      - name: Tier Import Guard (CODE-ONLY must not import the LLM layer)
        run: |
          # EPIC-026 phase 3: enforce the cross-tier STRUCTURAL MUST rule
          # (common/meta/readme.md, rule 2 "CODE-ONLY stays pure"). AST-based,
          # direct-imports-only: a curated set of CODE-ONLY/financial-truth modules
          # (money/**, ledger/**, journal model, deterministic services) must
          # not import the LLM layer (src.llm) or a raw provider SDK
          # (litellm/openrouter/anthropic/openai). GREEN on main today; this is a
          # regression guard that keeps the deterministic core pure.
          python tools/check_tier_imports.py
      - name: LLM Cassette Integrity (balance-chain invariant)
        run: |
          # EPIC-023 AC23.7 / #1306-7: every committed statement-extraction
          # cassette must satisfy opening + Σ amounts ≈ closing (Decimal). A
          # re-recorded cassette where the LLM drifted into an inconsistent
          # extraction fails here. Pure Python (no key/network/DB), so it runs in
          # lint without touching the AC behavioral-score aggregator.
          python tools/check_llm_cassettes.py
      - name: LLM Cassette Graded Eval (field-accuracy drift ratchet)
        run: |
          # EPIC-023 AC23.8 / #1307: GRADED field-accuracy eval over committed
          # cassettes. AC23.7 above gates CONSISTENCY (the chain reconciles); this
          # gates ACCURACY — each cassette is scored per-field against a synthetic
          # ground truth and ratcheted against a per-case floor that only goes UP.
          # Fails when a refreshed cassette regresses below floor (incl. "balance
          # passes but a field is wrong"). Pure Python (no key/network/DB), so it
          # runs in lint without touching the AC behavioral-score aggregator.
          python tools/check_cassette_graded_eval.py
      - name: SSOT Ownership Lint
        run: |
          python tools/check_ssot_ownership.py --verbose
      - name: PR Review Thread Merge Gate
        # Issue #755 (scope 2a): block merge while an unresolved P0/P1 (or
        # unresolved Copilot-authored) review thread is open. Skips cleanly on
        # non-PR events because PR_NUMBER is empty (the checker exits 0).
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run python tools/check_pr_review_threads.py

  schema-migrations:
    name: Schema Migration Contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'

    services:
      postgres:
        image: postgres:15.14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_report_test
        ports:
          - 5432:5432
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: cd apps/backend && uv sync

      - name: Run Alembic migration contract
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/finance_report_test
        run: |
          set -euo pipefail
          cd apps/backend
          mkdir -p test-results ci-context
          {
            echo "Schema Migration Context"
            echo "========================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "database=finance_report_test"
            echo "proof=alembic-upgrade-head-plus-alembic-check"
          } > ci-context/schema-migration-context.txt
          {
            echo "[schema-migration] uv run alembic upgrade head"
            uv run alembic upgrade head
            echo "[schema-migration] uv run alembic check"
            uv run alembic check
          } 2>&1 | tee test-results/schema-migration.log

      - name: Upload schema migration test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: schema-migration-test-context
          path: |
            apps/backend/test-results/schema-migration.log
            apps/backend/ci-context/schema-migration-context.txt
          retention-days: 14
  backend:
    name: Backend Tests (Shard ${{ matrix.shard }}/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    services:
      postgres:
        image: postgres:15.14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_report_test
        ports:
          - 5432:5432
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: cd apps/backend && uv sync



      - name: Run Tests (Shard ${{ matrix.shard }}/5)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/finance_report_test
          S3_ACCESS_KEY: minio
          S3_SECRET_KEY: minio_local_secret
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_BUCKET: statements
          ENABLE_STORAGE_SWEEP: "false"
        run: |
          cd apps/backend
          mkdir -p test-results
          python - <<'PY'
          import json
          from pathlib import Path

          seed = Path("ci/backend-test-durations.json")
          if not seed.exists():
              raise SystemExit(f"pytest-split duration seed is missing: {seed}")
          durations = json.loads(seed.read_text(encoding="utf-8"))
          if len(durations) < 500:
              raise SystemExit(
                  f"pytest-split duration seed is too small: {len(durations)} entries"
              )
          print(f"Loaded pytest-split duration seed with {len(durations)} entries")
          PY
          uv run pytest -n auto -v \
            -m "not slow and not e2e and not integration" \
            --splits 5 \
            --group ${{ matrix.shard }} \
            --splitting-algorithm=least_duration \
            --durations-path ci/backend-test-durations.json \
            --cov=src \
            --cov-report=lcov:coverage-backend-${{ matrix.shard }}.lcov \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=0 \
            --dist worksteal \
            --junit-xml=test-results/backend-shard-${{ matrix.shard }}.xml

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend-${{ matrix.shard }}
          path: apps/backend/coverage-backend-${{ matrix.shard }}.lcov
          retention-days: 14

      - name: Upload backend shard test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-shard-${{ matrix.shard }}-test-context
          path: |
            apps/backend/test-results/backend-shard-${{ matrix.shard }}.xml
            apps/backend/test-results/served-cassettes*.txt
            apps/backend/coverage-backend-${{ matrix.shard }}.lcov
          retention-days: 14

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'

    services:
      postgres:
        image: postgres:15.14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_report_test
        ports:
          - 5432:5432
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: cd apps/backend && uv sync

      # #1828 G-health-honest-somewhere: this lane runs the REAL Bootloader
      # _check_database/_check_s3 (tests/integration/test_bootloader_real_checks.py),
      # so it needs a live S3-compatible service, not just the env vars.
      - name: Start MinIO
        run: |
          docker run -d \
            --name finance-report-minio-integration \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minio \
            -e MINIO_ROOT_PASSWORD=minio_local_secret \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data --console-address ":9001"

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:9000/minio/health/live
          docker run --rm --network host --entrypoint /bin/sh minio/mc:RELEASE.2025-08-13T08-35-41Z \
            -c 'mc alias set local http://127.0.0.1:9000 minio minio_local_secret && mc mb local/statements --ignore-existing'

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/finance_report_test
          S3_ACCESS_KEY: minio
          S3_SECRET_KEY: minio_local_secret
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_BUCKET: statements
          ENABLE_STORAGE_SWEEP: "false"
        run: |
          cd apps/backend
          mkdir -p test-results
          uv run pytest -n auto -v \
            --override-ini addopts="" \
            -m "integration" \
            --dist worksteal \
            --junit-xml=test-results/backend-integration.xml

      - name: Upload backend integration test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-test-context
          path: |
            apps/backend/test-results/backend-integration.xml
            apps/backend/test-results/served-cassettes*.txt
          retention-days: 14

      - name: Stage Contribution Summary (Behavioral proof only)
        if: always()
        run: |
          cat << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Backend Integration Stage
          - Scope: `-m "integration"` backend suites
          - Contribution: behavior proof channel only
          - Coverage effect: **not included** in unified line coverage baseline for now
          EOF

  backend-e2e-tier1:
    name: Backend Tier-1 API E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'

    services:
      postgres:
        image: postgres:15.14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_report_test
        ports:
          - 5432:5432
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: cd apps/backend && uv sync

      - name: Start MinIO
        run: |
          docker run -d \
            --name finance-report-minio-tier1 \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minio \
            -e MINIO_ROOT_PASSWORD=minio_local_secret \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data --console-address ":9001"

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:9000/minio/health/live
          docker run --rm --network host --entrypoint /bin/sh minio/mc:RELEASE.2025-08-13T08-35-41Z \
            -c 'mc alias set local http://127.0.0.1:9000 minio minio_local_secret && mc mb local/statements --ignore-existing'

      - name: Run Tier-1 API E2E Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/finance_report_test
          S3_ACCESS_KEY: minio
          S3_SECRET_KEY: minio_local_secret
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_BUCKET: statements
          ENABLE_STORAGE_SWEEP: "false"
        run: |
          cd apps/backend
          mkdir -p test-results
          pytest_extra_args=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pytest_extra_args+=(--maxfail=1)
          fi
          uv run pytest -v \
            --override-ini addopts="" \
            tests/e2e/test_core_journeys.py \
            tests/e2e/test_seeded_statement_journey.py \
            tests/e2e/test_statement_corpus_journeys.py \
            tests/e2e/test_epic025_dry_ssot_e2e.py \
            -m "e2e and not slow and not integration and not perf" \
            "${pytest_extra_args[@]}" \
            --junit-xml=test-results/backend-tier1-e2e.xml

      - name: Upload backend Tier-1 E2E test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-tier1-e2e-test-context
          path: |
            apps/backend/test-results/backend-tier1-e2e.xml
            apps/backend/test-results/served-cassettes*.txt
          retention-days: 14

      - name: Stage Contribution Summary (Behavioral proof only)
        if: always()
        run: |
          cat << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Backend Tier-1 API E2E Stage
          - Scope: `tests/e2e/test_core_journeys.py` with `-m "e2e and not slow and not integration and not perf"`
          - Contribution: behavior proof channel only
          - Coverage effect: **not included** in unified line coverage baseline for now
          EOF

  frontend-build:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
