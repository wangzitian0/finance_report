name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  PYTHON_VERSION: "3.12.12"
  NODE_VERSION: "20.19.0"
  UV_VERSION: "0.9.18"

jobs:
  changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      heavy_required: ${{ steps.classify.outputs.heavy_required }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          base_sha="${BASE_SHA:-}"
          head_sha="${HEAD_SHA:-}"

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-parse HEAD^)"
          fi

          if ! git diff --name-only "$base_sha" "$head_sha" > changed-files.txt; then
            git diff --name-only HEAD^ HEAD > changed-files.txt
          fi

          python tools/ci_change_classifier.py \
            --changed-files changed-files.txt \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Toolchain Contract Check
        run: python tools/check_toolchain_contract.py
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-
      - name: Install dependencies
        run: cd apps/backend && uv sync
      - name: Run Lint
        run: |
          cd apps/backend
          uv run ruff check src/
          uv run ruff format src/ --check
      - name: Doc Consistency Check
        run: |
          uv run --with pyyaml python tools/lint_doc_consistency.py
      - name: SSOT Ownership Lint
        run: |
          python tools/check_ssot_ownership.py --verbose
      - name: SSOT Manifest Check
        run: |
          uv run --with pyyaml python tools/check_manifest.py
  backend:
    name: Backend Tests (Shard ${{ matrix.shard }}/6)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.heavy_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    
    services:
      postgres:
        image: postgres:15.14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_report_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0
        with:
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('apps/backend/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: cd apps/backend && uv sync



      - name: Run Tests (Shard ${{ matrix.shard }}/6)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/finance_report_test
          S3_ACCESS_KEY: minio
          S3_SECRET_KEY: minio_local_secret
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_BUCKET: statements
          ENABLE_STORAGE_SWEEP: "false"
        run: |
          cd apps/backend
          uv run pytest -n auto -v \
            -m "not slow and not e2e and not integration" \
            --splits 6 \
            --group ${{ matrix.shard }} \
            --cov=src \
            --cov-report=lcov:coverage-backend-${{ matrix.shard }}.lcov \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=0 \
            --dist worksteal

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend-${{ matrix.shard }}
          path: apps/backend/coverage-backend-${{ matrix.shard }}.lcov
          retention-days: 1

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.heavy_required == 'true'
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fetch submodule history for Moon VCS
        run: |
          git submodule foreach --recursive 'git fetch origin 7db811abd43a3fc389db92721baae9f4b0e8fb51 2>/dev/null || true'
          git submodule foreach --recursive 'git fetch --unshallow 2>/dev/null || git fetch --depth=1000 || true'

      - name: Fetch submodule PR refs
        run: |
          cd repo && git fetch origin '+refs/pull/*/head:refs/remotes/origin/pr/*'

      - name: Install moon
        uses: moonrepo/setup-toolchain@v0
        with:
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-${{ hashFiles('apps/frontend/**/*.ts', 'apps/frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Build Frontend (via Moon)
        run: moon run :build

      - name: Run Frontend Tests
        run: npm run test:coverage
        working-directory: apps/frontend

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: apps/frontend/coverage/lcov.info
          retention-days: 1

  container-images:
    name: Build Staging Images
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.heavy_required == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Commit SHA
        id: get_sha
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Building staging images for commit: $short_sha"

      - name: Log in to Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend SHA image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Build Frontend SHA image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}
            NEXT_PUBLIC_API_URL=https://report-staging.zitian.party
            NEXT_PUBLIC_APP_URL=https://report-staging.zitian.party

  unified-coverage:
    name: Calculate Unified Coverage
    needs: [changes, backend, frontend]
    if: needs.changes.outputs.heavy_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-backend-*
          merge-multiple: true
          path: coverage-backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: coverage-frontend

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          if ls coverage-backend/*.lcov 1> /dev/null 2>&1; then
            uv run python tools/merge_lcov.py coverage/backend.lcov coverage-backend/*.lcov
          else
            echo "No backend coverage found"
          fi
          if [ -f coverage-frontend/lcov.info ]; then
            cp coverage-frontend/lcov.info coverage/frontend.lcov
          else
            echo "No frontend coverage found"
          fi
      - name: Run tooling tests with coverage
        run: |
          printf '[run]\nomit =\n    tests/tooling/*\n    common/__init__.py\n    common/**/__init__.py\n    tools/__init__.py\n    tools/**/__init__.py\n' > /tmp/tooling-coveragerc
          uv run --with pytest --with pytest-cov --with pytest-asyncio --with anyio --with pyyaml --with pydantic --with pydantic-settings --with sqlalchemy --with asyncpg --with pdfplumber --with reportlab pytest tests/tooling/ \
            --cov=common \
            --cov=tools \
            --cov-config=/tmp/tooling-coveragerc \
            --cov-report= \
            -x -q
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/common.lcov --include='common/*'
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/tools.lcov --include='tools/*'
      - name: Check CI metrics contract
        run: |
          uv run python tools/check_ci_metrics_contract.py
      - name: Audit coverage policy
        run: |
          uv run python tools/check_coverage_policy.py

      - name: Calculate unified coverage
        run: |
          uv run python tools/calculate_unified_coverage.py


      # Note: baseline auto-push removed — branch protection requires PRs.
      # Update unified-coverage.json manually via PR when raising the threshold.


      - name: Merge all coverage into unified LCOV
        run: |
          uv run python tools/build_unified_lcov.py coverage/unified.lcov

      - name: Upload unified coverage to Coveralls
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/unified.lcov
          flag-name: unified
          base-path: .

      - name: Upload backend to Coveralls (per-flag)
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/backend.lcov
          flag-name: backend
          base-path: apps/backend
      - name: Upload frontend to Coveralls (per-flag)
        # Note: hashFiles() evaluates at plan time before steps run; use always() + action handles missing file
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/frontend.lcov
          flag-name: frontend
          base-path: apps/frontend

  ac-traceability:
    name: AC Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: AC Traceability Check
        run: |
          uv run --with pyyaml python tools/generate_ac_registry.py --check
          uv run --with pyyaml python tools/check_ac_traceability.py
          uv run --with pyyaml python tools/check_critical_proof_matrix.py --output "$RUNNER_TEMP/CRITICAL-PROOF-MATRIX.md"
          uv run --with pyyaml python tools/build_ac_traceability.py --output "$RUNNER_TEMP/AC-TEST-TRACEABILITY-AUDIT.md"

      - name: Upload AC traceability audit
        uses: actions/upload-artifact@v4
        with:
          name: ac-test-traceability-audit
          path: |
            ${{ runner.temp }}/AC-TEST-TRACEABILITY-AUDIT.md
            ${{ runner.temp }}/CRITICAL-PROOF-MATRIX.md
          retention-days: 14

  finish:
    needs: [changes, backend, frontend, container-images, lint, unified-coverage, ac-traceability]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Write CI timing summary
      if: ${{ always() }}
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        python tools/github_workflow_timing_summary.py \
          --repo "${{ github.repository }}" \
          --run-id "${{ github.run_id }}" \
          --title "CI Timing Summary" \
          --summary-path "$GITHUB_STEP_SUMMARY"

    - name: Check job status
      run: |
        echo "Change Classification: ${{ needs.changes.result }}"
        echo "Heavy CI Required: ${{ needs.changes.outputs.heavy_required }}"
        echo "Classification Reason: ${{ needs.changes.outputs.reason }}"
        echo "Backend: ${{ needs.backend.result }}"
        echo "Frontend: ${{ needs.frontend.result }}"
        echo "Staging Images: ${{ needs.container-images.result }}"
        echo "Unified Coverage: ${{ needs.unified-coverage.result }}"
        echo "Lint: ${{ needs.lint.result }}"
        echo "AC Traceability: ${{ needs.ac-traceability.result }}"
        if [[ "${{ needs.changes.result }}" != "success" ]]; then
          echo "::error::Change classification failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "::error::Lint failed"
          exit 1
        fi
        if [[ "${{ needs.ac-traceability.result }}" != "success" ]]; then
          echo "::error::AC traceability check failed"
          exit 1
        fi
        if [[ "${{ needs.changes.outputs.heavy_required }}" == "true" ]]; then
          if [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "::error::Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "::error::Frontend build/tests failed"
            exit 1
          fi
          if [[ "${{ needs.unified-coverage.result }}" != "success" ]]; then
            echo "::error::Unified coverage check failed"
            exit 1
          fi
          if [[ "${{ needs.container-images.result }}" != "success" ]]; then
            echo "::error::Container image validation failed"
            exit 1
          fi
        else
          echo "Heavy backend/frontend/coverage jobs skipped for lightweight changes."
        fi
        echo "✅ All checks passed!"
