    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: apps/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-${{ hashFiles('apps/frontend/**/*.ts', 'apps/frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Run Frontend Type Check
        run: npm run typecheck
        working-directory: apps/frontend

      - name: Build Frontend
        run: npm run build
        working-directory: apps/frontend

  frontend-vitest:
    name: Frontend Vitest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Run Frontend Tests
        run: |
          mkdir -p test-results
          npm run test:coverage -- --reporter=default --reporter=junit --outputFile.junit=test-results/vitest-junit.xml
        working-directory: apps/frontend

      - name: Upload frontend coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          path: apps/frontend/coverage/lcov.info
          retention-days: 14

      - name: Upload frontend Vitest test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-vitest-test-context
          path: |
            apps/frontend/test-results/
            apps/frontend/coverage/lcov.info
          retention-days: 14

  frontend-playwright:
    name: Frontend Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: apps/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-${{ hashFiles('apps/frontend/**/*.ts', 'apps/frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Build Frontend
        run: npm run build
        working-directory: apps/frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Frontend Playwright Browser
        # #1767: retry a transient toolchain download (network flake on the
        # ~400MB chromium fetch) with bounded exponential backoff, mirroring
        # .github/actions/setup-e2e-tests's retry_download idiom. Cached above,
        # so a warm cache skips the download and this step is a fast no-op.
        run: |
          set -uo pipefail
          attempts=3
          delay=10
          for n in $(seq 1 "$attempts"); do
            echo "::group::playwright install chromium (attempt ${n}/${attempts})"
            if npx playwright install chromium --with-deps; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$n" -lt "$attempts" ]; then
              echo "playwright install attempt ${n} failed; retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          echo "::error::playwright install chromium failed after ${attempts} attempts."
          exit 1
        working-directory: apps/frontend

      - name: Run Frontend Playwright Tests
        run: npm run test:e2e -- --reporter=line,html
        working-directory: apps/frontend

      - name: Upload frontend Playwright test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-playwright-test-context
          path: |
            apps/frontend/test-results/
            apps/frontend/playwright-report/
          retention-days: 14

  frontend-telemetry-e2e:
    name: Frontend Telemetry E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    # #1689: right-moved off unrelated PRs (browser install is ~2-3 min). Always
    # runs on main/release push and manual dispatch (this is the production
    # observability canary); on a PR it only runs when apps/frontend/** changed,
    # mirroring container-images' image_build_required pattern above.
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))
      || github.event_name == 'workflow_dispatch'
      || (needs.changes.outputs.pr_required == 'true' && needs.changes.outputs.frontend_changed == 'true')

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: apps/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-${{ hashFiles('apps/frontend/**/*.ts', 'apps/frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Build Frontend
        run: npm run build
        working-directory: apps/frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Frontend Playwright Browser
        # #1767: retry a transient toolchain download (network flake on the
        # ~400MB chromium fetch) with bounded exponential backoff, mirroring
        # .github/actions/setup-e2e-tests's retry_download idiom. Cached above,
        # so a warm cache skips the download and this step is a fast no-op.
        run: |
          set -uo pipefail
          attempts=3
          delay=10
          for n in $(seq 1 "$attempts"); do
            echo "::group::playwright install chromium (attempt ${n}/${attempts})"
            if npx playwright install chromium --with-deps; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$n" -lt "$attempts" ]; then
              echo "playwright install attempt ${n} failed; retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          echo "::error::playwright install chromium failed after ${attempts} attempts."
          exit 1
        working-directory: apps/frontend

      - name: Run Frontend Telemetry-Emission E2E (#1169 / EPIC-024 AC24.2)
        # Real-browser proof that browser OTel spans export to /v1/traces and
        # OpenPanel events dispatch. Runs under its own config because it injects
        # the OTel + OpenPanel config via webServer.env (hermetic: every
        # telemetry destination is intercepted in-test).
        run: npm run test:e2e:telemetry
        working-directory: apps/frontend

      - name: Upload frontend telemetry E2E test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-telemetry-test-context
          path: |
            apps/frontend/test-results/
            apps/frontend/playwright-report/
          retention-days: 14

  container-images:
    name: Build Staging Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    # Main/release push (and manual dispatch) ALWAYS build + push the immutable
    # per-commit :<sha> image: the Dockerfiles COPY app source into the image, so
    # every commit's image content differs, and promote-not-rebuild (deploy_v2
    # release) requires a :<sha> artifact for any releasable commit. A build-context
    # gate alone (image_build_required) leaves source-only / submodule-only commits
    # with no :<sha> image to promote. PR keeps the narrow build-context-only
    # dry-run for speed (no push happens on PRs anyway).
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')))
      || github.event_name == 'workflow_dispatch'
      || (needs.changes.outputs.pr_required == 'true' && needs.changes.outputs.image_build_required == 'true')
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Get Commit SHA
        id: get_sha
        run: |
          full_sha=$(git rev-parse HEAD)
          short_sha="${full_sha:0:7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Building staging images for commit: $short_sha"

      - name: Build-context Secret Scan (gitleaks)
        # AC7.18.1 (#1277, secret-scan half): fail-closed gitleaks scan over the
        # per-component Docker build context BEFORE the image build, so a secret
        # that entered ./apps/<component> cannot be baked into the published
        # :<sha> image. Mirrors the lint-job gitleaks gate (pinned + checksummed)
        # but scoped to the build context. --redact keeps the file/line finding
        # visible in the logs while masking the secret value. This is the
        # secret-scan half of #1277 only; image :<sha> retention is out of scope
        # and #1277 stays open for it.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          GITLEAKS_SHA256=ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
          ARCHIVE=/tmp/gitleaks.tar.gz
          curl -sSfL --retry 3 --retry-delay 5 --retry-connrefused -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" -C /tmp gitleaks
          echo "Scanning Docker build context: apps/${{ matrix.component }}"
          /tmp/gitleaks detect --source "apps/${{ matrix.component }}" --no-git --redact \
            --config .gitleaks.toml --exit-code 1

      - name: Log in to Container registry
        # P1a (#879, AC7.12.4): publish :<sha> for main + release-branch commits, and
        # on demand via workflow_dispatch (the rare "preview an unmerged sha" escape hatch).
        if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend SHA image
        if: matrix.component == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ./apps/backend
          push: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch' }}
          # Plain single-manifest image: provenance/sbom attestations turn the push
          # into an OCI index that legacy (non-containerd) docker hosts choke on when
          # pulling. Keep images plainly pullable everywhere.
          provenance: false
          sbom: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.get_sha.outputs.short_sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

      - name: Build Frontend SHA image
        if: matrix.component == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: ./apps/frontend
          push: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || github.event_name == 'workflow_dispatch' }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.get_sha.outputs.short_sha }}
          # G1 (#898, AC7.12.8): the published :<sha> image must be environment-independent.
          # Do NOT bake NEXT_PUBLIC_API_URL or NEXT_PUBLIC_APP_URL here — the front end uses
          # the same-origin relative /api path, so one image promotes unchanged across
          # staging and prod.
          build-args: |
            GIT_COMMIT_SHA=${{ steps.get_sha.outputs.short_sha }}

  verify-sha-image-published:
    name: Verify Commit Image Published
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [container-images]
    # #1759 (W4 of #1435): "every main commit produces a promotable :<sha>"
    # was previously guaranteed only by design (container-images always
    # builds+pushes on main push) — nothing verified the guarantee actually
    # held for a given commit. A push where the build step reports success
    # but the image never lands in the registry would only surface later, at
    # promote time. This job independently re-inspects the registry (not
    # trusting the build step's own self-report) immediately after the
    # build, so a violation is caught at commit time. container-images
    # always runs on main push (see its own if:), so needs: alone is enough
    # to gate this on that job's success.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get Commit SHA
        id: get_sha
        run: |
          full_sha=$(git rev-parse HEAD)
          short_sha="${full_sha:0:7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify :<sha> images exist in registry
        run: |
          set -euo pipefail
          python tools/verify_release_images.py \
            --registry "${{ env.REGISTRY }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --version-ref "${{ steps.get_sha.outputs.short_sha }}"

  tooling-coverage:
    name: Tooling/Common Coverage
    needs: [changes]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run tooling tests with coverage
        run: |
          mkdir -p coverage
          printf '[run]\nomit =\n    tests/tooling/*\n    common/__init__.py\n    common/**/__init__.py\n    tools/__init__.py\n    tools/**/__init__.py\n    tools/wait_for_cheap_ci.py\n    common/testing/wait_for_cheap_ci.py\n' > /tmp/tooling-coveragerc
          # #1767: -n auto (pytest-xdist) parallelizes across the runner's cores;
          # pytest-cov auto-combines each worker's coverage data at session end
          # (no [tool.coverage.run] parallel=true needed -- verified locally: -n
          # auto produced identical common.lcov/tools.lcov content to a serial
          # run, just ~3.5x faster: 2022 tests in ~58s vs ~205s). This was the
          # critical-path job (~451s of the ~510s main-push pipeline).
          uv run --with pytest --with pytest-cov --with pytest-xdist --with pytest-asyncio --with anyio --with pyyaml --with pydantic --with pydantic-settings --with email-validator --with structlog --with sqlalchemy --with asyncpg --with fastapi --with httpx --with pdfplumber --with reportlab --with boto3 --with "infra2-sdk @ https://github.com/wangzitian0/infra2-sdk/releases/download/v0.1.0/infra2_sdk-0.1.0-py3-none-any.whl" pytest tests/tooling/ \
            --cov=common \
            --cov=tools \
            --cov=apps/backend/src \
            --cov-config=/tmp/tooling-coveragerc \
            --cov-report= \
            -n auto -x -q
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/common.lcov --include='common/*'
          COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov -o coverage/tools.lcov --include='tools/*'
          # #1669 moved env_keys.py/schema_validation.py from common/config into
          # apps/backend/src/runtime/extension/, so they now belong to the
          # "backend" coverage bucket. Their only test suite is tests/tooling/
          # (they must stay importable in this minimal env), which the Backend
          # Tests job never runs — so measure them here and merge into
          # backend.lcov instead, rather than letting them show as uncovered.
          # The report must be generated with cwd=apps/backend (matching how
          # the Backend Tests shards run `--cov=src`) so the emitted SF: paths
          # (src/runtime/...) match the shards' paths exactly — otherwise
          # merge_lcov.py treats them as distinct files and double-counts lines.
          (cd apps/backend && COVERAGE_RCFILE=/tmp/tooling-coveragerc uv run --with coverage coverage lcov \
            --data-file="$GITHUB_WORKSPACE/.coverage" \
            -o "$GITHUB_WORKSPACE/coverage/backend-tooling.lcov" \
            --include='src/runtime/extension/env_keys.py,src/runtime/extension/schema_validation.py')

      - name: Upload tooling coverage context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-tooling
          path: |
            coverage/common.lcov
            coverage/tools.lcov
            coverage/backend-tooling.lcov
          retention-days: 14

  unified-coverage:
    name: Calculate Unified Coverage
    needs: [changes, backend, frontend-vitest, tooling-coverage]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          # #1810: the diff coverage gate needs history to resolve the
          # merge-base against the PR base branch.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-backend-*
          merge-multiple: true
          path: coverage-backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-frontend
          path: coverage-frontend

      - name: Download tooling coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-tooling
          path: coverage-tooling

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          backend_inputs=()
          if ls coverage-backend/*.lcov 1> /dev/null 2>&1; then
            backend_inputs+=(coverage-backend/*.lcov)
          fi
          if [ -f coverage-tooling/backend-tooling.lcov ]; then
            backend_inputs+=(coverage-tooling/backend-tooling.lcov)
          fi
          if [ ${#backend_inputs[@]} -gt 0 ]; then
            python tools/merge_lcov.py coverage/backend.lcov "${backend_inputs[@]}"
          else
            echo "No backend coverage found"
          fi
          if [ -f coverage-frontend/lcov.info ]; then
            cp coverage-frontend/lcov.info coverage/frontend.lcov
          else
            echo "No frontend coverage found"
          fi
          if [ -f coverage-tooling/common.lcov ]; then
            cp coverage-tooling/common.lcov coverage/common.lcov
          else
            echo "No common coverage found"
          fi
          if [ -f coverage-tooling/tools.lcov ]; then
            cp coverage-tooling/tools.lcov coverage/tools.lcov
          else
            echo "No tools coverage found"
          fi

      # #1810 (G-diff-coverage): on PRs, the BLOCKING coverage verdict is
      # diff-scoped — changed/added lines in governed source trees must be
      # covered at or above the threshold (default 85%), and a red verdict
      # names the uncovered file:line ranges. Deterministic per PR, no
      # baseline, no epsilon, locally reproducible from the tests the author
      # is already running (tools/check_diff_coverage.py).
      - name: Diff coverage gate (PR)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF"
          python tools/check_diff_coverage.py --base "origin/$GITHUB_BASE_REF"

      - name: Audit coverage policy
        run: |
          python tools/check_coverage_policy.py

      - name: Calculate unified coverage
        # Lenient by design: the merge step above deliberately tolerates a
        # coverage-producing shard that did not upload an artifact on this PR
        # (it echoes "No <component> coverage found" instead of failing). The
        # artifact preflight (#414) is therefore opt-in here — we do NOT pass
        # --require-artifacts / COVERAGE_REQUIRED_COMPONENTS, so a legitimately
        # absent artifact is reported (as 0% for the missing component) rather
        # than hard-aborting this always-run gate.
        #
        # #1810: on a PR the component-% ratchet is REPORT-ONLY — a detected
        # baseline regression is printed in this step's output but does not
        # fail the job; the blocking PR coverage verdict is the diff coverage
        # gate step above. Main pushes run in "block" mode: the ratchet stays
        # the main-only no-regression water-line, and the raise-only baseline
        # floor (unified-coverage-baseline-pr) is unchanged.
        #
        # #1689 (still active for the report): the scoped gate-components list
        # names which components' regressions are attributed to THIS PR in the
        # report; main-branch push always evaluates the full unscoped set (env
        # unset here).
        env:
          COVERAGE_GATE_COMPONENTS: ${{ github.event_name == 'pull_request' && needs.changes.outputs.coverage_gate_components || '' }}
          COVERAGE_RATCHET_MODE: ${{ github.event_name == 'pull_request' && 'report' || 'block' }}
        run: |
          python tools/calculate_unified_coverage.py

      - name: Write coverage debug context
        if: ${{ always() }}
        run: |
          mkdir -p coverage
          {
            echo "Coverage Debug Context"
            echo "======================"
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo ""
            echo "Toolchain"
            echo "---------"
            python --version
            echo "fan_in_runtime=stdlib_python"
            echo ""
            echo "Coverage Inputs"
            echo "---------------"
            for file in \
              coverage/backend.lcov \
              coverage/frontend.lcov \
              coverage/common.lcov \
              coverage/tools.lcov \
              unified-coverage.json; do
              if [ -f "$file" ]; then
                bytes=$(wc -c < "$file" | tr -d ' ')
                sha=$(shasum -a 256 "$file" | awk '{print $1}')
                echo "$file bytes=$bytes sha256=$sha"
              else
                echo "$file missing"
              fi
            done
          } > coverage/coverage-context.txt

      - name: Upload unified coverage context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: unified-coverage-context
          path: |
            coverage/backend.lcov
            coverage/frontend.lcov
            coverage/common.lcov
            coverage/tools.lcov
            coverage/coverage-context.txt
            unified-coverage.json
          retention-days: 14


      - name: Build line-only Coveralls LCOV
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python tools/build_unified_lcov.py coverage/coveralls-unified.lcov --strip-branches

      - name: Upload main unified coverage to Coveralls
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/coveralls-unified.lcov
          flag-name: unified
          base-path: .

  unified-coverage-baseline-pr:
    name: Open Unified Coverage Baseline PR
    needs: [changes, unified-coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.pr_required == 'true' && needs.unified-coverage.result == 'success'
    # Best-effort post-merge automation: opening/refreshing the baseline PR must
    # never fail the main CI run. A red run here has been silently blocking
    # release-image promotion (the promote step gates on a green main CI run).
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download unified coverage context
        uses: actions/download-artifact@v8
        with:
          name: unified-coverage-context
          path: coverage-context

      # Note: baseline auto-push removed — branch protection requires PRs.
      # Main pushes open/update a reviewed baseline PR when the measured baseline rises.
      - name: Open unified coverage baseline PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_BRANCH: automation/unified-coverage-baseline
        run: |
          set -euo pipefail
          if [ ! -f coverage-context/unified-coverage.json ]; then
            echo "::error::unified-coverage-context did not contain unified-coverage.json"
            exit 1
          fi

          git switch -C "$BASELINE_BRANCH"
          # Quantized rise-only MERGE: raw covered_lines jitter ±1 between runs,
          # so a byte-level diff churns a baseline PR on every main push. Fold
          # in ONLY the components whose ROUNDED percent rose; a component
          # whose percent dipped keeps its old baseline triple, so jitter (or a
          # real drop inside the gate's epsilon) can never walk the committed
          # baseline downward while something else rises. The written unified
          # triple may then not equal the breakdown sums — sound, because the
          # regression gate compares each recorded percent independently.
          if ! python3 - <<'PY'
          import json, sys
          old = json.load(open("unified-coverage.json"))
          new = json.load(open("coverage-context/unified-coverage.json"))
          def pct(d):
              return round(float(d.get("coverage_percent", 0)), 2)
          merged = dict(new)
          merged["breakdown"] = dict(new.get("breakdown", {}))
          rises, kept = {}, []
          for name, comp in list(merged["breakdown"].items()):
              o = old.get("breakdown", {}).get(name)
              if o is None or pct(comp) > pct(o):
                  rises[name] = (pct(o) if o else None, pct(comp))
              else:
                  merged["breakdown"][name] = o
                  kept.append(name)
          if pct(new) > pct(old):
              rises["unified"] = (pct(old), pct(new))
          else:
              for key in ("total_lines", "covered_lines", "coverage_percent"):
                  merged[key] = old.get(key, merged.get(key))
              kept.append("unified")
          print(f"rises: {rises or 'none'}; kept old baseline for: {kept or 'none'}")
          if not rises:
              sys.exit(1)
          with open("unified-coverage.json", "w") as f:
              json.dump(merged, f, indent=2)
              f.write("\n")
          PY
          then
            echo "No rounded-percent rise — line-count jitter only; skipping baseline PR."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add unified-coverage.json
          git commit -m "chore(ci): update unified coverage baseline"
          # Plain --force, not a leased push: the runner's shallow checkout
          # never fetches this branch, so the lease has no remote-tracking ref to
          # compare against and git rejects every push with "stale info". This is
          # a dedicated single-writer bot branch, so a force push is safe.
          git push --force origin "HEAD:$BASELINE_BRANCH"

          pr_body="$(mktemp)"
          cat > "$pr_body" <<'EOF'
          ## What

          Updates `unified-coverage.json` from the latest successful main CI coverage calculation.

          ## Why

          The no-regression gate still uses the committed baseline. This PR keeps branch protection intact while removing manual baseline file edits after coverage rises.
          EOF

          if gh pr view "$BASELINE_BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BASELINE_BRANCH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(ci): update unified coverage baseline" \
              --body-file "$pr_body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BASELINE_BRANCH" \
              --title "chore(ci): update unified coverage baseline" \
              --body-file "$pr_body"
          fi

  ac-traceability:
    name: AC Traceability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: AC Traceability Check
        run: |
          set +e
          uv run --with pyyaml python tools/generate_ac_registry.py --check
          registry_status=$?
          # NOTE: the AC-index gate is exactly TWO gates and runs ONCE, in the
          # fast `lint` job (`tools/check_ac_index.py`). Its Gate A INTEGRITY now
          # FOLDS the former standalone `check_ac_traceability` (CI-stage
          # traceability classifications) and `check_critical_proof_matrix`
          # (per-proof trust/mirror/marker + macro-outcome contract) by calling
          # those modules as libraries — so they are no longer separate CI gate
          # STEPS here (no protection lost, no double-run of the index gate).
          uv run --with pyyaml python tools/check_e2e_epic_traceability.py --output "$RUNNER_TEMP/E2E-EPIC-TRACEABILITY.md"
          e2e_status=$?
          uv run --with pyyaml python tools/build_ac_traceability.py --output "$RUNNER_TEMP/AC-TEST-TRACEABILITY-AUDIT.md"
          audit_status=$?
          mkdir -p "$RUNNER_TEMP/reconciliation-audit"
          (
            cd apps/backend
            uv run python ../../tools/reconciliation_audit.py \
              --output-dir "$RUNNER_TEMP/reconciliation-audit"
          )
          reconciliation_audit_status=$?
          set -e

          {
            echo "AC Traceability Context"
            echo "======================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo ""
            echo "Gate Status"
            echo "-----------"
            echo "generate_ac_registry=$registry_status"
            echo "check_e2e_epic_traceability=$e2e_status"
            echo "build_ac_traceability=$audit_status"
            echo "reconciliation_audit_gate=$reconciliation_audit_status"
            echo ""
            echo "NOTE: CI-stage traceability + critical-proof-matrix contracts are"
            echo "now folded into the single check_ac_index gate (lint job)."
          } > "$RUNNER_TEMP/AC-TRACEABILITY-CONTEXT.md"

          if [ "$registry_status" -ne 0 ] || [ "$e2e_status" -ne 0 ] || [ "$audit_status" -ne 0 ] || [ "$reconciliation_audit_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload AC traceability audit
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ac-test-traceability-audit
          path: |
            ${{ runner.temp }}/AC-TEST-TRACEABILITY-AUDIT.md
            ${{ runner.temp }}/E2E-EPIC-TRACEABILITY.md
            ${{ runner.temp }}/AC-TRACEABILITY-CONTEXT.md
            ${{ runner.temp }}/reconciliation-audit/reconciliation-audit.json
            ${{ runner.temp }}/reconciliation-audit/reconciliation-audit.md
          retention-days: 14

  ac-behavioral-ratchet:
    name: AC Behavioral Score Ratchet
    # Wait for every test stage that emits junit (incl. frontend Vitest) so the aggregate is
    # complete and cannot race an in-flight upload.
    needs: [changes, backend, backend-integration, backend-e2e-tier1, frontend-vitest]
    if: needs.changes.outputs.pr_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download backend shard junit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: backend-shard-*-test-context
          path: junit-artifacts

      - name: Download backend integration junit artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-integration-test-context
          path: junit-artifacts/backend-integration-test-context

      - name: Download backend Tier-1 junit artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-tier1-e2e-test-context
          path: junit-artifacts/backend-tier1-e2e-test-context

      - name: Download frontend Vitest junit artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-vitest-test-context
          path: junit-artifacts/frontend-vitest-test-context

      - name: Aggregate AC behavioral evidence and ratchet against baseline
        run: |
          # Collect every junit-xml emitted by the test stages (shards, integration, tier-1).
          junit_files=$(find junit-artifacts -name '*.xml' -print)
          if [ -z "$junit_files" ]; then
            echo "No junit-xml artifacts found — cannot evaluate AC behavioral evidence." >&2
            exit 1
          fi
          # shellcheck disable=SC2086
          python tools/aggregate_ac_evidence.py $junit_files --output ac-evidence-current.json
          # L2 (pass-required) + L3 (score ratchet) against the checked-in baseline.
          python tools/check_ac_score_baseline.py ac-evidence-current.json
          # ci_tier reconciliation (#1557): every behavioral pr_ci proof must
          # actually appear in this PR's junit evidence — declared execution
          # tier is a contract, not metadata. The proof graph loads the AC
          # registry, which needs PyYAML (this job is bare setup-python).
          python -m pip install --quiet pyyaml
          # shellcheck disable=SC2086
          python tools/check_pr_ci_evidence.py $junit_files

  evidence-bundle:
    name: Generate Evidence Bundle
    needs: [changes, unified-coverage, ac-behavioral-ratchet]
    # #1690: main-branch-only, informational (not a required check — no gate
    # depends on this job, so it cannot block a merge or grow the required-check
    # count). Runs after the two gates whose output it aggregates.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate evidence bundle
        run: |
          # ac_tier_water_line() -> check_ac_tier_baseline -> generate_ac_registry
          # -> ac_registry_format needs PyYAML; this job is bare setup-python
          # (matches the ac-behavioral-ratchet job's same gotcha above).
          python -m pip install --quiet pyyaml
          python tools/generate_evidence_bundle.py \
            --output evidence-bundle.json \
            --github-summary "$GITHUB_STEP_SUMMARY" \
            --gate-results '{"unified-coverage": "${{ needs.unified-coverage.result }}", "ac-behavioral-ratchet": "${{ needs.ac-behavioral-ratchet.result }}"}'

      - uses: actions/upload-artifact@v7
        with:
          name: evidence-bundle
          path: evidence-bundle.json
          retention-days: 90

  finish:
    needs: [changes, schema-migrations, backend, backend-integration, backend-e2e-tier1, frontend-build, frontend-vitest, frontend-playwright, frontend-telemetry-e2e, container-images, verify-sha-image-published, lint, tooling-coverage, unified-coverage, ac-traceability, ac-behavioral-ratchet]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # The finish job's merge authority is the "Check job status" step alone. The
      # three summary steps below are non-gating reporting and all carry
      # continue-on-error so a step-summary write can never fail the merge gate.
      # Orphan enforcement only makes sense when the backend suites actually ran:
      # on lightweight (docs/ci-only) pushes the heavy jobs are skipped, no
      # served-manifest artifacts exist, and every non-truth-paired cassette
      # would read as a false orphan (seen on main 8cdfde41: served=0, orphans=5).
      - name: Download backend test contexts (cassette orphan gate)
        if: ${{ needs.backend.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          pattern: "backend-*test-context"
          path: cassette-usage
      - name: Cassette orphan gate
        if: ${{ needs.backend.result == 'success' }}
        run: |
          # #1596 AC-llm.10.6 / #1597: every committed cassette must be JUSTIFIED —
          # either SERVED by at least one backend test job, or paired with a
          # ground_truth/*.truth.json (the graded-eval corpus consumes those by
          # truth-file iteration in the root tooling lane, which uploads no
          # served-manifest). An unjustified cassette is a changed-prompt leftover
          # (the fingerprint moved; the old frozen response can never be reached
          # again). Fails loudly instead of letting dead fixtures accumulate.
          python3 - <<'PY'
          from pathlib import Path

          cassette_dir = Path("common/testing/fixtures/llm_cassettes")
          committed = {p.stem for p in cassette_dir.glob("*.json")}
          truth_paired = {
              p.name.removesuffix(".truth.json")
              for p in (cassette_dir / "ground_truth").glob("*.truth.json")
          }
          served = set()
          for f in Path("cassette-usage").rglob("served-cassettes*.txt"):
              served |= {line.strip() for line in f.read_text().splitlines() if line.strip()}
          orphans = sorted(committed - served - truth_paired)
          print(
              f"committed={len(committed)} served={len(served & committed)} "
              f"truth_paired={len(truth_paired)} orphans={len(orphans)}"
          )
          if orphans:
              print("ORPHANED cassettes (no backend job served them — changed-prompt leftovers):")
              for o in orphans:
                  print(f"  common/testing/fixtures/llm_cassettes/{o}.json")
              raise SystemExit(1)
          PY

      - name: Write Coverage-Effect Stage Summary
        if: ${{ always() }}
        continue-on-error: true
        run: |
          cat << "EOF" >> "$GITHUB_STEP_SUMMARY"
          ## CI Stage Coverage Effects

          | Stage | Coverage Effect | Behavior Proof |
          |---|---|---|
          | schema-migrations | not included in unified coverage | yes (Alembic DDL/schema drift) |
          | backend (5-way shard) | contributes to unified line coverage baseline | yes |
          | backend-integration | not included in unified coverage | yes (marker 'integration') |
          | backend-e2e-tier1 | not included in unified coverage | yes (marker 'e2e') |
          | frontend-build | not included in unified coverage | yes (typecheck + production build) |
          | frontend-vitest | contributes to unified line coverage baseline | yes |
          | frontend-playwright | not included in unified coverage | yes (provider-free browser UI) |
          | frontend-telemetry-e2e | not included in unified coverage | yes (browser telemetry emission) |
          | tooling-coverage | contributes common/tools to unified line coverage baseline | yes (tooling contracts) |
          EOF

      - name: Write CI timing summary
        if: ${{ always() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python tools/github_workflow_timing_summary.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --title "CI Timing Summary" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Write coverage gate summary
        if: ${{ always() }}
        continue-on-error: true
        run: |
          {
            echo "## Coverage Gate"
            echo ""
            echo "- Authoritative coverage gate: \`Calculate Unified Coverage\` plus \`finish\` — PRs block on diff coverage of changed lines (#1810); main pushes block on the component ratchet."
            echo "- Pull requests do not publish Coveralls status contexts; main pushes upload unified line coverage for badge/trend reporting only."
            echo "- Merge readiness follows \`finish\`; PRs gate on \`tools/check_diff_coverage.py\`, main pushes on the committed \`unified-coverage.json\` baseline."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check job status
        run: |
          echo "Change Classification: ${{ needs.changes.result }}"
          echo "PR Env Required: ${{ needs.changes.outputs.pr_required }}"
          echo "PR Env Reason: ${{ needs.changes.outputs.pr_reason }}"
          echo "Schema Migrations: ${{ needs.schema-migrations.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Frontend Vitest: ${{ needs.frontend-vitest.result }}"
          echo "Frontend Playwright: ${{ needs.frontend-playwright.result }}"
          echo "Frontend Telemetry E2E: ${{ needs.frontend-telemetry-e2e.result }}"
          echo "Staging Images: ${{ needs.container-images.result }}"
          echo "Verify Commit Image Published: ${{ needs.verify-sha-image-published.result }}"
          echo "Tooling/Common Coverage: ${{ needs.tooling-coverage.result }}"
          echo "Unified Coverage: ${{ needs.unified-coverage.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "AC Traceability: ${{ needs.ac-traceability.result }}"
          echo "AC Behavioral Ratchet: ${{ needs.ac-behavioral-ratchet.result }}"
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::Change classification failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [[ "${{ needs.ac-traceability.result }}" != "success" ]]; then
            echo "::error::AC traceability check failed"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.pr_required }}" == "true" ]]; then
            if [[ "${{ needs.schema-migrations.result }}" != "success" ]]; then
              echo "::error::Schema migration contract failed"
              exit 1
            fi
            if [[ "${{ needs.backend.result }}" != "success" ]]; then
              echo "::error::Backend tests failed"
              exit 1
            fi
            if [[ "${{ needs.backend-integration.result }}" != "success" ]]; then
              echo "::error::Backend integration tests failed"
              exit 1
            fi
            if [[ "${{ needs.backend-e2e-tier1.result }}" != "success" ]]; then
              echo "::error::Backend Tier-1 API E2E tests failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-build.result }}" != "success" ]]; then
              echo "::error::Frontend build/typecheck failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-vitest.result }}" != "success" ]]; then
              echo "::error::Frontend Vitest coverage failed"
              exit 1
            fi
            if [[ "${{ needs.frontend-playwright.result }}" != "success" ]]; then
              echo "::error::Frontend Playwright failed"
              exit 1
            fi
            # #1689: frontend-telemetry-e2e is right-moved off PRs that touch no
            # apps/frontend/** path (frontend_changed=false), which is a pass,
            # not a gap — mirrors container-images' skip-is-a-pass clause below.
            if [[ "${{ needs.frontend-telemetry-e2e.result }}" != "success" && "${{ needs.frontend-telemetry-e2e.result }}" != "skipped" ]]; then
              echo "::error::Frontend telemetry E2E failed"
              exit 1
            fi
            if [[ "${{ needs.tooling-coverage.result }}" != "success" ]]; then
              echo "::error::Tooling/common coverage failed"
              exit 1
            fi
            if [[ "${{ needs.unified-coverage.result }}" != "success" ]]; then
              echo "::error::Unified coverage check failed"
              exit 1
            fi
            if [[ "${{ needs.ac-behavioral-ratchet.result }}" != "success" ]]; then
              echo "::error::AC behavioral-score ratchet failed"
              exit 1
            fi
            # container-images is right-moved: it is skipped when the build context
            # did not change (image_build_required=false), which is a pass, not a gap.
            if [[ "${{ needs.container-images.result }}" != "success" && "${{ needs.container-images.result }}" != "skipped" ]]; then
              echo "::error::Container image validation failed"
              exit 1
            fi
            # verify-sha-image-published only runs on main push (see its own if:) —
            # skipped on PRs and non-main pushes, which is a pass, not a gap.
            if [[ "${{ needs.verify-sha-image-published.result }}" != "success" && "${{ needs.verify-sha-image-published.result }}" != "skipped" ]]; then
              echo "::error::Commit image publication verification failed"
              exit 1
            fi
          else
            echo "Heavy backend/frontend/coverage jobs skipped for lightweight changes."
          fi
          echo "✅ All checks passed!"
