# PR Test Environment Workflow
#
# The default PR preview follows the PR's CI workflow: after the matching CI run
# completes successfully, this workflow starts the full stack inside the GitHub
# runner, runs provider-free smoke/E2E, and destroys the stack in the same job.
# It does not build/push PR preview images and does not create a persistent
# Dokploy URL. PR close/merge, failed CI, cancelled CI, and timed-out CI runs
# delete legacy Dokploy preview resources for the PR.

name: PR Test Environment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      action:
        description: 'Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - cleanup

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.pull_requests[0].number || github.event_name == 'pull_request' && github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  TEST_ENV_ID: -fzh5EGJN74I1AjNEpVUr
  INTERNAL_DOMAIN: zitian.party

jobs:
  setup:
    name: Setup Variables
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      compose_name: ${{ steps.info.outputs.compose_name }}
      pr_number: ${{ steps.info.outputs.pr_number }}
      action: ${{ steps.info.outputs.action }}
      action_reason: ${{ steps.info.outputs.action_reason }}
      head_sha: ${{ steps.info.outputs.head_sha }}
      head_branch: ${{ steps.info.outputs.head_branch }}
      triggering_ci_conclusion: ${{ steps.info.outputs.triggering_ci_conclusion }}
      internal_domain: ${{ steps.info.outputs.internal_domain }}
      preview_app_url: ${{ steps.info.outputs.preview_app_url }}
      preview_commit_app_url: ${{ steps.info.outputs.preview_commit_app_url }}
      preview_commit_slug: ${{ steps.info.outputs.preview_commit_slug }}
      pr_preview_required: ${{ steps.preview_gate.outputs.pr_preview_required }}
      pr_preview_reason: ${{ steps.preview_gate.outputs.pr_preview_reason }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine params
        id: info
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          from tools._lib.dev.pr_preview_lifecycle import preview_commit_slug

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = os.environ["GITHUB_EVENT_PATH"]
          github_sha = os.environ.get("GITHUB_SHA", "")
          github_ref_name = os.environ.get("GITHUB_REF_NAME", "")
          repository = os.environ["GITHUB_REPOSITORY"]
          internal_domain = os.environ["INTERNAL_DOMAIN"]

          with open(event_path, encoding="utf-8") as fh:
              event = json.load(fh)

          pr_number = ""
          action = "skip"
          action_reason = "unsupported-event"
          head_sha = github_sha
          head_branch = github_ref_name
          triggering_ci_conclusion = ""

          if event_name == "workflow_dispatch":
              inputs = event.get("inputs") or {}
              pr_number = str(inputs.get("pr_number") or "")
              action = str(inputs.get("action") or "deploy")
              action_reason = "manual-dispatch"
          elif event_name == "pull_request":
              pr = event.get("pull_request") or {}
              pr_number = str(pr.get("number") or "")
              head = pr.get("head") or {}
              head_sha = head.get("sha") or head_sha
              head_branch = head.get("ref") or head_branch
              if event.get("action") == "closed":
                  action = "cleanup"
                  action_reason = "pull-request-closed"
          elif event_name == "workflow_run":
              workflow_run = event.get("workflow_run") or {}
              pull_requests = workflow_run.get("pull_requests") or []
              pr = pull_requests[0] if pull_requests else {}
              pr_number = str(pr.get("number") or "")
              head_sha = workflow_run.get("head_sha") or head_sha
              head_branch = workflow_run.get("head_branch") or head_branch
              triggering_ci_conclusion = workflow_run.get("conclusion") or ""
              triggering_ci_event = workflow_run.get("event") or ""
              head_repository = (workflow_run.get("head_repository") or {}).get(
                  "full_name"
              )

              if not pr_number:
                  action = "skip"
                  action_reason = "workflow-run-without-pr"
              elif triggering_ci_event != "pull_request":
                  action = "skip"
                  action_reason = f"workflow-run-event-{triggering_ci_event}"
              elif head_repository and head_repository != repository:
                  action = "skip"
                  action_reason = "fork-pr-no-preview-secrets"
              elif triggering_ci_conclusion == "success":
                  action = "deploy"
                  action_reason = "successful-pr-ci"
              else:
                  action = "cleanup"
                  action_reason = f"ci-{triggering_ci_conclusion or 'unknown'}"

          compose_name = f"pr-{pr_number}" if pr_number else ""
          commit_slug = preview_commit_slug(head_sha or github_sha)
          preview_app_url = (
              f"https://report-pr-{pr_number}.{internal_domain}" if pr_number else ""
          )
          preview_commit_app_url = (
              f"https://report-pr-{pr_number}-{commit_slug}.{internal_domain}"
              if pr_number
              else ""
          )

          outputs = {
              "internal_domain": internal_domain,
              "pr_number": pr_number,
              "compose_name": compose_name,
              "action": action,
              "action_reason": action_reason,
              "head_sha": head_sha,
              "head_branch": head_branch,
              "triggering_ci_conclusion": triggering_ci_conclusion,
              "preview_commit_slug": commit_slug,
              "preview_app_url": preview_app_url,
              "preview_commit_app_url": preview_commit_app_url,
          }
          for key, value in outputs.items():
              print(f"{key}={value}")
          PY

      - name: Classify PR preview relevance
        id: preview
        env:
          ACTION: ${{ steps.info.outputs.action }}
          PR_NUMBER: ${{ steps.info.outputs.pr_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$ACTION" != "deploy" ]; then
            echo 'env_stage_required={"pr-preview":false}' >> "$GITHUB_OUTPUT"
            echo "env_stage_reasons={\"pr-preview\":\"${ACTION}\"}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'env_stage_required={"pr-preview":true}' >> "$GITHUB_OUTPUT"
            echo 'env_stage_reasons={"pr-preview":"manual-dispatch"}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_state="$(gh pr view "$PR_NUMBER" --json state --jq '.state' 2>/dev/null || echo UNKNOWN)"
          if [ "$pr_state" != "OPEN" ]; then
            echo 'env_stage_required={"pr-preview":false}' >> "$GITHUB_OUTPUT"
            echo "env_stage_reasons={\"pr-preview\":\"pr-not-open-after-ci:${pr_state}\"}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename' > changed-files.txt

          if [ ! -s changed-files.txt ]; then
            echo 'env_stage_required={"pr-preview":false}' >> "$GITHUB_OUTPUT"
            echo 'env_stage_reasons={"pr-preview":"no-pr-files"}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python tools/ci_change_classifier.py \
            --changed-files changed-files.txt \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Normalize PR preview gate
        id: preview_gate
        env:
          ENV_STAGE_REQUIRED: ${{ steps.preview.outputs.env_stage_required }}
          ENV_STAGE_REASONS: ${{ steps.preview.outputs.env_stage_reasons }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          required = json.loads(os.environ["ENV_STAGE_REQUIRED"])
          reasons = json.loads(os.environ["ENV_STAGE_REASONS"])
          print(f"pr_preview_required={str(required['pr-preview']).lower()}")
          print(f"pr_preview_reason={reasons['pr-preview']}")
          PY

  legacy-cleanup:
    name: Remove Legacy Dokploy Preview
    if: needs.setup.outputs.action == 'deploy' && needs.setup.outputs.pr_preview_required == 'true'
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup legacy preview lifecycle
        continue-on-error: true
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action cleanup \
            --pr-number "${{ needs.setup.outputs.pr_number }}" \
            --compose-name "${{ needs.setup.outputs.compose_name }}" \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY"

  e2e:
    name: In-runner Preview E2E
    # Image-free full-stack E2E (issue #839): the merge-relevant validation.
    # Runs only after the matching PR CI workflow_run succeeds; does not push
    # images or deploy to Dokploy. The runner stack is destroyed in this job.
    if: needs.setup.outputs.action == 'deploy' && needs.setup.outputs.pr_preview_required == 'true'
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci-e2e.yml
      # Base compose gates services behind profiles (infra=db/minio, app=back/front);
      # activate both so the full stack (and the edge's depends_on) resolve.
      COMPOSE_PROFILES: infra,app
      # Baked into the images at build time and reported by both services; the
      # smoke version check compares it against the PR head SHA.
      GIT_COMMIT_SHA: ${{ needs.setup.outputs.head_sha }}
      # The stack is reached through the edge origin; allow it for CORS so the
      # smoke CORS check (Origin: http://localhost:8080) passes.
      CORS_ORIGINS: http://localhost:8080,http://localhost:3000
      # Unique per run+attempt so teardown targets exactly this run's resources.
      COMPOSE_PROJECT_NAME: fr-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      APP_URL: http://localhost:8080
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          submodules: recursive

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Generate PDF fixtures for E2E tests
        run: |
          mkdir -p tmp/fixtures
          python tools/generate_pdf_fixtures.py --source dbs --output tmp/fixtures/

      - name: Build and start ephemeral stack
        run: |
          set -euo pipefail
          # backend/frontend attach to the external `dokploy-network` (a
          # Dokploy/Traefik artifact that does not exist in the runner). Create a
          # local stand-in so compose can start; removed again in teardown.
          docker network create dokploy-network 2>/dev/null || true
          docker compose up --build -d --quiet-pull
          docker compose ps

      - name: Wait for stack readiness
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "$APP_URL/api/health" >/dev/null 2>&1; then
              echo "Stack healthy after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::stack did not become healthy within 300s"
          exit 1

      - name: End-to-End Tests
        id: e2e_tests
        env:
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          EXPECTED_SHA: ${{ needs.setup.outputs.head_sha }}
          TIMEOUT_MS: 60000
          E2E_API_TIMEOUT: 30
          STRICT_E2E_GATES: true
        run: |
          set -euo pipefail
          mkdir -p test-results
          echo "--- Phase 1: Smoke Check (Shell) ---"
          bash tools/smoke_test.sh "$APP_URL" staging
          echo "--- Phase 2: Runtime/API/UI Validation (Python, no real AI/OCR) ---"
          PR_PREVIEW_E2E_TESTS=(
            tests/e2e/test_core_journeys.py
            tests/e2e/test_e2e_flows.py::test_full_navigation
          )
          pytest "${PR_PREVIEW_E2E_TESTS[@]}" -v -m "(smoke or e2e) and not llm" -n 4 --junit-xml=test-results/in-runner-e2e.xml

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=400 || true

      # Lifecycle guard: always tear the stack down so containers / volumes /
      # networks never leak, even on E2E failure or build failure. Project name
      # is unique per run; -v removes named volumes, --remove-orphans the rest.
      - name: Tear down ephemeral stack
        if: always()
        run: |
          docker compose down --volumes --remove-orphans --timeout 30 || true
          # Remove the local stand-in network (external networks are not removed
          # by `compose down`); no-op if other containers still reference it.
          docker network rm dokploy-network 2>/dev/null || true

      - name: Write PR preview context
        if: always()
        run: |
          mkdir -p ci-context
          {
            echo "PR Preview Context"
            echo "=================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "pr_number=${{ needs.setup.outputs.pr_number }}"
            echo "compose_name=${{ needs.setup.outputs.compose_name }}"
            echo "head_branch=${{ needs.setup.outputs.head_branch }}"
            echo "head_sha=${{ needs.setup.outputs.head_sha }}"
            echo "triggering_ci_conclusion=${{ needs.setup.outputs.triggering_ci_conclusion }}"
            echo "pr_preview_required=${{ needs.setup.outputs.pr_preview_required }}"
            echo "pr_preview_reason=${{ needs.setup.outputs.pr_preview_reason }}"
            echo "preview_runtime=github-runner-compose"
            echo "persistent_preview_url=none"
            echo "registry_image_push=false"
            echo "dokploy_deploy=false"
            echo "cleanup=compose-down-volumes-remove-orphans"
            echo "app_url=http://localhost:8080"
            echo "api_health_url=http://localhost:8080/api/health"
            echo "expected_sha=${{ needs.setup.outputs.head_sha }}"
            echo "e2e_outcome=${{ steps.e2e_tests.outcome }}"
            echo "strict_e2e_gates=true"
            echo "marker=(smoke or e2e) and not llm"
          } > ci-context/pr-preview-context.txt

      - name: Upload PR preview test context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-test-context
          path: |
            test-results/
            ci-context/
          retention-days: 14

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ needs.setup.outputs.head_branch }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          HEAD_SHA: ${{ needs.setup.outputs.head_sha }}
          E2E_OUTCOME: ${{ steps.e2e_tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- pr-preview-status -->';
            const passed = process.env.E2E_OUTCOME === 'success';
            const title = passed
              ? 'PR Preview Validation Passed'
              : 'PR Preview Validation Failed';
            const result = passed ? 'pass' : (process.env.E2E_OUTCOME || 'skipped');
            const body = `${marker}
            ## ${title}

            | Step | Result |
            |------|--------|
            | In-runner full-stack preview | \`${result}\` |

            This preview runs after the matching PR CI workflow succeeds. It starts the full stack inside the GitHub runner, runs provider-free smoke/E2E, and destroys the stack in the same job.

            No persistent Dokploy URL or PR preview image is created.

            **Details:**
            - Branch: \`${process.env.BRANCH_NAME}\`
            - Head SHA: \`${process.env.HEAD_SHA}\`
            - Logs: [workflow run](${process.env.RUN_URL})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(process.env.PR_NUMBER),
                body,
              });
            }

  cleanup:
    name: Cleanup Test Environment
    if: needs.setup.outputs.action == 'cleanup' && needs.setup.outputs.pr_number != ''
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup preview lifecycle
        id: cleanup
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action cleanup \
            --pr-number "${{ needs.setup.outputs.pr_number }}" \
            --compose-name "${{ needs.setup.outputs.compose_name }}" \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY"

      - name: Write PR preview cleanup context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "PR Preview Cleanup Context"
            echo "=========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "pr_number=${{ needs.setup.outputs.pr_number }}"
            echo "compose_name=${{ needs.setup.outputs.compose_name }}"
            echo "action_reason=${{ needs.setup.outputs.action_reason }}"
            echo "triggering_ci_conclusion=${{ needs.setup.outputs.triggering_ci_conclusion }}"
            echo "cleanup_action=legacy-dokploy-preview-cleanup"
            echo "pr_preview_images=not-created"
          } > ci-context/pr-preview-cleanup-context.txt

      - name: Upload PR preview cleanup context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-cleanup-context
          path: ci-context/pr-preview-cleanup-context.txt
          retention-days: 14

      - name: Comment cleanup notice
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          ACTION_REASON: ${{ needs.setup.outputs.action_reason }}
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
        with:
          script: |
            const body = `## PR Preview Resources Released

            Temporary resources for this PR have been released or reconciled:

            - Legacy Dokploy stack: \`${{ needs.setup.outputs.compose_name }}\` (${process.env.CLEANUP_OUTCOME || 'skipped'})
            - PR preview images: not created by the current preview workflow
            - Trigger: \`${process.env.ACTION_REASON}\`
            - Host Docker leftovers: managed by the Dokploy host hygiene schedule

            Cleanup is idempotent; an already-missing stack is treated as released.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
