# PR Test Environment Workflow - Triggered by PR events
#
# Each PR gets an isolated environment with its own DB/MinIO.
# Uses docker-compose.yml from this repo (not infra2).

name: PR Test Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      action:
        description: 'Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - cleanup

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  TEST_ENV_ID: -fzh5EGJN74I1AjNEpVUr
  GITHUB_INTEGRATION_ID: 126refcRlCoWj6pmPXElU
  INTERNAL_DOMAIN: zitian.party

jobs:
  setup:
    name: Setup Variables
    runs-on: ubuntu-latest
    outputs:
      compose_name: ${{ steps.info.outputs.compose_name }}
      pr_number: ${{ steps.info.outputs.pr_number }}
      action: ${{ steps.info.outputs.action }}
      internal_domain: ${{ steps.info.outputs.internal_domain }}
      pr_preview_required: ${{ steps.preview.outputs.pr_preview_required }}
      pr_preview_reason: ${{ steps.preview.outputs.pr_preview_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Params
        id: info
        run: |
          {
            echo "internal_domain=${{ env.INTERNAL_DOMAIN }}"
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "Manual trigger for PR ${{ github.event.inputs.pr_number }} (${{ github.event.inputs.action }})" >&2
              echo "pr_number=${{ github.event.inputs.pr_number }}"
              echo "compose_name=pr-${{ github.event.inputs.pr_number }}"
              echo "action=${{ github.event.inputs.action }}"
            else
              echo "PR info: ${{ github.event.pull_request.number }} (${{ github.event.action }})" >&2
              echo "pr_number=${{ github.event.pull_request.number }}"
              echo "compose_name=pr-${{ github.event.pull_request.number }}"

              if [ "${{ github.event.action }}" == "closed" ]; then
                echo "action=cleanup"
              else
                echo "action=deploy"
              fi
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Classify PR preview relevance
        id: preview
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_preview_required=true" >> "$GITHUB_OUTPUT"
            echo "pr_preview_reason=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.action }}" = "closed" ]; then
            echo "pr_preview_required=false" >> "$GITHUB_OUTPUT"
            echo "pr_preview_reason=cleanup-only" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${BASE_SHA:-}"
          head_sha="${HEAD_SHA:-}"
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || git rev-parse HEAD^)"
          fi

          if ! git diff --name-only "$base_sha" "$head_sha" > changed-files.txt; then
            git diff --name-only HEAD^ HEAD > changed-files.txt
          fi

          python tools/ci_change_classifier.py \
            --changed-files changed-files.txt \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy Test Environment
    if: needs.setup.outputs.action == 'deploy' && needs.setup.outputs.pr_preview_required == 'true'
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy preview lifecycle
        id: deploy
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action deploy \
            --pr-number "${{ needs.setup.outputs.pr_number }}" \
            --compose-name "${{ needs.setup.outputs.compose_name }}" \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY" \
            --github-integration-id "${{ env.GITHUB_INTEGRATION_ID }}" \
            --branch "$BRANCH_NAME" \
            --commit-sha "${{ github.sha }}" \
            --registry "${{ env.REGISTRY }}" \
            --image-prefix "${{ env.IMAGE_PREFIX }}" \
            --internal-domain "${{ needs.setup.outputs.internal_domain }}"

      - name: Wait for API readiness
        env:
          APP_URL: https://report-pr-${{ needs.setup.outputs.pr_number }}.${{ needs.setup.outputs.internal_domain }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python3 - << 'EOF'
          import json
          import urllib.request
          import ssl
          import time
          import os
          import sys

          url = os.environ["APP_URL"] + "/api/health"
          expected_sha = os.environ["EXPECTED_SHA"]
          print(f"Waiting for API readiness at {url}")
          print(f"Expecting deployed git_sha={expected_sha}")

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          max_attempts = 30
          for attempt in range(1, max_attempts + 1):
              delay = min(5 + (attempt // 5) * 5, 30)
              try:
                  with urllib.request.urlopen(url, timeout=15, context=ctx) as response:
                      if 200 <= response.getcode() < 400:
                          payload = json.loads(response.read().decode("utf-8"))
                          actual_sha = payload.get("git_sha") or payload.get("version")
                          if actual_sha == expected_sha:
                              print(f"✅ API ready with expected git_sha {actual_sha}")
                              sys.exit(0)
                          print(
                              f"⚠️ Attempt {attempt}/{max_attempts}: "
                              f"status {response.getcode()}, git_sha={actual_sha}, "
                              f"expected={expected_sha}"
                          )
                          print("   Existing deployment is still serving; waiting for rollout...")
                      else:
                          print(f"⚠️ Attempt {attempt}/{max_attempts}: status {response.getcode()}")
              except Exception as e:
                  print(f"❌ Attempt {attempt}/{max_attempts}: {type(e).__name__}: {e}")

              print(f"   Retrying in {delay}s...")
              time.sleep(delay)

          print("::error::API not ready with expected git_sha after all attempts")
          sys.exit(1)
          EOF

      - name: Setup E2E Tests
        uses: ./.github/actions/setup-e2e-tests

      - name: Generate PDF fixtures for E2E tests
        run: |
          mkdir -p tmp/fixtures
          python tools/generate_pdf_fixtures.py --source dbs --output tmp/fixtures/

      - name: End-to-End Tests
        id: e2e_tests
        env:
          APP_URL: https://report-pr-${{ needs.setup.outputs.pr_number }}.${{ needs.setup.outputs.internal_domain }}
          TEST_ENV: staging
          SKIP_UI_TESTS: false
          EXPECTED_SHA: ${{ github.sha }}
          TIMEOUT_MS: 60000
          E2E_API_TIMEOUT: 30
          STRICT_E2E_GATES: true
          RUN_MARKET_DATA_PROVIDER_E2E: true
          MARKET_DATA_E2E_DATE: "2024-06-03"
        run: |
          echo "🚀 Starting E2E Pipeline for $APP_URL"
          mkdir -p test-results

          echo "--- Phase 1: Smoke Check (Shell) ---"
          bash tools/smoke_test.sh "$APP_URL" staging

          echo "--- Phase 2: Core Flow Validation (Python, no real AI/OCR) ---"
          pytest tests/e2e -v -m "(smoke or e2e) and not llm" -n 4 --junit-xml=test-results/pr-preview-e2e.xml

          echo "✅ E2E Pipeline passed!"

      - name: Rollback on E2E Failure
        if: failure() && steps.e2e_tests.outcome == 'failure'
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          echo "::warning::E2E tests failed. Stopping compose to prevent broken deployment..."

          python tools/pr_preview_lifecycle.py \
            --action delete \
            --pr-number "${{ needs.setup.outputs.pr_number }}" \
            --compose-name "${{ needs.setup.outputs.compose_name }}" \
            --compose-id "${{ steps.deploy.outputs.compose_id }}" \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY"

          echo "Check logs for E2E failure details."

      - name: Write PR preview context
        if: ${{ always() }}
        env:
          APP_URL: https://report-pr-${{ needs.setup.outputs.pr_number }}.${{ needs.setup.outputs.internal_domain }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          mkdir -p ci-context
          {
            echo "PR Preview Context"
            echo "=================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "pr_number=${{ needs.setup.outputs.pr_number }}"
            echo "compose_name=${{ needs.setup.outputs.compose_name }}"
            echo "compose_id=${{ steps.deploy.outputs.compose_id }}"
            echo "branch=${BRANCH_NAME}"
            echo "app_url=${APP_URL}"
            echo "deploy_outcome=${{ steps.deploy.outcome }}"
            echo "e2e_outcome=${{ steps.e2e_tests.outcome }}"
            echo "strict_e2e_gates=true"
            echo "marker=(smoke or e2e) and not llm"
          } > ci-context/pr-preview-context.txt

      - name: Upload PR preview test context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-test-context
          path: |
            test-results/
            ci-context/pr-preview-context.txt
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          INTERNAL_DOMAIN: ${{ needs.setup.outputs.internal_domain }}
          COMPOSE_NAME: ${{ needs.setup.outputs.compose_name }}
        with:
          script: |
            const url = `https://report-pr-${process.env.PR_NUMBER}.${process.env.INTERNAL_DOMAIN}`;
            const body = `## 🧪 Test Environment Deployed

            | Service | URL |
            |---------|-----|
            | Frontend | [${url}](${url}) |
            | API Health | [${url}/api/health](${url}/api/health) |

            **Details:**
            - Compose: \`${process.env.COMPOSE_NAME}\`
            - Branch: \`${process.env.BRANCH_NAME}\`
            - Commit: \`${{ github.sha }}\`

            > ⏳ First deployment may take 3-5 minutes for build + SSL certificate.

            _This environment will be automatically cleaned up when the PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Environment Deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(process.env.PR_NUMBER),
                body,
              });
            }

  cleanup:
    name: Cleanup Test Environment
    if: needs.setup.outputs.action == 'cleanup'
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup preview lifecycle
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action cleanup \
            --pr-number "${{ needs.setup.outputs.pr_number }}" \
            --compose-name "${{ needs.setup.outputs.compose_name }}" \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY"

      - name: Delete GHCR images
        continue-on-error: true
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗑️  Deleting PR images from GitHub Container Registry..."

          for service in backend frontend; do
            IMAGE_NAME="finance_report-${service}"
            TAG="pr-${PR_NUMBER}"

            echo "Searching for ${IMAGE_NAME}:${TAG}..."

            # Get package version ID for this tag
            VERSION_ID=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/${IMAGE_NAME}/versions" \
              --jq ".[] | select(.metadata.container.tags[] | contains(\"${TAG}\")) | .id" \
              2>/dev/null || echo "")

            if [ -z "$VERSION_ID" ]; then
              echo "  Image ${IMAGE_NAME}:${TAG} not found (may be already deleted)"
              continue
            fi

            echo "  Found version ID: $VERSION_ID"
            echo "  Deleting..."

            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/${IMAGE_NAME}/versions/${VERSION_ID}" \
              2>&1 || {
                echo "::warning::Failed to delete ${IMAGE_NAME}:${TAG} (may require org admin permissions)"
              }

            echo "  ✅ Deleted ${IMAGE_NAME}:${TAG}"
          done

          echo "GHCR cleanup complete"

      - name: Write PR preview cleanup context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "PR Preview Cleanup Context"
            echo "=========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "pr_number=${{ needs.setup.outputs.pr_number }}"
            echo "compose_name=${{ needs.setup.outputs.compose_name }}"
            echo "cleanup_action=closed-pr-cleanup"
          } > ci-context/pr-preview-cleanup-context.txt

      - name: Upload PR preview cleanup context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-cleanup-context
          path: ci-context/pr-preview-cleanup-context.txt
          retention-days: 14

      - name: Comment cleanup notice
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
        with:
          script: |
            const body = `## 🧹 PR Resources Released

            All temporary resources for this PR have been released:

            - **Dokploy Stack**: \`${{ needs.setup.outputs.compose_name }}\` ✓ deleted
            - **GHCR Images**: Deleted (backend:pr-${{ needs.setup.outputs.pr_number }}, frontend:pr-${{ needs.setup.outputs.pr_number }})
            - **Host Docker leftovers**: Managed by the Dokploy host hygiene schedule

            _Cleanup completed successfully._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
