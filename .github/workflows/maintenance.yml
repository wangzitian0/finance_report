name: Maintenance

on:
  schedule:
    - cron: "17 3 * * *"
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Maintenance task to run"
        required: true
        default: ghcr-sha-retention
        type: choice
        options:
          - ghcr-sha-retention
          - pr-preview-cleanup
          - all
      ghcr_dry_run:
        description: "Show GHCR SHA image pruning decisions without deleting package versions"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      preview_cleanup_dry_run:
        description: "Show PR preview cleanup actions without deleting resources"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.event_name == 'schedule' && github.event.schedule == '37 */6 * * *' && 'pr-preview-cleanup' || github.event_name == 'workflow_dispatch' && inputs.task == 'pr-preview-cleanup' && 'pr-preview-cleanup' || 'ghcr-sha-retention' }}
  cancel-in-progress: false

env:
  GHCR_SHA_RETENTION_DAYS: "28"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/finance_report
  STAGING_HEALTH_URL: https://report-staging.zitian.party/api/health
  PRODUCTION_HEALTH_URL: https://report.zitian.party/api/health
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  TEST_ENV_ID: -fzh5EGJN74I1AjNEpVUr

permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  prune-sha-images:
    name: Prune stale GHCR SHA images
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '17 3 * * *') || (github.event_name == 'workflow_dispatch' && (inputs.task == 'ghcr-sha-retention' || inputs.task == 'all')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve GHCR package scope
        id: package_scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner_type="$(gh api -H "Accept: application/vnd.github+json" "/users/${{ github.repository_owner }}" --jq '.type')"
          if [[ "$owner_type" == "Organization" ]]; then
            package_scope_path="/orgs/${{ github.repository_owner }}"
          else
            package_scope_path="/users/${{ github.repository_owner }}"
          fi
          echo "package_scope_path=${package_scope_path}" >> "$GITHUB_OUTPUT"

      - name: Collect live deploy SHA exemptions
        env:
          HEALTH_URLS: ${{ env.STAGING_HEALTH_URL }} ${{ env.PRODUCTION_HEALTH_URL }}
        run: |
          set -euo pipefail
          : > live-shas.txt

          for url in $HEALTH_URLS; do
            payload="$(
              curl -fsS \
                --connect-timeout 5 \
                --max-time 20 \
                --retry 2 \
                --retry-delay 2 \
                "$url"
            )"
            candidate="$(
              python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("git_sha") or data.get("version") or "")' \
              <<< "$payload"
            )"
            if [[ -z "$candidate" ]]; then
              echo "::error::Health endpoint $url did not expose git_sha or version"
              exit 1
            fi

            if [[ "$candidate" =~ ^[0-9a-f]{7,40}$ ]]; then
              echo "$candidate" >> live-shas.txt
              echo "${candidate:0:7}" >> live-shas.txt
              continue
            fi

            if git rev-parse --verify --quiet "$candidate^{commit}" >/dev/null; then
              full_sha="$(git rev-parse "$candidate^{commit}")"
              echo "$full_sha" >> live-shas.txt
              echo "${full_sha:0:7}" >> live-shas.txt
              continue
            fi

            echo "::error::Could not resolve live deploy ref '$candidate' from $url to a commit SHA"
            exit 1
          done

          sort -u live-shas.txt -o live-shas.txt
          if [[ ! -s live-shas.txt ]]; then
            echo "::error::No live deploy SHA exemptions discovered; refusing to prune GHCR SHA tags"
            exit 1
          fi

      - name: Prune GHCR SHA images older than 28 days
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN_FLAG: ${{ github.event_name == 'workflow_dispatch' && inputs.ghcr_dry_run == 'true' && '--dry-run' || '' }}
        run: |
          set -euo pipefail
          mkdir -p ci-context
          python tools/ghcr_retention.py \
            --package-scope-path "${{ steps.package_scope.outputs.package_scope_path }}" \
            --image-name finance_report-backend \
            --image-name finance_report-frontend \
            --retention-days "${GHCR_SHA_RETENTION_DAYS}" \
            --live-shas-file live-shas.txt \
            ${DRY_RUN_FLAG:+"$DRY_RUN_FLAG"} \
            | tee ci-context/ghcr-sha-retention-context.txt

      - name: Write GHCR retention context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "GHCR SHA Retention Context"
            echo "=========================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "sha=${{ github.sha }}"
            echo "retention_days=${GHCR_SHA_RETENTION_DAYS}"
            echo "dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.ghcr_dry_run == 'true' }}"
            echo "live_sha_exemptions=$(tr '\n' ',' < live-shas.txt 2>/dev/null || true)"
            echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:<sha>"
            echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:<sha>"
          } >> ci-context/ghcr-sha-retention-context.txt

      - name: Upload GHCR retention context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ghcr-sha-retention-context
          path: ci-context/
          retention-days: 14

  # PR preview GHCR image hygiene. Dokploy preview RECLAIM (stale/closed-PR
  # composes) is NOT done here — it is owned by infra2: event-driven teardown on
  # PR close (infra2 preview-teardown.yml) + the hourly preview-leak-check
  # detection fallback. This job only prunes stale PR-preview GHCR image tags
  # (the app's own images).
  cleanup:
    name: Prune stale PR preview GHCR tags
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '37 */6 * * *') || (github.event_name == 'workflow_dispatch' && (inputs.task == 'pr-preview-cleanup' || inputs.task == 'all')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prune stale PR preview GHCR tags
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.preview_cleanup_dry_run == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p ci-context
          retention_days=14
          open_prs_file="$(mktemp)"
          gh pr list --state open --limit 1000 --json number --jq '.[].number' > "$open_prs_file"
          owner_type="$(gh api -H "Accept: application/vnd.github+json" "/users/${{ github.repository_owner }}" --jq '.type')"
          if [[ "$owner_type" == "Organization" ]]; then
            package_scope_path="/orgs/${{ github.repository_owner }}"
          else
            package_scope_path="/users/${{ github.repository_owner }}"
          fi

          {
            echo "GHCR PR Preview Cleanup"
            echo "======================="
            echo "retention_days=${retention_days}"
            echo "dry_run=${DRY_RUN}"
            echo "package_scope=${package_scope_path}"
            echo "open_pr_count=$(wc -l < "$open_prs_file" | tr -d ' ')"
          } > ci-context/pr-preview-ghcr-cleanup-context.txt

          for service in backend frontend; do
            image_name="finance_report-${service}"
            versions_file="$(mktemp)"
            if ! gh api \
              -H "Accept: application/vnd.github+json" \
              "${package_scope_path}/packages/container/${image_name}/versions" \
              --paginate \
              --slurp > "$versions_file"; then
              echo "${image_name}: list-failed package_scope=${package_scope_path}" | tee -a ci-context/pr-preview-ghcr-cleanup-context.txt
              continue
            fi

            python3 - "$versions_file" "$open_prs_file" "$retention_days" "$DRY_RUN" "$image_name" "$package_scope_path" <<'PY' | tee -a ci-context/pr-preview-ghcr-cleanup-context.txt
          import datetime as dt
          import json
          import re
          import subprocess
          import sys

          versions_path, open_prs_path, retention_days, dry_run, image_name, package_scope_path = sys.argv[1:7]
          open_prs = {
              int(line.strip())
              for line in open(open_prs_path, encoding="utf-8")
              if line.strip()
          }
          raw = open(versions_path, encoding="utf-8").read().strip()
          if not raw:
              versions = []
          else:
              try:
                  parsed = json.loads(raw)
                  if isinstance(parsed, list) and all(isinstance(page, list) for page in parsed):
                      versions = [version for page in parsed for version in page]
                  else:
                      versions = parsed if isinstance(parsed, list) else []
              except json.JSONDecodeError:
                  versions = []
          cutoff = dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=int(retention_days))
          tag_re = re.compile(r"^pr-([1-9][0-9]*)-[0-9a-f]{40}$")
          deleted = 0
          failed = 0
          kept = 0
          skipped = 0
          for version in versions:
              version_id = version.get("id")
              created_at = version.get("created_at") or ""
              tags = ((version.get("metadata") or {}).get("container") or {}).get("tags") or []
              pr_tags = [tag for tag in tags if tag_re.match(tag)]
              if not version_id or not pr_tags:
                  continue
              try:
                  created = dt.datetime.fromisoformat(created_at.replace("Z", "+00:00"))
              except ValueError:
                  skipped += 1
                  print(f"{image_name}: skip version={version_id} reason=invalid-created-at tags={','.join(pr_tags)}")
                  continue
              pr_numbers = {int(tag_re.match(tag).group(1)) for tag in pr_tags}
              if pr_numbers & open_prs:
                  kept += 1
                  print(f"{image_name}: keep version={version_id} reason=open-pr tags={','.join(pr_tags)}")
                  continue
              if created >= cutoff:
                  kept += 1
                  print(f"{image_name}: keep version={version_id} reason=retention-window tags={','.join(pr_tags)}")
                  continue
              if dry_run == "true":
                  print(f"{image_name}: dry-run delete version={version_id} tags={','.join(pr_tags)}")
                  deleted += 1
              else:
                  result = subprocess.run(
                      [
                          "gh",
                          "api",
                          "--method",
                          "DELETE",
                          "-H",
                          "Accept: application/vnd.github+json",
                          f"{package_scope_path}/packages/container/{image_name}/versions/{version_id}",
                      ],
                      check=False,
                  )
                  if result.returncode == 0:
                      deleted += 1
                      print(f"{image_name}: deleted version={version_id} tags={','.join(pr_tags)}")
                  else:
                      failed += 1
                      print(f"{image_name}: delete-failed version={version_id} tags={','.join(pr_tags)}")
          print(f"{image_name}: stale_pr_preview_versions_selected={deleted}")
          print(f"{image_name}: pr_preview_versions_delete_failed={failed}")
          print(f"{image_name}: pr_preview_versions_kept={kept}")
          print(f"{image_name}: pr_preview_versions_skipped={skipped}")
          PY
          done

      - name: Write scheduled preview cleanup context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Scheduled PR Preview Cleanup Context"
            echo "===================================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "environment_id=${{ env.TEST_ENV_ID }}"
            echo "dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.preview_cleanup_dry_run == 'true' }}"
            echo "cleanup_action=ghcr-pr-tag-prune-only"
            echo "ghcr_cleanup=closed-pr-pr-tags-older-than-14-days"
            echo "host_hygiene=infra2-owned"
          } > ci-context/pr-preview-scheduled-cleanup-context.txt

      - name: Upload scheduled preview cleanup context
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pr-preview-scheduled-cleanup-context
          path: ci-context/
          retention-days: 14
