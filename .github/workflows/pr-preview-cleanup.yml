name: PR Preview Cleanup

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show cleanup actions without deleting resources"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: pr-preview-cleanup
  cancel-in-progress: false

env:
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  TEST_ENV_ID: -fzh5EGJN74I1AjNEpVUr

permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    name: Cleanup stale PR previews
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        id: ssh
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: cloud.zitian.party
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY is required for stale preview cleanup."
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Remove stale preview resources
        env:
          GH_TOKEN: ${{ github.token }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action reconcile \
            --pr-number 0 \
            --compose-name reconcile \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY" \
            --host cloud.zitian.party \
            --ssh-key ~/.ssh/vps_key \
            ${DRY_RUN:+"$DRY_RUN"}
