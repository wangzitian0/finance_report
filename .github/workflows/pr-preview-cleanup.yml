name: PR Preview Cleanup

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show cleanup actions without deleting resources"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: pr-preview-cleanup
  cancel-in-progress: false

env:
  DOKPLOY_API_URL: https://cloud.zitian.party/api
  TEST_ENV_ID: -fzh5EGJN74I1AjNEpVUr

permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    name: Cleanup stale PR previews
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove stale preview resources
        env:
          GH_TOKEN: ${{ github.token }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          python tools/pr_preview_lifecycle.py \
            --action reconcile \
            --pr-number 0 \
            --compose-name reconcile \
            --environment-id="${{ env.TEST_ENV_ID }}" \
            --api-url "${{ env.DOKPLOY_API_URL }}" \
            --api-key "$DOKPLOY_API_KEY" \
            ${DRY_RUN:+"$DRY_RUN"}

      - name: Write scheduled preview cleanup context
        if: ${{ always() }}
        run: |
          mkdir -p ci-context
          {
            echo "Scheduled PR Preview Cleanup Context"
            echo "===================================="
            echo "repository=${{ github.repository }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "environment_id=${{ env.TEST_ENV_ID }}"
            echo "dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}"
            echo "cleanup_action=reconcile"
          } > ci-context/pr-preview-scheduled-cleanup-context.txt

      - name: Upload scheduled preview cleanup context
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-scheduled-cleanup-context
          path: ci-context/pr-preview-scheduled-cleanup-context.txt
          retention-days: 14
