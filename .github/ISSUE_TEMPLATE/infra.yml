---
name: "Infrastructure / Tooling"
description: "Infrastructure, CI/CD, tooling, or meta-testing changes."
title: "[INFRA] Short description"
labels: ["infrastructure", "surface: infra", "surface: tooling"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you begin
        Infrastructure ACs live in the owning EPIC and materialize through `docs/infra_registry.yaml` (not `ac_registry.yaml`).
        See [AGENTS.md](../../AGENTS.md) and [docs/ssot/tdd.md](../../docs/ssot/tdd.md).

  - type: dropdown
    id: epic
    attributes:
      label: "Anchor EPIC"
      options:
        - "EPIC-001 — Phase 0 Infrastructure Setup"
        - "EPIC-007 — Deployment"
        - "EPIC-008 — Testing Strategy"
        - "EPIC-010 — SigNoz Logging"
        - "EPIC-014 — TDD Transformation"
        - "New EPIC (describe below)"
    validations:
      required: true

  - type: input
    id: ac_ids
    attributes:
      label: "Infra AC IDs"
      description: "Format: ACx.y.z — define active infra ACs in the owning EPIC before writing code."
      placeholder: "e.g. AC8.3.1, AC8.3.2"
    validations:
      required: true

  - type: checkboxes
    id: ssot_files
    attributes:
      label: "SSOT files to update"
      options:
        - label: "docs/ssot/development.md"
        - label: "docs/ssot/environments.md"
        - label: "docs/ssot/ci-cd.md"
        - label: "docs/ssot/deployment.md"
        - label: "docs/ssot/MANIFEST.yaml"
        - label: "docs/ssot/coverage.md"
        - label: "docs/ssot/tdd.md"
        - label: "docs/ssot/observability.md"
        - label: "docs/contributing/branch-policy.md"
        - label: "docs/agents/red-lines.md"
        - label: "docs/agents/orchestration.md"
        - label: "No SSOT update needed"

  - type: textarea
    id: phenomenon_description
    attributes:
      label: "Phenomenon Description"
      description: "What infrastructure/tooling behavior is wrong or unclear, and what evidence shows the gap?"
      placeholder: |
        Observed:
        Expected:
        Evidence:
    validations:
      required: true

  - type: textarea
    id: how_to_reproduce
    attributes:
      label: "How to Reproduce"
      description: "Provide deterministic commands, workflow runs, logs, or file paths that reproduce the issue."
      placeholder: |
        1. Run ...
        2. Inspect ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: minimal_fix_recommendation
    attributes:
      label: "Minimal Fix Recommendation"
      description: "Describe the smallest infrastructure/tooling change that should resolve the issue."
      placeholder: |
        Minimal path:
        Out of scope:
    validations:
      required: true

  - type: textarea
    id: why_this_fix_works
    attributes:
      label: "Why This Fix Works"
      description: "Explain why this change fixes the failure mode without broad workflow or topology churn."
      placeholder: "This works because ..."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "List concrete pass/fail checks. Include infra AC IDs when known."
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission checklist"
      options:
        - label: "AC IDs are defined in the owning EPIC and materialize through docs/infra_registry.yaml"
          required: true
        - label: "SSOT files to update are identified"
          required: true
