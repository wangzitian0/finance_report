site_name: Finance Report
site_description: Personal financial management system with double-entry bookkeeping
site_url: https://wangzitian0.github.io/finance_report/
repo_url: https://github.com/wangzitian0/finance_report
repo_name: wangzitian0/finance_report

# Build output directory (default: site/)
# Run 'mkdocs build' to generate static site
# Run 'mkdocs serve' for live reload during development
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  language: en

plugins:
  - search
  - tags

hooks:
  - docs/hooks.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Project Vision: target.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Account Management: user-guide/accounts.md
      - Journal Entries: user-guide/journal-entries.md
      - Bank Reconciliation: user-guide/reconciliation.md
      - Reports & Dashboards: user-guide/reports.md
      - AI Advisor: user-guide/ai-advisor.md
  - Generated References:
      - Overview: reference/api-overview.md
      - Generated API Reference: reference/api.md
      - Generated DB Schema Reference: reference/db-schema.md
      - Router Contract Maturity: reference/router-contract-maturity.md
  - Technical Docs:
      # #1822 (SSOT dissolution, Package-ization 3/4) moved every prose/gate-data
      # doc formerly nav'd here out of docs/ssot/ into its owning package
      # (common/<pkg>/, outside MkDocs' docs_dir) — see
      # common/meta/data/MANIFEST.yaml for the current owner of each concept.
      # docs/ssot/ itself (including its README.md tombstone) was retired
      # entirely in #1823 (Package-ization 4/4, terminal); no page replaces
      # it here since the content is package-scattered, not mkdocs-rendered.
      - Product Analytics Events: reference/analytics-events.md
  - Governance:
      - Agent Orchestration: agents/orchestration.md
      - Red Lines: agents/red-lines.md
      - App/Infra Contract Boundary: agents/app-infra-contract-boundary.md
      - Branch Policy: contributing/branch-policy.md
      - Staging Test-Account Cleanup: contributing/staging-test-account-cleanup.md
  - Development:
      - Project Overview: project/README.md
      - Design Decisions: project/DECISIONS.md
      - Audits: project/AUDITS.md
      - AC Audit 2026-05-04: project/AC-AUDIT-2026-05-04.md
      - Delivery Engine Recommendations: project/DELIVERY_ENGINE_RECOMMENDATIONS.md
      - Traceability Exceptions: project/traceability-exceptions.md
      - EPICs:
          - "EPIC-001: Setup": project/EPIC-001.phase0-setup.md
          - "EPIC-002: Double-Entry": project/EPIC-002.double-entry-core.md
          - "EPIC-003: Statement Parsing": project/EPIC-003.statement-parsing.md
          - "EPIC-004: Reconciliation": project/EPIC-004.reconciliation-engine.md
          - "EPIC-005: Reporting": project/EPIC-005.reporting-visualization.md
          - "EPIC-006: AI Advisor": project/EPIC-006.ai-advisor.md
          - "EPIC-007: Deployment": project/EPIC-007.deployment.md
          - "EPIC-008: Comprehensive Testing Strategy (Smoke & E2E)": project/EPIC-008.testing-strategy.md
          - "EPIC-010: Observability Logging (vendor-neutral OTEL)": project/EPIC-010.observability-logging.md
          - "EPIC-011: Asset Lifecycle Management": project/EPIC-011.asset-lifecycle.md
          - "EPIC-012: Foundation Libraries Enhancement": project/EPIC-012.foundation-libs.md
          - "EPIC-013: Statement Parsing V2": project/EPIC-013.statement-parsing-v2.md
          - "EPIC-014: Test-Driven Documentation (TTD) Transformation": project/EPIC-014.ttd-transformation.md
          - "EPIC-015: Processing Account Integration": project/EPIC-015.processing-account.md
          - "EPIC-016: Two-Stage Review & Data Validation UI": project/EPIC-016.two-stage-review-ui.md
          - "EPIC-017: Investment Portfolio Management (100% Self-Developed)": project/EPIC-017.portfolio-management.md
          - "EPIC-018: AI-Driven Data Pipeline": project/EPIC-018.ai-driven-pipeline.md
          - "EPIC-019: Event-Driven Upload to Report UX": project/EPIC-019.event-driven-upload-to-report-ux.md
          - "EPIC-020: Framework-Aware Personal Reporting": project/EPIC-020.framework-aware-personal-reporting.md
          - "EPIC-021: Application-Layer AI Advisor": project/EPIC-021.application-ai-advisor.md
          - "EPIC-022: Everyday-User IA": project/EPIC-022.everyday-user-ia.md
          - "EPIC-022: PWA Bottom-Tab IA (design)": project/EPIC-022.pwa-bottom-tab-ia.design.md
          - "EPIC-023: LLM Provider Abstraction": project/EPIC-023.llm-provider-abstraction.md
          - "EPIC-024: Frontend Browser Observability": project/EPIC-024.frontend-observability.md
          - "EPIC-025: DRY/SSOT Simplification": project/EPIC-025.dry-ssot-simplification.md
