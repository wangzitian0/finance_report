site_name: Finance Report
site_description: Personal financial management system with double-entry bookkeeping
site_url: https://wangzitian0.github.io/finance_report/
repo_url: https://github.com/wangzitian0/finance_report
repo_name: wangzitian0/finance_report

# Build output directory (default: site/)
# Run 'mkdocs build' to generate static site
# Run 'mkdocs serve' for live reload during development
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  language: en

plugins:
  - search
  - tags

hooks:
  - docs/hooks.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Project Vision: target.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Account Management: user-guide/accounts.md
      - Journal Entries: user-guide/journal-entries.md
      - Bank Reconciliation: user-guide/reconciliation.md
      - Reports & Dashboards: user-guide/reports.md
      - AI Advisor: user-guide/ai-advisor.md
  - Generated References:
      - Overview: reference/api-overview.md
      - Generated API Reference: reference/api.md
      - Generated DB Schema Reference: reference/db-schema.md
  - Technical Docs:
      - Architecture: ssot/README.md
      - Development Guide: ssot/development.md
      - Environments: ssot/environments.md
      - CI/CD: ssot/ci-cd.md
      - Coverage: ssot/coverage.md
      - Deployment: ssot/deployment.md
      - Runtime Incident Response: ssot/runtime-incident-response.md
      - TDD Workflow: ssot/tdd.md
      - Accounting Model: ssot/accounting.md
      - Auth: ssot/auth.md
