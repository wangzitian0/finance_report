# SSOT Concept Manifest
#
# Machine-readable single-owner-per-concept registry.
# Each concept has exactly ONE authoritative owner file (with optional
# section anchor) and zero-or-more cross-reference files that also
# discuss the concept without owning it.
#
# Validated by: tools/check_manifest.py  (runs in CI)
#
# Format:
#   concepts:
#     <concept_key>:
#       owner: <relative-path>[#anchor]   # MUST exist on disk (file part)
#       description: <one-liner>
#       cross_refs:                       # Optional; every path MUST exist
#         - <relative-path>
#
# Rules enforced by check_manifest.py:
#   1. No two concepts may share the same owner.
#   2. Every owner file path (ignoring #anchor) must exist on disk.
#   3. Every cross_ref file path (ignoring #anchor) must exist on disk.

