# SSOT Concept Manifest
#
# Machine-readable single-owner-per-concept registry.
# Each concept has exactly ONE authoritative owner file (with optional
# section anchor) and zero-or-more cross-reference files that also
# discuss the concept without owning it.
#
# Validated by: tools/check_manifest.py  (runs in CI)
#
# Format:
#   concepts:
#     <concept_key>:
#       owner: <relative-path>[#anchor]   # MUST exist on disk (file part)
#       description: <one-liner>
#       cross_refs:                       # Optional; every path MUST exist
#         - <relative-path>
#
# Rules enforced by check_manifest.py:
#   1. No two concepts may share the same owner.
#   2. Every owner file path (ignoring #anchor) must exist on disk.
#   3. Every cross_ref file path (ignoring #anchor) must exist on disk.

concepts:

  # ── Accounting domain ──────────────────────────────────────────────────
  decimal_monetary_rule:
    owner: docs/ssot/accounting.md#decimal-rule
    description: All monetary amounts MUST use Python Decimal, never float.
    cross_refs:
      - AGENTS.md
      - docs/agents/red-lines.md
      - apps/backend/tests/accounting/test_decimal_safety.py

  accounting_equation:
    owner: docs/ssot/accounting.md#accounting-equation
    description: "Assets = Liabilities + Equity + (Income - Expenses) invariant."
    cross_refs:
      - docs/agents/red-lines.md
      - apps/backend/tests/accounting/test_accounting_equation.py

  double_entry_bookkeeping:
    owner: docs/ssot/accounting.md#entry-balance
    description: Every JournalEntry must have balanced debits and credits.
    cross_refs:
      - docs/agents/red-lines.md
      - apps/backend/tests/accounting/test_accounting.py

  transaction_boundary:
    owner: docs/ssot/accounting.md#async-tx-boundary
    description: Routers commit(); Services flush() only.
    cross_refs:
      - docs/agents/red-lines.md
      - apps/backend/tests/accounting/test_accounting_integration.py

  # ── Schema / Database domain ───────────────────────────────────────────
  database_schema:
    owner: docs/ssot/schema.md#er-model
    description: PostgreSQL table structures, ER diagram, and migration rules.
    cross_refs:
      - docs/ssot/accounting.md
      - docs/ssot/reconciliation.md

  enum_naming:
    owner: docs/ssot/schema.md#enum-naming
    description: All sa.Enum instances MUST have an explicit name parameter.
    cross_refs:
      - AGENTS.md
      - docs/agents/red-lines.md
      - apps/backend/tests/infra/test_schema_guardrails.py

  # ── Reconciliation domain ──────────────────────────────────────────────
  reconciliation_thresholds:
    owner: docs/ssot/reconciliation.md#thresholds
    description: Score ≥85 auto-accept; 60-84 review; <60 unmatched.
    cross_refs:
      - docs/agents/red-lines.md

  reconciliation_state_machine:
    owner: docs/ssot/reconciliation.md#state-machine
    description: pending → auto_accepted | pending_review → accepted | rejected.
    cross_refs:
      - docs/ssot/confirmation-workflow.md

  # ── Auth / Identity ────────────────────────────────────────────────────
  auth_flow:
    owner: docs/ssot/auth.md
    description: JWT/OAuth2 identity system, registration and login flow.
    cross_refs:
      - docs/ssot/schema.md

  # ── Frontend patterns ──────────────────────────────────────────────────
  api_client_pattern:
    owner: docs/ssot/frontend-patterns.md
    description: "Frontend MUST use lib/api.ts wrapper; never raw fetch()."
    cross_refs:
      - AGENTS.md
      - docs/agents/red-lines.md
      - apps/frontend/src/lib/api.ts

  # ── AI / Extraction domain ─────────────────────────────────────────────
  extraction_pipeline:
    owner: docs/ssot/extraction.md
    description: Gemini Vision document parsing and validation pipeline.
    cross_refs:
      - docs/ssot/reconciliation.md

  ai_advisor_policy:
    owner: docs/ssot/ai.md
    description: AI advisor prompt policy, context scope, and safety controls.
    cross_refs:
      - docs/ssot/reporting.md

  # ── Reporting domain ───────────────────────────────────────────────────
  reporting_calculations:
    owner: docs/ssot/reporting.md
    description: Financial reports, multi-currency consolidation, calculations.
    cross_refs:
      - docs/ssot/accounting.md
      - docs/ssot/market_data.md

  net_worth_valuation_snapshots:
    owner: docs/ssot/assets.md#manual-valuation-snapshots
    description: Point-in-time manual valuation snapshots for non-ledger net worth components.
    cross_refs:
      - docs/ssot/reporting.md
      - docs/ssot/schema.md

  # ── Market data ────────────────────────────────────────────────────────
  market_data:
    owner: docs/ssot/market_data.md
    description: FX rates, stock prices, data sources, and sync schedule.
    cross_refs:
      - docs/ssot/reporting.md

  # ── Processing account ─────────────────────────────────────────────────
  processing_account:
    owner: docs/ssot/processing_account.md
    description: Unconfirmed in-transit funds; balance 0 means transfer paired.
    cross_refs:
      - docs/ssot/confirmation-workflow.md
      - docs/ssot/reconciliation.md

  # ── Confirmation workflow ──────────────────────────────────────────────
  confirmation_workflow:
