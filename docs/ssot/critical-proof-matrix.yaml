version: "1.0"
description: >
  Bidirectional README -> EPIC -> E2E macro outcome guard and critical product
  proof paths that must not be satisfied by broad AC string references. Full AC
  traceability remains a separate hygiene gate.

outcomes:
  - id: personal-financial-report-package
    question: "Can I generate one auditable personal financial-report package with statements, schedules, notes, and source traceability?"
    status: covered
    owner_epics:
      - EPIC-005
      - EPIC-008
      - EPIC-011
      - EPIC-017
      - EPIC-018
    issue: "#567"
    proof_ids:
      - personal-financial-report-package-post-merge

  - id: asset-distribution-net-worth
    question: "How much money do I have, and where is it distributed?"
    status: covered
    owner_epics:
      - EPIC-005
      - EPIC-008
      - EPIC-011
      - EPIC-017
    proof_ids:
      - deterministic-upload-to-dashboard
      - four-asset-as-of-net-worth
    issue: "#444"

  - id: monthly-income-spending
    question: "How much did I earn and spend this month?"
    status: covered
    owner_epics:
      - EPIC-005
      - EPIC-008
    proof_ids:
