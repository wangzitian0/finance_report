    required_markers:
      - e2e
      - tier3
      - critical
    ac_ids:
      - AC8.13.28
      - AC8.13.29
      - AC8.13.30
      - AC8.13.31
      - AC8.13.32

  - id: brokerage-pdf-to-portfolio-value
    scope: behavioral
    ci_tier: post_merge_environment
