    risk: critical
    issue: "#809"
    proof: EPIC-011 Stage 3 destructive drop of legacy bank_statements / bank_statement_transactions tables and their enum types after the ingestion pipeline and all consumers moved to StatementSummary + AtomicTransaction.
    staging_validation: Deploy to staging and exercise upload -> parse -> Stage-1 review -> reconcile -> report end-to-end on the new StatementSummary/AtomicTransaction model; confirm no code path queries the dropped tables.
    production_preflight: Production has no real data yet; confirm bank_statements and bank_statement_transactions are empty (row count 0) before applying.
    rollback_strategy: Irreversible by design (tables dropped). Roll back by restoring from pre-migration snapshot; since the source ODS (uploaded_documents + MinIO) is retained, derived data can be rebuilt by re-parsing.
    destructive_confirmation: Confirmed destructive drop of bank_statements + bank_statement_transactions; legacy data is recomputable from the retained ODS source and no production data exists.
