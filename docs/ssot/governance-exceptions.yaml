version: 1
exceptions:
  # Retiring the valuation taxonomy island: the `stable_valuation_taxonomy`
  # MANIFEST entry (which carried family+kind) is removed because the concept it
  # owned was reinvented scaffolding (it duplicated the chart of accounts +
  # ledger + classification + evidence primitives) and its SSOT section is
  # deleted. Removing a family+kind entry lowers manifest family/kind coverage by
  # one entry; these two exceptions cover only that intentional, one-entry
  # regression. Remove them once the ratio re-baselines on main.
  - target: finance_report:ratio:manifest_family_coverage
    issue: https://github.com/wangzitian0/finance_report/issues/1221
    reason: >-
      Removed the stable_valuation_taxonomy MANIFEST entry (had family+kind)
      while retiring the reinvented valuation taxonomy island; the one-entry drop
      in family coverage is intentional. Remove once re-baselined on main.
  - target: finance_report:ratio:manifest_kind_coverage
    issue: https://github.com/wangzitian0/finance_report/issues/1221
    reason: >-
      Removed the stable_valuation_taxonomy MANIFEST entry (had family+kind)
      while retiring the reinvented valuation taxonomy island; the one-entry drop
      in kind coverage is intentional. Remove once re-baselined on main.

  # Storage migration: the AC-score ratchet baseline moved from a central JSON
  # object to conflict-free sorted JSONL (docs/ssot/ac-score-baseline.jsonl,
  # merge=union). The deleted .json shows up as a changed SSOT file with no
  # owner; this temporary exception covers only the deletion churn in this PR.
  - target: finance_report:docs/ssot/ac-score-baseline.json
    issue: https://github.com/wangzitian0/finance_report/issues/1103
    reason: >-
      ac-score-baseline.json was replaced by ac-score-baseline.jsonl (sorted,
      merge=union) to remove merge-train false sharing; remove this exception
      once the deletion is merged.

  # De-materialization: authority-distribution.json was an UNGATED committed
  # snapshot of the CODE/LLM classifier output — drift-prone derived data. It is
  # deleted in favour of the live check_authority_reconcile gate (the enforced
  # declared-vs-detected check) + on-demand tools/authority_counter.py. The
  # deletion shows up as a changed SSOT file with no owner; this temporary
  # exception covers only that deletion churn. Remove once merged.
  - target: finance_report:docs/ssot/authority-distribution.json
    issue: https://github.com/wangzitian0/finance_report/issues/1357
    reason: >-
      authority-distribution.json (the committed CODE/LLM snapshot) is deleted —
      it was ungated derived data, superseded by the live check_authority_reconcile
      gate (and the on-demand authority_counter). Remove this exception once merged.

  # De-materialization: the critical-proof and vision-proof matrices are no
  # longer committed — they are derived on-demand views of the one AC-keyed
  # graph (common/ssot/ac_graph.py), gated by tools/check_ac_index.py. Their
  # deletion shows up as a changed SSOT file with no owner; these temporary
  # exceptions cover only the deletion churn in this PR. The matrices' concepts
  # remain registered in MANIFEST.yaml, now owned by their generators.
  - target: finance_report:docs/ssot/critical-proof-matrix.yaml
    issue: https://github.com/wangzitian0/finance_report/issues/1103
    reason: >-
      critical-proof-matrix.yaml is no longer committed; it is a derived
      on-demand view of the AC graph (gated by tools/check_ac_index.py). Remove
      this exception once the deletion is merged.
  - target: finance_report:docs/ssot/vision-proof-matrix.yaml
    issue: https://github.com/wangzitian0/finance_report/issues/1103
    reason: >-
      vision-proof-matrix.yaml is no longer committed; it is a derived on-demand
      view of the AC graph (gated by tools/check_ac_index.py). Remove this
      exception once the deletion is merged.

  # Package model self-hosts: the package-model spec moved out of docs/ssot/
  # into the meta package that owns it (common/meta/readme.md). The
  # MANIFEST `package_model` concept now points there, so docs/ssot/package-model.md
  # is deleted; its deletion shows up as a changed SSOT file with no owner. This
  # temporary exception covers only the deletion churn in this PR.
  - target: finance_report:docs/ssot/package-model.md
    issue: https://github.com/wangzitian0/finance_report/issues/1313
    reason: >-
      package-model.md moved to common/meta/readme.md (the package model
      self-hosts in the common/meta meta package); the MANIFEST
      package_model owner now points there. Remove this exception once the
      deletion is merged.

  # SSOT internalized: the authority-tier vocabulary moved out of docs/ssot/
  # into the authority package that owns it (common/authority/readme.md), per
  # the package-migration standard step 3 "SSOT internalized". The MANIFEST
  # `authority_tiers` concept now points there, so docs/ssot/authority-tiers.md
  # is deleted; its deletion shows up as a changed SSOT file with no owner. This
  # temporary exception covers only the deletion churn in this PR.
  - target: finance_report:docs/ssot/authority-tiers.md
    issue: https://github.com/wangzitian0/finance_report/issues/1459
    reason: >-
      authority-tiers.md internalized into common/authority/readme.md (the
      authority package owns the tier vocabulary + tier->proof matrix); the
      MANIFEST authority_tiers owner now points there. Remove this exception
      once the deletion is merged.
  # Identity package self-hosts: the auth SSOT moved out of docs/ssot/ into the
  # identity package that owns it (#1428). The backend half folded into
  # common/identity/readme.md (referenced from the MANIFEST package_model concept)
  # and the frontend/browser-security half into docs/ssot/frontend-patterns.md, so
  # docs/ssot/auth.md is deleted and the `auth_flow` MANIFEST concept retired; its
  # deletion shows up as a changed SSOT file with no owner. This temporary
  # exception covers only the deletion churn in this PR.
  - target: finance_report:docs/ssot/auth.md
    issue: https://github.com/wangzitian0/finance_report/issues/1428
    reason: >-
      auth.md is deleted: the backend auth contract moved into the identity
      package (common/identity/readme.md, referenced from MANIFEST package_model)
      and the frontend/browser-security half into docs/ssot/frontend-patterns.md;
      the auth_flow MANIFEST concept is retired. Remove this exception once the
      deletion is merged.

  # Extraction package self-hosts: the extraction SSOT moved out of docs/ssot/
  # into the extraction package that owns it (Stage-2 precursor to the code
  # cutover #1421), per the package-migration standard
  # (common/meta/migration-standard.md, step 3 "SSOT internalized"). The prose
  # folded into common/extraction/readme.md (incl. its #confidence-scoring
  # section) and the audit-failed case registry into
  # common/extraction/audit-failed-cases.yaml; the MANIFEST extraction_pipeline /
  # extraction_confidence_tiers / extraction_failed_case_registry owners now
  # point there, so docs/ssot/extraction.md and
  # docs/ssot/extraction-audit-failed-cases.yaml are deleted. Each deletion shows
  # up as a changed SSOT file with no owner; these temporary exceptions cover only
  # that deletion churn in this PR.
  - target: finance_report:docs/ssot/extraction.md
    issue: https://github.com/wangzitian0/finance_report/issues/1421
    reason: >-
      extraction.md internalized into common/extraction/readme.md (the extraction
      package owns the pipeline rationale + the #confidence-scoring tiers); the
      MANIFEST extraction_pipeline / extraction_confidence_tiers owners now point
      there. Remove this exception once the deletion is merged.
  - target: finance_report:docs/ssot/extraction-audit-failed-cases.yaml
    issue: https://github.com/wangzitian0/finance_report/issues/1421
    reason: >-
      extraction-audit-failed-cases.yaml moved into the extraction package
      (common/extraction/audit-failed-cases.yaml) as extraction-owned data; the
      MANIFEST extraction_failed_case_registry owner now points there. Remove this
      exception once the deletion is merged.

# ---------------------------------------------------------------------------
# Temporary SSOT governance gate exceptions live in `exceptions` above.
# Each exception must target a single gate finding and link a GitHub issue.
#
# target formats:
#   finance_report:docs/ssot/example.md
#   finance_report:manifest:example_concept
#   infra2:docs/ssot/example.md
#   infra2:manifest:example_concept
#
# example:
#   - target: finance_report:manifest:temporary_concept
#     issue: https://github.com/wangzitian0/finance_report/issues/000
#     reason: Temporary migration path; remove by the linked issue.
# ---------------------------------------------------------------------------

# ===========================================================================
# Bottom-up proof classification (issue #524).
#
# `proof_exceptions` and `code_owned_surfaces` classify the surfaces the
# bottom-up proof chain (test/file -> AC -> EPIC) deliberately does not gate as
# normal AC proof, so they never become hidden drift. The registry is validated
# by `tools/check_governance_exceptions.py`; each entry needs an `id`, an
# `owner` (the code/doc that authoritatively defines the value), a `reason`, and
# a tracking `issue`.
# ===========================================================================

# Budgeted or e2e-only proofs that are intentionally not full mandatory PR-CI AC
# proof. Each is bounded by a guard or override and tracked for burn-down.
proof_exceptions:
  - id: detached-owner-shortcut-budget
    owner: common/testing/detached_owner_guard.py
    reason: >-
      Persisted `user_id=uuid4()` owner shortcuts in DB-backed backend tests are
      a bounded budget (default 2) enforced by the detached-owner guard rather
      than per-test AC proof; the guard fails if the budget grows.
    issue: https://github.com/wangzitian0/finance_report/issues/524
  - id: password-reset-e2e-only-override
    owner: docs/ac_registry_overrides.yaml
    reason: >-
      AC8.2.6 (password reset) is covered only by the `test_password_reset_flow`
      e2e test with no PR-CI unit/integration coverage yet, so it is registered
      as a non-mandatory override and excluded from the mandatory traceability
      gate until CI coverage exists.
    issue: https://github.com/wangzitian0/finance_report/issues/524

# Thresholds and generated artifacts whose authoritative value lives in code or
# config, not in prose docs. Docs must link to the owner, never copy the value.
code_owned_surfaces:
  - id: backend-coverage-threshold
    owner: apps/backend/pyproject.toml
    reason: >-
      Backend coverage thresholds and source tree are owned by pyproject.toml
      plus common/coverage/policy.py; docs link to the policy instead of copying
      mutable numeric values.
    issue: https://github.com/wangzitian0/finance_report/issues/524
  - id: frontend-coverage-threshold
    owner: apps/frontend/vitest.config.ts
    reason: >-
      Frontend LCOV line/statement coverage thresholds are owned by
      vitest.config.ts; the unified coverage gate reads them from code.
    issue: https://github.com/wangzitian0/finance_report/issues/524
  - id: generated-api-reference
    owner: tools/generate_api_reference.py
    reason: >-
      docs/reference/api.md is generated from the live OpenAPI schema; the
      generator owns the surface, the committed page is a rendered snapshot.
    issue: https://github.com/wangzitian0/finance_report/issues/524
  - id: generated-db-schema-reference
    owner: tools/generate_db_schema_reference.py
    reason: >-
      docs/reference/db-schema.md is generated at build time from the SQLAlchemy
      models; it is git-ignored and produced by the generator, not authored.
    issue: https://github.com/wangzitian0/finance_report/issues/524
