# gitleaks configuration for finance_report (AC8.13.132).
# Extends the upstream default ruleset and adds a TIGHTLY-SCOPED allowlist for
# known non-secret matches. Allowlisting is by value/regex (not blanket path
# ignores), so a real credential later introduced into the same files is still
# caught.
title = "finance_report gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Documented example tokens and non-secret constant keys"
regexes = [
  # Truncated placeholder JWT used throughout the auth docs (ends in `...`,
  # never a real signed token).
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.\.\.''',
  # Fuller example JWT in auth.md: canonical example UUID 550e8400-... payload
  # plus a fake `.xxx` signature (a documented sample, not a real token). Pinned
  # to the FULL token, including the `.xxx` signature, so a real signed token
  # sharing the same header/payload prefix is still caught.
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJzdWIiOiI1NTBlODQwMC1lMjliLTQxZDQtYTcxNi00NDY2NTU0NDAwMDAiLCJleHAiOjE3MDY5NzYwMDB9\.xxx''',
  # Frontend localStorage key name (a constant identifier, not a credential).
  '''ai_advisor_disclaimer_v1''',
  # False positive: a tiktoken wheel's sha256 in apps/backend/uv.lock happens to
  # start with `eaaa` + 60 hex chars, matching the Square access-token rule
  # (EAAA...). It is a package hash, not a credential. Pinned to the exact value.
  '''eaaaef47c2406277181d2086484c317bf7fc433e2d5d03ff94f56b0dcec87471''',
]
